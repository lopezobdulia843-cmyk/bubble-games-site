<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bubble Games - Pro Engine</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: white; user-select: none; }
        
        /* UI Styling */
        .ui-overlay { position: absolute; z-index: 10; pointer-events: none; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: space-between; }
        .controls { pointer-events: auto; padding: 20px; display: flex; gap: 10px; }
        
        #top-bar { background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); justify-content: center; }
        #bottom-bar { background: linear-gradient(to top, rgba(0,0,0,0.8), transparent); justify-content: center; padding-bottom: 30px; }

        button { 
            background: rgba(20, 20, 20, 0.8); color: #00d4ff; border: 2px solid #00d4ff; 
            padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s;
        }
        button:hover { background: #00d4ff; color: black; box-shadow: 0 0 15px #00d4ff; }
        button.active-tool { background: #00d4ff; color: black; }
        button.play-btn { border-color: #2ecc71; color: #2ecc71; }
        button.play-btn:hover { background: #2ecc71; color: black; }
        button.stop-btn { border-color: #ff3232; color: #ff3232; }

        #info { position: absolute; top: 20px; left: 20px; pointer-events: none; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 6px; height: 6px; border: 2px solid white; border-radius: 50%; transform: translate(-50%, -50%); display: none; }

        /* Modal */
        #modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #111; border: 2px solid #f39c12; padding: 20px; border-radius: 12px;
            display: none; z-index: 100; text-align: center; width: 300px; pointer-events: auto;
        }
        .option { background: #222; padding: 10px; margin: 10px 0; border-radius: 5px; cursor: pointer; border: 1px solid #444; }
        .option:hover { border-color: #f39c12; background: #292929; }
    </style>
</head>
<body>

    <div id="info">
        <h2 style="margin:0; color:#00d4ff;">BUBBLE ENGINE</h2>
        <div id="status">MODE: BUILDING</div>
    </div>

    <div id="crosshair"></div>

    <div class="ui-overlay">
        <div id="top-bar" class="controls">
            <button id="placeModeBtn" class="active-tool" onclick="setTool('place')">PLACE (P)</button>
            <button id="dragModeBtn" onclick="setTool('drag')">DRAG (M)</button>
            <button id="scaleModeBtn" onclick="setTool('scale')">SCALE (S)</button>
            <button id="scriptModeBtn" onclick="setTool('script')">SCRIPT (F)</button>
            <button id="deleteModeBtn" onclick="setTool('delete')">DELETE (X)</button>
        </div>

        <div id="bottom-bar" class="controls">
            <button class="play-btn" id="playToggle" onclick="togglePlay()">PLAY TEST ▶</button>
            <button onclick="publishGame()">PUBLISH 🚀</button>
        </div>
    </div>

    <div id="modal">
        <h3 id="modal-title">Select Behavior</h3>
        <div class="option" onclick="applyBehavior('none')">Normal Block</div>
        <div class="option" onclick="applyBehavior('kill')" style="color:#ff3232;">Lava (Kill)</div>
        <div class="option" onclick="applyBehavior('bounce')" style="color:#2ecc71;">Trampoline</div>
        <div class="option" onclick="applyBehavior('spin')" style="color:#00d4ff;">Spinner</div>
        <button onclick="closeModal()" style="margin-top:10px; border-color:#888; color:#888;">Cancel</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { TransformControls } from 'three/addons/controls/TransformControls.js';

        // --- CONFIG (ADD YOUR KEYS HERE) ---
        const SB_URL = 'YOUR_SUPABASE_URL';
        const SB_KEY = 'YOUR_ANON_KEY';
        const supabase = window.supabase.createClient(SB_URL, SB_KEY);

        // --- SCENE SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const grid = new THREE.GridHelper(100, 100, 0x00d4ff, 0x222222);
        scene.add(grid);

        // --- STATE ---
        let objects = [];
        let isPlayMode = false;
        let currentTool = 'place'; // place, drag, scale, script, delete
        let selectedObject = null;
        let velocityY = 0;
        const playerHeight = 1.6;

        // --- FLOOR ---
        const floorGeo = new THREE.PlaneGeometry(100, 100);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x111111, visible: false });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        // --- GIZMOS ---
        const gizmo = new TransformControls(camera, renderer.domElement);
        scene.add(gizmo);
        gizmo.addEventListener('dragging-changed', (e) => {
            // Disable camera movement while dragging arrows
            controlsEnabled = !e.value;
        });

        // --- TOOLS ---
        window.setTool = (tool) => {
            currentTool = tool;
            gizmo.detach();
            document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active-tool'));
            const btn = document.getElementById(tool + 'ModeBtn');
            if(btn) btn.classList.add('active-tool');

            if(tool === 'drag') gizmo.setMode('translate');
            if(tool === 'scale') gizmo.setMode('scale');
        };

        // --- CLICK LOGIC ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('mousedown', (e) => {
            if (isPlayMode || e.target.closest('.controls') || e.target.closest('#modal')) return;
            
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);

            const intersects = raycaster.intersectObjects([floor, ...objects]);
            if (intersects.length > 0) {
                const hit = intersects[0].object;
                
                if (currentTool === 'place') {
                    const p = intersects[0].point.clone().add(intersects[0].face.normal.multiplyScalar(0.5));
                    createBlock(Math.round(p.x), Math.round(p.y), Math.round(p.z));
                } 
                else if ((currentTool === 'drag' || currentTool === 'scale') && hit !== floor) {
                    gizmo.attach(hit);
                    selectedObject = hit;
                }
                else if (currentTool === 'delete' && hit !== floor) {
                    scene.remove(hit);
                    objects = objects.filter(o => o !== hit);
                    gizmo.detach();
                }
                else if (currentTool === 'script' && hit !== floor) {
                    selectedObject = hit;
                    document.getElementById('modal').style.display = 'block';
                }
            }
        });

        function createBlock(x, y, z) {
            const geo = new THREE.BoxGeometry(1, 1, 1);
            const mat = new THREE.MeshStandardMaterial({ color: 0xcccccc });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(x, y, z);
            mesh.userData.behavior = 'none';
            scene.add(mesh);
            objects.push(mesh);
            return mesh;
        }

        // --- BEHAVIORS ---
        window.applyBehavior = (type) => {
            if(!selectedObject) return;
            selectedObject.userData.behavior = type;
            
            // Visual feedback
            if(type === 'kill') selectedObject.material.color.set(0xff3232);
            else if(type === 'bounce') selectedObject.material.color.set(0x2ecc71);
            else if(type === 'spin') selectedObject.material.color.set(0x00d4ff);
            else selectedObject.material.color.set(0xcccccc);
            
            closeModal();
        };

        window.closeModal = () => document.getElementById('modal').style.display = 'none';

        // --- PLAY MODE ---
        let editorPos = new THREE.Vector3();
        window.togglePlay = () => {
            isPlayMode = !isPlayMode;
            const btn = document.getElementById('playToggle');
            
            if (isPlayMode) {
                editorPos.copy(camera.position);
                btn.innerText = "STOP TEST ⏹";
                btn.className = "stop-btn";
                document.getElementById('status').innerText = "MODE: PLAYING";
                document.getElementById('crosshair').style.display = 'block';
                gizmo.detach();
                // Spawn at 0, 5, 0 or nearest block
                camera.position.set(0, 5, 5);
            } else {
                camera.position.copy(editorPos);
                btn.innerText = "PLAY TEST ▶";
                btn.className = "play-btn";
                document.getElementById('status').innerText = "MODE: BUILDING";
                document.getElementById('crosshair').style.display = 'none';
            }
        };

        // --- PUBLISH ---
        window.publishGame = async () => {
            const name = prompt("Name your game:");
            if(!name) return;

            const data = objects.map(o => ({
                p: o.position,
                s: o.scale,
                b: o.userData.behavior
            }));

            const { error } = await supabase.from('games').insert([{ name, blocks: data }]);
            if(error) alert("Error: " + error.message);
            else alert("🚀 Published successfully!");
        };

        // --- ENGINE LOOP ---
        let controlsEnabled = true;
        const keys = {};
        window.onkeydown = (e) => keys[e.code] = true;
        window.onkeyup = (e) => keys[e.code] = false;

        function animate() {
            requestAnimationFrame(animate);

            if (isPlayMode) {
                // Basic Movement
                const speed = 0.15;
                if(keys['KeyW']) camera.translateZ(-speed);
                if(keys['KeyS']) camera.translateZ(speed);
                if(keys['KeyA']) camera.translateX(-speed);
                if(keys['KeyD']) camera.translateX(speed);
                
                // Gravity & Collisions (Simple)
                velocityY -= 0.01;
                camera.position.y += velocityY;
                if(camera.position.y < playerHeight) {
                    camera.position.y = playerHeight;
                    velocityY = 0;
                    if(keys['Space']) velocityY = 0.2;
                }

                // Scripts
                objects.forEach(obj => {
                    if(obj.userData.behavior === 'spin') obj.rotation.y += 0.05;
                    
                    const dist = camera.position.distanceTo(obj.position);
                    if(dist < 1.5) {
                        if(obj.userData.behavior === 'kill') camera.position.set(0, 5, 5);
                        if(obj.userData.behavior === 'bounce') velocityY = 0.4;
                    }
                });
            } else {
                // Editor Camera Controls (Right Click to Look)
                // This is a placeholder for actual editor controls
            }

            renderer.render(scene, camera);
        }

        camera.position.set(10, 10, 10);
        camera.lookAt(0,0,0);
        animate();

    </script>
</body>
</html>
