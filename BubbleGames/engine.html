<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bubble Games | Editor & Engine</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: 'Segoe UI', sans-serif; touch-action: none; color: white; }
        .controls { position: absolute; z-index: 10; display: flex; gap: 10px; }
        #top-bar { top: 20px; right: 20px; flex-direction: column; align-items: flex-end; }
        
        #settings-panel { 
            position: absolute; top: 100px; left: 20px; 
            background: rgba(0,0,0,0.85); padding: 15px; border-radius: 12px; 
            border: 1px solid #00d4ff; width: 220px; z-index: 50;
            backdrop-filter: blur(10px);
        }
        .setting-group { margin-bottom: 18px; }
        .label-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .setting-group label { font-size: 11px; text-transform: uppercase; color: #00d4ff; font-weight: bold; }
        
        .num-input {
            width: 55px; background: #111; border: 1px solid #444; color: #00d4ff;
            font-size: 12px; border-radius: 4px; padding: 4px; text-align: center;
        }
        input[type="range"] { width: 100%; cursor: pointer; accent-color: #00d4ff; }

        button { 
            width: 150px; height: 45px; font-size: 13px; font-weight: bold;
            background: rgba(0, 212, 255, 0.1); color: white;
            border: 2px solid #00d4ff; border-radius: 8px; cursor: pointer;
            transition: 0.2s;
        }
        button:hover { background: rgba(0, 212, 255, 0.3); }
        
        #publishBtn { background: #00d4ff; color: #000; }
        #playTestBtn { background: #2ecc71; color: #000; border-color: #2ecc71; }
        #playTestBtn.playing { background: #e74c3c; color: white; border-color: #e74c3c; }

        .active-tool { background: #00d4ff !important; color: #000 !important; }
        #deleteModeBtn.active-tool { background: #ff3232 !important; border-color: #ff3232 !important; color: white !important; }

        #item-selector { 
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 15px; background: rgba(0,0,0,0.8); padding: 12px;
            border-radius: 15px; border: 2px solid #333; z-index: 20;
        }
        .item-card {
            width: 65px; height: 65px; border-radius: 10px; border: 2px solid #444;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; background: #111; transition: 0.2s;
        }
        .item-card.selected { border-color: #00d4ff; background: rgba(0, 212, 255, 0.2); }
        .item-icon { width: 25px; height: 25px; margin-bottom: 5px; border-radius: 4px; }
        .icon-block { background: #cccccc; border: 1px solid #999; }
        .icon-spawn { background: #00ffff; box-shadow: 0 0 10px #00ffff; }
        .item-label { font-size: 10px; color: white; text-transform: uppercase; }

        #info { position: absolute; top: 15px; left: 15px; pointer-events: none; }
        #coords { font-family: monospace; color: #00d4ff; font-size: 12px; margin-top: 5px; }
        #crosshair { 
            position: absolute; top: 50%; left: 50%; width: 8px; height: 8px; 
            border: 2px solid white; border-radius: 50%; transform: translate(-50%, -50%); 
            display: none; pointer-events: none; 
        }

        #chat-container {
            position: absolute; bottom: 120px; left: 20px; width: 280px; height: 220px;
            display: flex; flex-direction: column; z-index: 60; pointer-events: none;
        }
        #chat-messages {
            flex-grow: 1; overflow-y: auto; background: rgba(0,0,0,0.5);
            border-radius: 8px; padding: 10px; font-size: 13px; display: flex; flex-direction: column; gap: 5px;
        }
        #chat-input {
            margin-top: 8px; background: rgba(0,0,0,0.8); border: 1px solid #00d4ff;
            color: white; padding: 10px; border-radius: 6px; pointer-events: auto; outline: none;
        }
        .chat-user { color: #00d4ff; font-weight: bold; }
        #loading-overlay { position: fixed; inset: 0; background: #050505; z-index: 100; display: flex; align-items: center; justify-content: center; color: #00d4ff; font-weight: bold; }
        
        .player-label {
            position: absolute; background: rgba(0,0,0,0.8); color: #00d4ff;
            padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: bold;
            border: 1px solid #00d4ff; pointer-events: none; transform: translate(-50%, -100%);
        }
    </style>
</head>
<body>
    <div id="loading-overlay">BOOTING ENGINE...</div>

    <div id="info">
        <h2 id="gameNameDisplay" style="margin:0; color:#00d4ff; letter-spacing: 1px;">BUBBLE GAMES</h2>
        <div id="coords">X: 0 | Y: 0 | Z: 0</div>
    </div>

    <div id="chat-container">
        <div id="chat-messages"></div>
        <input type="text" id="chat-input" placeholder="Type message..." autocomplete="off">
    </div>

    <div id="settings-panel" style="display:none;">
        <div class="setting-group">
            <div class="label-container"><label>Speed</label>
            <input type="number" id="speed-num" class="num-input" step="0.01" value="0.12"></div>
            <input type="range" id="speed-slider" min="0.05" max="0.5" step="0.01" value="0.12">
        </div>
        <div class="setting-group">
            <div class="label-container"><label>Gravity</label>
            <input type="number" id="gravity-num" class="num-input" step="0.001" value="0.015"></div>
            <input type="range" id="gravity-slider" min="0" max="0.05" step="0.001" value="0.015">
        </div>
        <div id="part-settings" style="display:none; border-top: 1px solid #333; padding-top: 10px;">
            <label style="font-size:10px; color:#888;">SCALING</label>
            <input type="range" id="size-slider" min="0.5" max="10" step="0.1" value="1">
        </div>
    </div>

    <div id="item-selector" style="display:none;">
        <div class="item-card selected" onclick="selectItem('block')" id="card-block">
            <div class="item-icon icon-block"></div><div class="item-label">Block</div>
        </div>
        <div class="item-card" onclick="selectItem('spawn')" id="card-spawn">
            <div class="item-icon icon-spawn"></div><div class="item-label">Spawn</div>
        </div>
    </div>

    <div id="top-bar" class="controls">
        <button id="playTestBtn" onclick="togglePlayTest()">PLAY TEST ▶</button>
        <button id="publishBtn" onclick="publishGame()" style="display:none;">PUBLISH 🚀</button>
        <button id="dragModeBtn" onclick="toggleTool('drag')" style="display:none;">SELECT PART</button>
        <button id="deleteModeBtn" onclick="toggleTool('delete')" style="display:none;">DELETE</button>
        <button onclick="exitGame()">EXIT</button>
    </div>
    <div id="crosshair"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { TransformControls } from 'three/addons/controls/TransformControls.js';

        const SUPABASE_URL = 'https://sideqpofgknyfagrjnke.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_ULjlm97u7-dg8ekTPU84aA_rA1CtUnH';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // State & Config
        let currentUser = "Guest_" + Math.floor(Math.random() * 9999);
        const gameId = localStorage.getItem('currentGameId') || 'lobby';
        const isEditModeSession = localStorage.getItem('editMode') === 'true';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050507);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.rotation.order = "YXZ";
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1.0));
        const gridHelper = new THREE.GridHelper(100, 100, 0x00d4ff, 0x222222);
        scene.add(gridHelper);

        const floor = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.MeshBasicMaterial({ visible: false }));
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        const objects = [floor];
        const blockGeo = new THREE.BoxGeometry(1, 1, 1);
        const spawnGeo = new THREE.BoxGeometry(1, 0.2, 1);
        const spawnMat = new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x00ffff, emissiveIntensity: 1 });

        const gizmo = new TransformControls(camera, renderer.domElement);
        gizmo.setSize(0.5);
        scene.add(gizmo);

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let isPlayMode = !isEditModeSession;
        let currentTool = 'place';
        let selectedItemType = 'block';
        let moveSpeed = 0.12, worldGravity = 0.015, velocityY = 0;
        let isGrounded = false, spawnPoint = null;
        let editorCamPos = new THREE.Vector3(), editorCamRot = new THREE.Euler();
        let remotePlayers = {};

        // Networking
        const channel = supabaseClient.channel(`room_${gameId}`);
        channel.on('broadcast', { event: 'move' }, ({ payload }) => {
            if (payload.id === currentUser) return;
            if (!remotePlayers[payload.id]) {
                const mesh = new THREE.Mesh(new THREE.BoxGeometry(0.7, 1.5, 0.7), new THREE.MeshStandardMaterial({ color: 0x00d4ff }));
                scene.add(mesh);
                const label = document.createElement('div');
                label.className = 'player-label'; label.innerText = payload.id;
                document.body.appendChild(label);
                remotePlayers[payload.id] = { mesh, label };
            }
            remotePlayers[payload.id].mesh.position.set(payload.x, payload.y - 0.75, payload.z);
        }).on('broadcast', { event: 'chat' }, ({ payload }) => {
            addChatMessage(payload.user, payload.text);
        }).subscribe();

        function addChatMessage(user, text) {
            const div = document.createElement('div');
            div.innerHTML = `<span class="chat-user">${user}:</span> ${text}`;
            const msgBox = document.getElementById('chat-messages');
            msgBox.appendChild(div); msgBox.scrollTop = msgBox.scrollHeight;
        }

        document.getElementById('chat-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && e.target.value.trim()) {
                channel.send({ type: 'broadcast', event: 'chat', payload: { user: currentUser, text: e.target.value } });
                addChatMessage("You", e.target.value);
                e.target.value = ''; e.target.blur();
            }
        });

        // Tool Logic
        window.selectItem = (type) => {
            selectedItemType = type;
            document.querySelectorAll('.item-card').forEach(c => c.classList.toggle('selected', c.id === `card-${type}`));
        };

        window.toggleTool = (tool) => {
            currentTool = (currentTool === tool) ? 'place' : tool;
            if (currentTool !== 'drag') gizmo.detach();
            document.getElementById('dragModeBtn').className = currentTool === 'drag' ? 'active-tool' : '';
            document.getElementById('deleteModeBtn').className = currentTool === 'delete' ? 'active-tool' : '';
        };

        window.togglePlayTest = () => {
            isPlayMode = !isPlayMode;
            const btn = document.getElementById('playTestBtn');
            if (isPlayMode) {
                if (!spawnPoint) { alert("Add a Spawn Point first!"); isPlayMode = false; return; }
                editorCamPos.copy(camera.position); editorCamRot.copy(camera.rotation);
                btn.innerText = "STOP TEST ⏹"; btn.classList.add('playing');
                document.getElementById('crosshair').style.display = 'block';
                ['publishBtn', 'dragModeBtn', 'deleteModeBtn', 'item-selector', 'settings-panel'].forEach(id => document.getElementById(id).style.display = 'none');
                camera.position.set(spawnPoint.position.x, spawnPoint.position.y + 1.2, spawnPoint.position.z);
                gizmo.detach();
            } else {
                btn.innerText = "PLAY TEST ▶"; btn.classList.remove('playing');
                document.getElementById('crosshair').style.display = 'none';
                ['publishBtn', 'dragModeBtn', 'deleteModeBtn', 'item-selector', 'settings-panel'].forEach(id => document.getElementById(id).style.display = 'flex');
                camera.position.copy(editorCamPos); camera.rotation.copy(editorCamRot);
            }
        };

        window.exitGame = () => { window.location.href = 'index.html'; };

        window.publishGame = async () => {
            const name = prompt("Name your game:"); if (!name) return;
            const blocks = objects.filter(o => o !== floor).map(o => ({
                x: o.position.x, y: o.position.y, z: o.position.z, s: o.scale.x, type: (o === spawnPoint ? 'spawn' : 'block')
            }));
            const { error } = await supabaseClient.from('games').insert([{ name, blocks, creator: currentUser, config: { gravity: worldGravity, speed: moveSpeed } }]);
            if (error) alert("Save Error: " + error.message); else exitGame();
        };

        // Core Loop & Input
        const keys = {};
        window.onkeydown = (e) => keys[e.code] = true;
        window.onkeyup = (e) => keys[e.code] = false;

        let isDraggingGizmo = false;
        gizmo.addEventListener('dragging-changed', (e) => isDraggingGizmo = e.value);

        window.onpointerdown = (e) => {
            if (e.target.closest('button') || e.target.closest('input') || isDraggingGizmo) return;
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1; mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const hits = raycaster.intersectObjects(objects);

            if (!isPlayMode && hits.length > 0) {
                const hit = hits[0];
                if (currentTool === 'delete' && hit.object !== floor) {
                    if (hit.object === spawnPoint) spawnPoint = null;
                    scene.remove(hit.object); objects.splice(objects.indexOf(hit.object), 1);
                    gizmo.detach();
                } else if (currentTool === 'drag' && hit.object !== floor) {
                    gizmo.attach(hit.object);
                } else if (currentTool === 'place') {
                    const m = new THREE.Mesh(selectedItemType === 'spawn' ? spawnGeo : blockGeo, selectedItemType === 'spawn' ? spawnMat : new THREE.MeshStandardMaterial({ color: 0x888888 }));
                    const offset = selectedItemType === 'spawn' ? 0.1 : 0.5;
                    m.position.copy(hit.point).add(hit.face.normal.multiplyScalar(offset)).round();
                    scene.add(m); objects.push(m);
                    if (selectedItemType === 'spawn') { if (spawnPoint) scene.remove(spawnPoint); spawnPoint = m; }
                }
            }
        };

        function animate() {
            requestAnimationFrame(animate);
            document.getElementById('coords').innerText = `X: ${camera.position.x.toFixed(1)} | Y: ${camera.position.y.toFixed(1)} | Z: ${camera.position.z.toFixed(1)}`;
            
            if (isPlayMode) {
                // Physics
                const downRay = new THREE.Raycaster(camera.position, new THREE.Vector3(0, -1, 0));
                const groundHits = downRay.intersectObjects(objects);
                if (groundHits.length > 0 && groundHits[0].distance <= 1.2) {
                    if (velocityY < 0) { velocityY = 0; isGrounded = true; camera.position.y = groundHits[0].point.y + 1.2; }
                } else {
                    velocityY -= worldGravity; isGrounded = false;
                }
                if (keys['Space'] && isGrounded) velocityY = 0.25;
                camera.position.y += velocityY;

                // Move
                const move = new THREE.Vector3();
                if (keys['KeyW']) move.z -= 1; if (keys['KeyS']) move.z += 1;
                if (keys['KeyA']) move.x -= 1; if (keys['KeyD']) move.x += 1;
                if (move.length() > 0) {
                    move.applyQuaternion(camera.quaternion); move.y = 0; move.normalize();
                    camera.position.addScaledVector(move, moveSpeed);
                }

                // Broadcast
                channel.send({ type: 'broadcast', event: 'move', payload: { id: currentUser, x: camera.position.x, y: camera.position.y, z: camera.position.z } });
            } else {
                // Fly Controls
                const fly = new THREE.Vector3();
                if (keys['KeyW']) camera.translateZ(-0.2); if (keys['KeyS']) camera.translateZ(0.2);
                if (keys['KeyA']) camera.translateX(-0.2); if (keys['KeyD']) camera.translateX(0.2);
            }

            // Camera Rotation (Right Click or Touch)
            window.onpointermove = (e) => {
                if (e.buttons === 2 || (isPlayMode && e.buttons === 1)) {
                    camera.rotation.y -= e.movementX * 0.002;
                    camera.rotation.x -= e.movementY * 0.002;
                    camera.rotation.x = Math.max(-1.5, Math.min(1.5, camera.rotation.x));
                }
            };

            renderer.render(scene, camera);
        }

        // Initialize
        async function load() {
            if (gameId !== 'lobby') {
                const { data } = await supabaseClient.from('games').select('*').eq('id', gameId).single();
                if (data && data.blocks) {
                    data.blocks.forEach(b => {
                        const m = new THREE.Mesh(b.type === 'spawn' ? spawnGeo : blockGeo, b.type === 'spawn' ? spawnMat : new THREE.MeshStandardMaterial({ color: 0x888888 }));
                        m.position.set(b.x, b.y, b.z); m.scale.setScalar(b.s || 1);
                        scene.add(m); objects.push(m);
                        if (b.type === 'spawn') spawnPoint = m;
                    });
                }
            }
            if (isEditModeSession) {
                document.getElementById('settings-panel').style.display = 'flex';
                document.getElementById('item-selector').style.display = 'flex';
                ['publishBtn', 'dragModeBtn', 'deleteModeBtn'].forEach(id => document.getElementById(id).style.display = 'flex');
            }
            document.getElementById('loading-overlay').style.display = 'none';
            animate();
        }
        load();
        window.oncontextmenu = (e) => e.preventDefault();
    </script>
</body>
</html>
