<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bubble Games | Studio</title>
    <style>
        :root { --primary: #00d4ff; --bg: #050505; --danger: #ff3232; --success: #2ecc71; }
        body { margin: 0; overflow: hidden; background: var(--bg); font-family: sans-serif; touch-action: none; color: white; }
        .controls { position: absolute; z-index: 10; display: flex; gap: 10px; }
        #top-bar { top: 20px; right: 20px; flex-direction: column; align-items: flex-end; }
        
        #settings-panel { 
            position: absolute; top: 100px; left: 20px; 
            background: rgba(0,0,0,0.85); padding: 15px; border-radius: 12px; 
            border: 1px solid var(--primary); width: 180px; z-index: 50;
            backdrop-filter: blur(10px);
        }
        .setting-group { margin-bottom: 15px; }
        .setting-group label { display: block; font-size: 11px; text-transform: uppercase; color: var(--primary); margin-bottom: 5px; }
        input[type="range"] { width: 100%; cursor: pointer; accent-color: var(--primary); }

        button { 
            width: 140px; height: 50px; font-size: 14px; font-weight: bold;
            background: rgba(0, 212, 255, 0.1); color: white;
            border: 2px solid var(--primary); border-radius: 10px; cursor: pointer;
            backdrop-filter: blur(5px); margin-bottom: 5px;
            display: flex; align-items: center; justify-content: center; transition: 0.2s;
        }
        
        #publishBtn { background: var(--primary); color: #000; }
        #playTestBtn { background: var(--success); color: #000; border-color: var(--success); }
        #playTestBtn.playing { background: #e74c3c; color: white; border-color: #e74c3c; }

        .active-tool { background: var(--primary) !important; color: #000 !important; box-shadow: 0 0 15px var(--primary); }
        #deleteModeBtn.active-tool { background: var(--danger) !important; border-color: var(--danger) !important; color: white !important; box-shadow: 0 0 15px var(--danger); }

        #item-selector { 
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 15px; background: rgba(0,0,0,0.8); padding: 10px;
            border-radius: 15px; border: 2px solid #333; z-index: 20;
        }
        .item-card {
            width: 60px; height: 60px; border-radius: 10px; border: 2px solid #444;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; background: #111; transition: 0.2s;
        }
        .item-card:hover { border-color: var(--primary); }
        .item-card.selected { border-color: var(--primary); background: rgba(0, 212, 255, 0.2); }
        .item-icon { width: 30px; height: 30px; margin-bottom: 2px; border-radius: 4px; }
        .icon-block { background: #cccccc; border: 1px solid #999; }
        .icon-spawn { background: #00ffff; box-shadow: 0 0 10px #00ffff; }
        .item-label { font-size: 10px; color: white; text-transform: uppercase; }

        #info { position: absolute; top: 10px; left: 10px; color: white; pointer-events: none; }
        #coords { font-family: monospace; color: var(--primary); margin-top: 5px; background: rgba(0,0,0,0.5); padding: 5px; border-radius: 5px; }
        #crosshair { 
            position: absolute; top: 50%; left: 50%; width: 12px; height: 12px; 
            border: 2px solid white; border-radius: 50%; transform: translate(-50%, -50%); 
            display: none; pointer-events: none; 
        }
        #loading-overlay { position: fixed; inset: 0; background: #050505; z-index: 100; display: flex; align-items: center; justify-content: center; color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>
    <div id="loading-overlay">INITIALIZING STUDIO...</div>

    <div id="info">
        <h2 id="gameNameDisplay" style="margin:0; color:var(--primary);">BUBBLE STUDIO</h2>
        <p id="status">Status: LOADING...</p>
        <div id="coords">POS - X: 0 | Y: 0 | Z: 0</div>
    </div>

    <div id="settings-panel" style="display:none;">
        <div class="setting-group">
            <label>Move Speed</label>
            <input type="range" id="speed-slider" min="0.05" max="0.30" step="0.01" value="0.12">
        </div>
        <div class="setting-group">
            <label>Gravity</label>
            <input type="range" id="gravity-slider" min="0.001" max="0.02" step="0.001" value="0.008">
        </div>
    </div>

    <div id="item-selector" style="display:none;">
        <div class="item-card selected" onclick="selectItem('block')" id="card-block">
            <div class="item-icon icon-block"></div>
            <div class="item-label">Block</div>
        </div>
        <div class="item-card" onclick="selectItem('spawn')" id="card-spawn">
            <div class="item-icon icon-spawn"></div>
            <div class="item-label">Spawn</div>
        </div>
    </div>

    <div id="top-bar" class="controls">
        <button id="playTestBtn" onclick="togglePlayTest()">PLAY TEST ▶</button>
        <button id="publishBtn" onclick="publishGame()" style="display:none;">PUBLISH 🚀</button>
        <button id="dragModeBtn" onclick="toggleTool('drag')" style="display:none;">DRAG PART</button>
        <button id="deleteModeBtn" onclick="toggleTool('delete')" style="display:none;">DELETE</button>
        <button onclick="exitGame()">EXIT STUDIO</button>
    </div>
    <div id="crosshair"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="importmap">
    { 
        "imports": { 
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        } 
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { TransformControls } from 'three/addons/controls/TransformControls.js';

        const SUPABASE_URL = 'https://sideqpofgknyfagrjnke.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_ULjlm97u7-dg8ekTPU84aA_rA1CtUnH';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = "Guest";
        let isOwner = false;

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0c);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.rotation.order = "YXZ"; 
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1.2));
        const grid = new THREE.GridHelper(100, 100, 0x00d4ff, 0x222222);
        scene.add(grid);

        const floor = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.MeshBasicMaterial({ visible: false }));
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        const objects = [floor];
        const gizmo = new TransformControls(camera, renderer.domElement);
        scene.add(gizmo);

        let isPlayMode = false;
        let currentTool = 'place';
        let selectedItemType = 'block';
        let isDraggingCam = false;
        let prevMouse = { x: 0, y: 0 };
        let velocityY = 0, isGrounded = false;
        let spawnPoint = null;
        let editorCamPos = new THREE.Vector3(0, 5, 10);
        let editorCamRot = new THREE.Euler(0, 0, 0);
        const keys = {};

        window.selectItem = (t) => {
            selectedItemType = t; currentTool = 'place'; gizmo.detach();
            document.querySelectorAll('.item-card').forEach(c => c.classList.remove('selected'));
            document.getElementById(`card-${t}`).classList.add('selected');
        };

        window.toggleTool = (tool) => {
            currentTool = (currentTool === tool) ? 'place' : tool;
            gizmo.detach();
            document.getElementById('dragModeBtn').classList.toggle('active-tool', currentTool === 'drag');
            document.getElementById('deleteModeBtn').classList.toggle('active-tool', currentTool === 'delete');
        };

        window.exitGame = () => window.location.href = 'index.html';

        window.togglePlayTest = () => {
            isPlayMode = !isPlayMode;
            const btn = document.getElementById('playTestBtn');
            const ui = ['publishBtn', 'dragModeBtn', 'deleteModeBtn', 'item-selector', 'settings-panel'];
            
            if (isPlayMode) {
                if (!spawnPoint) { alert("Place a Spawn Point first!"); isPlayMode = false; return; }
                editorCamPos.copy(camera.position);
                editorCamRot.copy(camera.rotation);
                btn.innerText = "STOP TEST ⏹"; btn.classList.add('playing');
                document.getElementById('crosshair').style.display = 'block';
                ui.forEach(id => document.getElementById(id).style.display = 'none');
                gizmo.detach();
                camera.position.set(spawnPoint.position.x, spawnPoint.position.y + 1.6, spawnPoint.position.z);
            } else {
                btn.innerText = "PLAY TEST ▶"; btn.classList.remove('playing');
                document.getElementById('crosshair').style.display = 'none';
                if(isOwner) ui.forEach(id => document.getElementById(id).style.display = 'flex');
                camera.position.copy(editorCamPos);
                camera.rotation.copy(editorCamRot);
            }
        };

        window.publishGame = async () => {
            if (!spawnPoint) return alert("Missing Spawn Point!");
            const name = prompt("Name your creation:");
            if (!name) return;
            const blocksData = objects.filter(o => o !== floor).map(o => ({
                x: o.position.x, y: o.position.y, z: o.position.z, 
                type: (o === spawnPoint) ? 'spawn' : 'block'
            }));
            await supabaseClient.from('games').insert([{ name, creator: currentUser, blocks: blocksData }]);
            alert("Published!"); window.location.href = 'index.html';
        };

        async function init() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (user) {
                currentUser = user.email.split('@')[0];
                isOwner = currentUser === "abraham";
            }

            const id = localStorage.getItem('currentGameId');
            const isNew = localStorage.getItem('isNewGame') === 'true';
            const editMode = localStorage.getItem('editMode') === 'true';

            if (!isNew && id) {
                const { data: game } = await supabaseClient.from('games').select('*').eq('id', id).single();
                if (game && game.blocks) {
                    game.blocks.forEach(b => {
                        const isSpawn = b.type === 'spawn';
                        const m = new THREE.Mesh(
                            isSpawn ? new THREE.BoxGeometry(1.2, 0.2, 1.2) : new THREE.BoxGeometry(1, 1, 1),
                            new THREE.MeshStandardMaterial({ color: isSpawn ? 0x00ffff : 0xcccccc })
                        );
                        m.position.set(b.x, b.y, b.z);
                        scene.add(m); objects.push(m);
                        if (isSpawn) spawnPoint = m;
                    });
                }
            }

            if (isOwner && editMode) {
                document.getElementById('status').innerText = "Status: STUDIO MODE";
                ['publishBtn', 'dragModeBtn', 'deleteModeBtn', 'item-selector', 'settings-panel'].forEach(id => document.getElementById(id).style.display = 'flex');
                camera.position.set(0, 5, 10);
                isPlayMode = false;
            } else {
                isPlayMode = true;
                document.getElementById('playTestBtn').style.display = 'none';
                document.getElementById('crosshair').style.display = 'block';
                if (spawnPoint) {
                    camera.position.set(spawnPoint.position.x, spawnPoint.position.y + 1.6, spawnPoint.position.z);
                } else {
                    camera.position.set(0, 5, 10);
                }
            }

            document.getElementById('loading-overlay').style.display = 'none';
            animate();
        }

        window.addEventListener('pointerdown', (e) => {
            if (e.target.closest('button') || e.target.closest('.item-card') || e.target.closest('input')) return;
            const mouseVec = new THREE.Vector2((e.clientX / window.innerWidth) * 2 - 1, -(e.clientY / window.innerHeight) * 2 + 1);
            const ray = new THREE.Raycaster();
            ray.setFromCamera(mouseVec, camera);
            const hits = ray.intersectObjects(objects);

            if (!isPlayMode) {
                if (currentTool === 'drag' && hits.length > 0 && hits[0].object !== floor) {
                    gizmo.attach(hits[0].object);
                } else if (currentTool === 'place' && hits.length > 0) {
                    const isSpawn = selectedItemType === 'spawn';
                    const m = new THREE.Mesh(
                        isSpawn ? new THREE.BoxGeometry(1.2, 0.2, 1.2) : new THREE.BoxGeometry(1, 1, 1),
                        new THREE.MeshStandardMaterial({ color: isSpawn ? 0x00ffff : 0xcccccc })
                    );
                    const p = hits[0].point.clone().add(hits[0].face.normal.multiplyScalar(0.5));
                    m.position.set(Math.round(p.x), isSpawn ? 0.1 : Math.round(p.y), Math.round(p.z));
                    scene.add(m); objects.push(m);
                    if (isSpawn) { 
                        if (spawnPoint) { 
                            scene.remove(spawnPoint); 
                            const idx = objects.indexOf(spawnPoint);
                            if(idx > -1) objects.splice(idx, 1);
                        }
                        spawnPoint = m; 
                    }
                } else if (currentTool === 'delete' && hits.length > 0 && hits[0].object !== floor) {
                    if(hits[0].object === spawnPoint) spawnPoint = null;
                    scene.remove(hits[0].object); 
                    const idx = objects.indexOf(hits[0].object);
                    if(idx > -1) objects.splice(idx, 1);
                    gizmo.detach();
                } else if (!gizmo.dragging) {
                    isDraggingCam = true; prevMouse = { x: e.clientX, y: e.clientY };
                }
            }
        });

        window.addEventListener('pointermove', (e) => {
            if (!isDraggingCam || isPlayMode) return;
            camera.rotation.y -= (e.clientX - prevMouse.x) * 0.003;
            camera.rotation.x -= (e.clientY - prevMouse.y) * 0.003;
            prevMouse = { x: e.clientX, y: e.clientY };
        });

        window.addEventListener('pointerup', () => isDraggingCam = false);
        window.addEventListener('keydown', (e) => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);

        function animate() {
            requestAnimationFrame(animate);
            const speed = parseFloat(document.getElementById('speed-slider').value);
            const gravity = parseFloat(document.getElementById('gravity-slider').value);

            if (isPlayMode) {
                const ray = new THREE.Raycaster(camera.position, new THREE.Vector3(0, -1, 0), 0, 1.6);
                const ground = ray.intersectObjects(objects);
                if (ground.length > 0) {
                    if (velocityY < 0) velocityY = 0;
                    isGrounded = true;
                } else {
                    velocityY -= gravity;
                    isGrounded = false;
                }
                if (keys[' '] && isGrounded) velocityY = 0.15;
                camera.position.y += velocityY;

                let move = new THREE.Vector3();
                if (keys['w']) move.z -= 1; if (keys['s']) move.z += 1;
                if (keys['a']) move.x -= 1; if (keys['d']) move.x += 1;
                move.applyQuaternion(camera.quaternion);
                move.y = 0;
                camera.position.addScaledVector(move.normalize(), speed);
            } else {
                if (keys['w']) camera.translateZ(-0.2); if (keys['s']) camera.translateZ(0.2);
                if (keys['a']) camera.translateX(-0.2); if (keys['d']) camera.translateX(0.2);
            }

            document.getElementById('coords').innerText = `X: ${Math.round(camera.position.x)} | Y: ${Math.round(camera.position.y)} | Z: ${Math.round(camera.position.z)}`;
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
