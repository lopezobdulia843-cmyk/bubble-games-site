<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bubble Games - Infinite Engine</title>
    <script src="https://cdn.jsdelivr.net/npm/fengari-web@0.1.4/dist/fengari-web.js" type="text/javascript"></script>
    
    <style>
        :root { --neon: #00d4ff; --bg: #050505; --accent: #ffcc00; --danger: #ff3232; --success: #2ecc71; }
        body { margin: 0; overflow: hidden; background: var(--bg); font-family: 'Inter', system-ui, sans-serif; touch-action: none; color: white; user-select: none; -webkit-user-select: none; }
        
        /* UI LAYOUT */
        .controls { position: absolute; z-index: 10; display: flex; gap: 10px; }
        #top-bar { top: 20px; right: 20px; flex-direction: column; align-items: flex-end; }
        
        #settings-panel { 
            position: absolute; top: 100px; left: 20px; 
            background: rgba(0,0,0,0.9); padding: 15px; border-radius: 12px; 
            border: 1px solid var(--neon); width: 220px; z-index: 50;
            backdrop-filter: blur(15px); box-shadow: 0 0 20px rgba(0, 212, 255, 0.15);
        }

        /* BLOCK CODING PANEL (SCRATCH STYLE) */
        #logic-panel {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 350px; background: rgba(10, 10, 15, 0.98); border: 2px solid var(--neon); 
            border-radius: 20px; display: none; flex-direction: column; z-index: 1000; padding: 25px;
            box-shadow: 0 0 50px rgba(0,0,0,1), 0 0 20px var(--neon);
        }
        .logic-header { font-size: 18px; font-weight: 800; color: var(--neon); margin-bottom: 20px; text-align: center; letter-spacing: 1px; }
        .block-card { background: #111; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #333; position: relative; }
        .block-card::before { content: ''; position: absolute; left: 0; top: 15%; bottom: 15%; width: 5px; border-radius: 0 5px 5px 0; }
        .trigger-block::before { background: var(--accent); }
        .action-block::before { background: var(--success); }
        .block-label { font-size: 11px; color: #888; text-transform: uppercase; margin-bottom: 8px; font-weight: bold; letter-spacing: 0.5px; }
        .block-select { width: 100%; background: #1a1a1a; color: white; border: 1px solid #444; padding: 10px; border-radius: 8px; outline: none; cursor: pointer; font-weight: 600; }
        .block-select:focus { border-color: var(--neon); }

        /* BUTTONS */
        button { 
            width: 140px; height: 48px; font-size: 13px; font-weight: bold;
            background: rgba(0, 212, 255, 0.05); color: white;
            border: 2px solid var(--neon); border-radius: 10px; cursor: pointer;
            backdrop-filter: blur(5px); transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; align-items: center; justify-content: center;
        }
        button:hover { background: rgba(0, 212, 255, 0.2); transform: translateY(-2px); }
        button:active { transform: translateY(0); }
        #publishBtn { background: var(--neon); color: #000; }
        #playTestBtn { background: var(--success); color: #000; border-color: var(--success); }
        #playTestBtn.playing { background: var(--danger) !important; color: white !important; border-color: var(--danger) !important; }
        .active-tool { background: var(--neon) !important; color: #000 !important; box-shadow: 0 0 15px var(--neon); }
        #codeBtn.active-tool { background: var(--accent) !important; border-color: var(--accent) !important; color: black !important; }

        /* ITEM SELECTOR */
        #item-selector { 
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 15px; background: rgba(0,0,0,0.85); padding: 12px;
            border-radius: 18px; border: 2px solid #333; z-index: 20;
        }
        .item-card {
            width: 65px; height: 65px; border-radius: 12px; border: 2px solid #444;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; background: #111; transition: 0.2s;
        }
        .item-card.selected { border-color: var(--neon); background: rgba(0, 212, 255, 0.15); box-shadow: 0 0 10px var(--neon); }
        .item-icon { width: 28px; height: 28px; margin-bottom: 4px; border-radius: 4px; }
        .icon-block { background: #888; border: 1px solid #aaa; }
        .icon-spawn { background: #00ffff; box-shadow: 0 0 10px #00ffff; }
        .item-label { font-size: 10px; font-weight: bold; color: white; }

        /* HUD & CHAT */
        #info { position: absolute; top: 15px; left: 20px; pointer-events: none; z-index: 80; }
        #coords { font-family: 'JetBrains Mono', monospace; color: var(--neon); font-size: 12px; background: rgba(0,0,0,0.6); padding: 8px; border-radius: 6px; margin-top: 10px; border-left: 3px solid var(--neon); }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 12px; height: 12px; border: 2px solid white; border-radius: 50%; transform: translate(-50%, -50%); display: none; pointer-events: none; z-index: 80; }
        #loading-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; align-items: center; justify-content: center; color: var(--neon); font-weight: bold; letter-spacing: 5px; font-size: 1.2rem; }

        .player-label {
            position: absolute; background: rgba(0,0,0,0.85); color: var(--neon);
            padding: 3px 12px; border-radius: 6px; font-size: 12px; font-weight: 800;
            border: 1px solid var(--neon); pointer-events: none; white-space: nowrap;
            transform: translate(-50%, -150%); z-index: 5; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        #chat-container {
            position: absolute; bottom: 130px; left: 20px; width: 280px;
            height: 200px; display: flex; flex-direction: column;
            z-index: 60; pointer-events: none;
        }
        #chat-messages {
            flex-grow: 1; overflow-y: auto; background: rgba(0,0,0,0.3);
            border-radius: 8px; padding: 10px; font-size: 13px;
            display: flex; flex-direction: column; gap: 6px;
            mask-image: linear-gradient(to bottom, transparent, black 15%);
        }
        #chat-input {
            margin-top: 8px; background: rgba(0,0,0,0.9); border: 1px solid var(--neon);
            color: white; padding: 12px; border-radius: 8px; pointer-events: auto; outline: none; font-size: 13px;
        }

        /* MOBILE CONTROLS */
        #mobile-controls { position: fixed; inset: 0; pointer-events: none; z-index: 90; display: none; }
        #joystick-zone { position: absolute; left: 0; bottom: 0; width: 45vw; height: 50vh; pointer-events: auto; }
        #joystick-base { position: absolute; width: 120px; height: 120px; background: rgba(255,255,255,0.05); border-radius: 50%; border: 2px solid var(--neon); display: none; }
        #joystick-stick { position: absolute; left: 50%; top: 50%; width: 50px; height: 50px; background: var(--neon); border-radius: 50%; transform: translate(-50%, -50%); opacity: 0.5; }
        #jump-btn { position: absolute; right: 40px; bottom: 40px; width: 85px; height: 85px; background: rgba(0, 212, 255, 0.1); border: 2px solid var(--neon); border-radius: 50%; color: var(--neon); display: flex; align-items: center; justify-content: center; font-weight: 900; pointer-events: auto; box-shadow: 0 0 15px rgba(0,212,255,0.2); }
    </style>
</head>
<body>
    <div id="loading-overlay">INITIALIZING SYSTEMS...</div>

    <div id="info">
        <h2 id="gameNameDisplay" style="margin:0; color:var(--neon); text-transform: uppercase; letter-spacing: 3px; font-style: italic;">BUBBLE GAMES</h2>
        <div id="coords">X: 0.00 | Y: 0.00 | Z: 0.00</div>
    </div>

    <!-- Logic Blocks UI -->
    <div id="logic-panel">
        <div class="logic-header">LOGIC BLOCK EDITOR</div>
        
        <div class="block-card trigger-block">
            <div class="block-label">When this happens...</div>
            <select id="trigger-select" class="block-select">
                <option value="none">Choose a Trigger</option>
                <option value="touch">Player Touches Block</option>
                <option value="click">Player Clicks Block</option>
                <option value="spawn">Level Starts</option>
            </select>
        </div>

        <div class="block-card action-block">
            <div class="block-label">Do this...</div>
            <select id="action-select" class="block-select">
                <option value="none">Choose an Action</option>
                <option value="kill">Kill & Respawn</option>
                <option value="win">Win / Victory Screen</option>
                <option value="speed">Speed Boost (+100%)</option>
                <option value="jump">Super Jump Boost</option>
                <option value="gravity">Zero Gravity Toggle</option>
                <option value="color">Random Color Pulse</option>
                <option value="teleport">Teleport to Spawn</option>
            </select>
        </div>

        <div style="display:flex; gap:12px; margin-top:10px;">
            <button onclick="applyLogic()" style="background:var(--neon); color:black; width:100%; border:none;">SAVE BLOCKS</button>
            <button onclick="closeLogic()" style="background:#222; width:100%; border:1px solid #444;">DISCARD</button>
        </div>
    </div>

    <div id="mobile-controls">
        <div id="joystick-zone"><div id="joystick-base"><div id="joystick-stick"></div></div></div>
        <div id="jump-btn">JUMP</div>
    </div>

    <div id="chat-container">
        <div id="chat-messages"></div>
        <input type="text" id="chat-input" placeholder="Say something..." autocomplete="off">
    </div>

    <div id="settings-panel">
        <label style="font-size:10px; color:var(--neon); font-weight:bold; letter-spacing:1px;">ENGINE SETTINGS</label>
        <div class="setting-group" style="margin-top:15px;">
            <div style="font-size:10px; margin-bottom:5px; color:#888;">WALK SPEED</div>
            <input type="range" id="speed-slider" min="0.05" max="0.6" step="0.01" value="0.12" style="width:100%;">
        </div>
        <div class="setting-group" style="margin-top:15px;">
            <div style="font-size:10px; margin-bottom:5px; color:#888;">GRAVITY STRENGTH</div>
            <input type="range" id="gravity-slider" min="0.005" max="0.06" step="0.001" value="0.015" style="width:100%;">
        </div>
        <div id="part-settings" style="display:none; border-top: 1px solid #333; padding-top:10px; margin-top:15px;">
            <div style="font-size:10px; margin-bottom:5px; color:#888;">PART SCALE</div>
            <input type="range" id="size-slider" min="0.5" max="15" step="0.1" value="1" style="width:100%;">
        </div>
    </div>

    <div id="item-selector">
        <div class="item-card selected" onclick="selectItem('block')" id="card-block">
            <div class="item-icon icon-block"></div>
            <div class="item-label">BLOCK</div>
        </div>
        <div class="item-card" onclick="selectItem('spawn')" id="card-spawn">
            <div class="item-icon icon-spawn"></div>
            <div class="item-label">SPAWN</div>
        </div>
    </div>

    <div id="top-bar" class="controls">
        <button id="playTestBtn" onclick="togglePlayTest()">PLAY TEST ▶</button>
        <button id="publishBtn" onclick="publishGame()">PUBLISH 🚀</button>
        <button id="dragModeBtn" onclick="toggleTool('drag')">DRAG PART</button>
        <button id="codeBtn" onclick="toggleTool('code')">CODE BLOCKS</button>
        <button id="deleteModeBtn" onclick="toggleTool('delete')">DELETE</button>
        <button onclick="exitGame()">EXIT</button>
    </div>
    <div id="crosshair"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="importmap">
    { 
        "imports": { 
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        } 
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { TransformControls } from 'three/addons/controls/TransformControls.js';

        // --- MULTIPLAYER CONFIG ---
        const SUPABASE_URL = window.location.origin + '/supabase';
        const SUPABASE_KEY = 'sb_publishable_ULjlm97u7-dg8ekTPU84aA_rA1CtUnH';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = "Guest_" + Math.floor(Math.random() * 9999);
        const gameId = localStorage.getItem('currentGameId') || 'lobby_world';
        const channel = supabaseClient.channel(`room_${gameId}`, {
            config: { presence: { key: currentUser } }
        });

        // --- ENGINE CORE ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020205);
        scene.fog = new THREE.FogExp2(0x020205, 0.01);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const ambient = new THREE.AmbientLight(0xffffff, 0.8);
        const sun = new THREE.DirectionalLight(0x00d4ff, 1.5);
        sun.position.set(10, 20, 10);
        scene.add(ambient, sun);

        const grid = new THREE.GridHelper(500, 100, 0x00d4ff, 0x111111);
        grid.position.y = -0.01;
        scene.add(grid);

        const floor = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshBasicMaterial({ visible: false }));
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        const objects = [floor];
        const blockGeo = new THREE.BoxGeometry(1, 1, 1);
        const gizmo = new TransformControls(camera, renderer.domElement);
        gizmo.setSize(0.8);
        scene.add(gizmo);

        let remotePlayers = {};
        let scripts = new Map(); 
        let isPlayMode = false;
        let moveSpeed = 0.12;
        let worldGravity = 0.015;
        let velocityY = 0;
        let isGrounded = false;
        let spawnPoint = null;
        let currentTool = 'place';
        let selectedItem = 'block';
        const keys = {};

        // --- MULTIPLAYER SYNC ---
        channel
            .on('presence', { event: 'sync' }, () => {
                const state = channel.presenceState();
                Object.keys(state).forEach(id => {
                    if (id !== currentUser && !remotePlayers[id]) spawnRemotePlayer(id);
                });
            })
            .on('presence', { event: 'leave' }, ({ leftPresences }) => {
                leftPresences.forEach(p => {
                    const id = p.key;
                    if (remotePlayers[id]) {
                        scene.remove(remotePlayers[id].mesh);
                        remotePlayers[id].label.remove();
                        delete remotePlayers[id];
                    }
                });
            })
            .on('broadcast', { event: 'pos' }, ({ payload }) => {
                if (payload.id === currentUser) return;
                if (!remotePlayers[payload.id]) spawnRemotePlayer(payload.id);
                remotePlayers[payload.id].mesh.position.lerp(new THREE.Vector3(payload.x, payload.y - 0.9, payload.z), 0.3);
            })
            .on('broadcast', { event: 'chat' }, ({ payload }) => addChatMessage(payload.user, payload.text))
            .subscribe(async (s) => { if (s === 'SUBSCRIBED') await channel.track({ active: true }); });

        function spawnRemotePlayer(id) {
            const m = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.8, 0.8), new THREE.MeshStandardMaterial({ color: 0x00d4ff, emissive: 0x00d4ff, emissiveIntensity: 0.2 }));
            scene.add(m);
            const l = document.createElement('div');
            l.className = 'player-label';
            l.innerText = id.split('_')[0];
            document.body.appendChild(l);
            remotePlayers[id] = { mesh: m, label: l };
        }

        // --- BLOCK LOGIC ENGINE ---
        let selectedLogicObject = null;
        window.applyLogic = () => {
            const trigger = document.getElementById('trigger-select').value;
            const action = document.getElementById('action-select').value;
            if (selectedLogicObject && trigger !== 'none' && action !== 'none') {
                scripts.set(selectedLogicObject.uuid, { trigger, action });
                selectedLogicObject.material.emissive = new THREE.Color(0x00ff00);
                selectedLogicObject.material.emissiveIntensity = 0.3;
            }
            closeLogic();
        };

        window.closeLogic = () => { document.getElementById('logic-panel').style.display = 'none'; selectedLogicObject = null; };

        function executeLogic(obj, triggerType) {
            if (!obj) return;
            const data = scripts.get(obj.uuid);
            if (!data || data.trigger !== triggerType) return;

            switch(data.action) {
                case 'kill': respawn(); break;
                case 'win': alert("VICTORY ACHIEVED!"); respawn(); break;
                case 'teleport': respawn(); break;
                case 'speed': 
                    const s = moveSpeed; moveSpeed *= 2; 
                    setTimeout(() => moveSpeed = s, 2000); 
                    break;
                case 'jump': velocityY = 0.45; break;
                case 'gravity':
                    const g = worldGravity; worldGravity = 0.002;
                    setTimeout(() => worldGravity = g, 4000);
                    break;
                case 'color': obj.material.color.setHex(Math.random() * 0xffffff); break;
            }
        }

        function respawn() {
            if (spawnPoint) camera.position.set(spawnPoint.position.x, spawnPoint.position.y + 1.5, spawnPoint.position.z);
            else camera.position.set(0, 1.5, 5);
            velocityY = 0;
        }

        // --- ENGINE CONTROLS ---
        window.togglePlayTest = () => {
            isPlayMode = !isPlayMode;
            const btn = document.getElementById('playTestBtn');
            btn.classList.toggle('playing', isPlayMode);
            btn.innerText = isPlayMode ? "STOP TEST ⏹" : "PLAY TEST ▶";
            document.getElementById('crosshair').style.display = isPlayMode ? 'block' : 'none';
            gizmo.detach();
            if (isPlayMode) {
                respawn();
                objects.forEach(obj => executeLogic(obj, 'spawn'));
            }
        };

        window.selectItem = (t) => {
            selectedItem = t;
            document.querySelectorAll('.item-card').forEach(c => c.classList.remove('selected'));
            document.getElementById('card-' + t).classList.add('selected');
        };

        window.toggleTool = (t) => {
            currentTool = (currentTool === t) ? 'place' : t;
            ['dragModeBtn', 'deleteModeBtn', 'codeBtn'].forEach(id => {
                const el = document.getElementById(id);
                if(el) el.classList.remove('active-tool');
            });
            const activeEl = document.getElementById(currentTool + (currentTool === 'code' ? 'Btn' : 'ModeBtn'));
            if (activeEl) activeEl.classList.add('active-tool');
            if (currentTool !== 'drag') gizmo.detach();
        };

        // --- INPUT HANDLING ---
        window.addEventListener('keydown', (e) => { keys[e.code] = true; if(e.code === 'Enter') document.getElementById('chat-input').focus(); });
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        renderer.domElement.addEventListener('pointerdown', (e) => {
            if (isPlayMode) {
                const ray = new THREE.Raycaster();
                ray.setFromCamera(new THREE.Vector2(0,0), camera);
                const hits = ray.intersectObjects(objects);
                if (hits.length > 0) executeLogic(hits[0].object, 'click');
                return;
            }

            const mouse = new THREE.Vector2((e.clientX / window.innerWidth) * 2 - 1, -(e.clientY / window.innerHeight) * 2 + 1);
            const ray = new THREE.Raycaster();
            ray.setFromCamera(mouse, camera);
            const hits = ray.intersectObjects(objects);

            if (hits.length > 0) {
                const hit = hits[0];
                if (currentTool === 'place') {
                    const isSpawn = selectedItem === 'spawn';
                    const mat = new THREE.MeshStandardMaterial({ 
                        color: isSpawn ? 0x00ffff : 0x444444,
                        roughness: 0.2, metalness: 0.8
                    });
                    const m = new THREE.Mesh(isSpawn ? new THREE.BoxGeometry(1, 0.2, 1) : blockGeo, mat);
                    m.position.copy(hit.point).add(hit.face.normal.multiplyScalar(0.5));
                    m.position.set(Math.round(m.position.x), isSpawn ? 0.1 : Math.round(m.position.y), Math.round(m.position.z));
                    scene.add(m); objects.push(m);
                    if (isSpawn) { if(spawnPoint) scene.remove(spawnPoint); spawnPoint = m; }
                } else if (currentTool === 'delete' && hit.object !== floor) {
                    scene.remove(hit.object);
                    objects.splice(objects.indexOf(hit.object), 1);
                } else if (currentTool === 'drag' && hit.object !== floor) {
                    gizmo.attach(hit.object);
                } else if (currentTool === 'code' && hit.object !== floor) {
                    selectedLogicObject = hit.object;
                    document.getElementById('logic-panel').style.display = 'flex';
                }
            }
        });

        // --- MAIN RENDER LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            
            if (isPlayMode) {
                velocityY -= worldGravity;
                camera.position.y += velocityY;

                const ray = new THREE.Raycaster(camera.position, new THREE.Vector3(0, -1, 0), 0, 1.6);
                const hits = ray.intersectObjects(objects.filter(o => o !== floor));
                
                if (hits.length > 0 || camera.position.y <= 1.5) {
                    if (camera.position.y <= 1.5) {
                        camera.position.y = 1.5; isGrounded = true; velocityY = 0;
                    } else {
                        camera.position.y = hits[0].point.y + 1.5;
                        isGrounded = true; velocityY = 0;
                        executeLogic(hits[0].object, 'touch');
                    }
                } else { isGrounded = false; }

                const move = new THREE.Vector3();
                if (keys['KeyW']) move.z -= 1;
                if (keys['KeyS']) move.z += 1;
                if (keys['KeyA']) move.x -= 1;
                if (keys['KeyD']) move.x += 1;

                if (move.length() > 0) {
                    move.applyQuaternion(camera.quaternion);
                    move.y = 0; move.normalize();
                    camera.position.addScaledVector(move, moveSpeed);
                }

                if (keys['Space'] && isGrounded) { velocityY = 0.3; isGrounded = false; }

                if (Math.random() > 0.8) {
                    channel.send({ type: 'broadcast', event: 'pos', payload: { id: currentUser, x: camera.position.x, y: camera.position.y, z: camera.position.z } });
                }
            } else {
                if (keys['KeyW']) camera.translateZ(-0.3);
                if (keys['KeyS']) camera.translateZ(0.3);
                if (keys['KeyA']) camera.translateX(-0.3);
                if (keys['KeyD']) camera.translateX(0.3);
            }

            for (let id in remotePlayers) {
                const p = remotePlayers[id];
                const vec = p.mesh.position.clone().add(new THREE.Vector3(0, 1.2, 0)).project(camera);
                p.label.style.left = (vec.x * 0.5 + 0.5) * window.innerWidth + 'px';
                p.label.style.top = -(vec.y * 0.5 - 0.5) * window.innerHeight + 'px';
                p.label.style.display = (vec.z < 1) ? 'block' : 'none';
            }

            document.getElementById('coords').innerText = `X: ${camera.position.x.toFixed(2)} | Y: ${camera.position.y.toFixed(2)} | Z: ${camera.position.z.toFixed(2)}`;
            renderer.render(scene, camera);
        }

        function addChatMessage(u, t) {
            const div = document.createElement('div');
            div.innerHTML = `<span style="color:var(--neon); font-weight:800;">${u}:</span> <span style="color:white;">${t}</span>`;
            const container = document.getElementById('chat-messages');
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        document.getElementById('chat-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && e.target.value.trim() !== '') {
                channel.send({ type: 'broadcast', event: 'chat', payload: { user: currentUser, text: e.target.value } });
                addChatMessage("You", e.target.value);
                e.target.value = ''; e.target.blur();
            }
        });

        window.addEventListener('load', () => {
            setTimeout(() => document.getElementById('loading-overlay').style.display = 'none', 1200);
            animate();
        });

        window.exitGame = () => { location.reload(); };
        window.publishGame = () => { alert("PROJECT UPLOADED TO CLOUD SUCCESSFULLY."); };
    </script>
