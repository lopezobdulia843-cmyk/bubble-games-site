<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bubble Games</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: sans-serif; touch-action: none; color: white; user-select: none; }
        .controls { position: absolute; z-index: 10; display: flex; gap: 10px; }
        #top-bar { top: 20px; right: 20px; flex-direction: column; align-items: flex-end; }
        
        #settings-panel { 
            position: absolute; top: 100px; left: 20px; 
            background: rgba(0,0,0,0.85); padding: 15px; border-radius: 12px; 
            border: 1px solid #00d4ff; width: 200px; z-index: 50;
            backdrop-filter: blur(10px);
        }
        .setting-group { margin-bottom: 18px; }
        .label-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .setting-group label { font-size: 11px; text-transform: uppercase; color: #00d4ff; font-weight: bold; }
        
        .num-input {
            width: 50px; background: #111; border: 1px solid #444; color: #00d4ff;
            font-size: 12px; border-radius: 4px; padding: 2px 4px; text-align: center;
        }
        button { 
            width: 140px; height: 50px; font-size: 14px; font-weight: bold;
            background: rgba(0, 212, 255, 0.1); color: white;
            border: 2px solid #00d4ff; border-radius: 10px; cursor: pointer;
            backdrop-filter: blur(5px); margin-bottom: 5px;
            display: flex; align-items: center; justify-content: center; transition: 0.2s;
        }
        #playTestBtn.playing { background: #e74c3c; color: white; border-color: #e74c3c; }

        #item-selector { 
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 15px; background: rgba(0,0,0,0.8); padding: 10px;
            border-radius: 15px; border: 2px solid #333; z-index: 20;
        }
        .item-card { width: 60px; height: 60px; border-radius: 10px; border: 2px solid #444; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; background: #111; }
        .item-card.selected { border-color: #00d4ff; background: rgba(0, 212, 255, 0.2); }
        
        #crosshair { 
            position: absolute; top: 50%; left: 50%; width: 6px; height: 6px; 
            background: white; border-radius: 50%; transform: translate(-50%, -50%); 
            display: none; pointer-events: none; z-index: 100;
        }

        /* Mobile Joystick */
        #joystick-wrapper {
            position: absolute; bottom: 50px; left: 50px; width: 120px; height: 120px;
            background: rgba(255,255,255,0.1); border-radius: 50%; display: none; z-index: 1000;
        }
        #joystick-knob {
            position: absolute; top: 50%; left: 50%; width: 50px; height: 50px;
            background: #00d4ff; border-radius: 50%; transform: translate(-50%, -50%);
        }
        #jump-btn-mobile {
            position: absolute; bottom: 60px; right: 50px; width: 70px; height: 70px;
            background: rgba(0,212,255,0.3); border: 2px solid #00d4ff; border-radius: 50%;
            display: none; z-index: 1000; justify-content: center; align-items: center; font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="loading-overlay" style="position:fixed; inset:0; background:#050505; z-index:100; display:flex; align-items:center; justify-content:center; color:#00d4ff;">INITIALIZING...</div>

    <div id="info" style="position:absolute; top:10px; left:10px; pointer-events:none;">
        <h2 id="gameNameDisplay" style="margin:0; color:#00d4ff;">BUBBLE GAMES</h2>
        <div id="coords" style="font-family:monospace; color:#00d4ff; background:rgba(0,0,0,0.5); padding:5px; border-radius:5px;">X: 0 | Y: 0 | Z: 0</div>
    </div>

    <div id="joystick-wrapper"><div id="joystick-knob"></div></div>
    <div id="jump-btn-mobile">JUMP</div>

    <div id="settings-panel" style="display:none;">
        <div class="setting-group">
            <label>Move Speed</label>
            <input type="range" id="speed-slider" min="0.05" max="0.5" step="0.01" value="0.15">
        </div>
        <div class="setting-group">
            <label>Gravity</label>
            <input type="range" id="gravity-slider" min="0.005" max="0.05" step="0.001" value="0.015">
        </div>
    </div>

    <div id="item-selector" style="display:none;">
        <div class="item-card selected" onclick="selectItem('block')" id="card-block"><div style="width:20px;height:20px;background:#ccc"></div></div>
        <div class="item-card" onclick="selectItem('spawn')" id="card-spawn"><div style="width:20px;height:5px;background:#00ffff"></div></div>
    </div>

    <div id="top-bar" class="controls">
        <button id="playTestBtn" onclick="togglePlayTest()">PLAY TEST ▶</button>
        <button onclick="exitGame()">EXIT</button>
    </div>
    <div id="crosshair"></div>

    <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { TransformControls } from 'three/addons/controls/TransformControls.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0c);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.rotation.order = "YXZ";
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1.2));
        const grid = new THREE.GridHelper(100, 100, 0x00d4ff, 0x222222);
        scene.add(grid);

        const floor = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.MeshBasicMaterial({ visible: false }));
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        const objects = [floor];
        const blockGeo = new THREE.BoxGeometry(1, 1, 1);
        const spawnGeo = new THREE.BoxGeometry(1, 0.2, 1);
        const spawnMat = new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x00ffff });

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        
        // Physics Helpers
        const downRay = new THREE.Raycaster();
        const sideRay = new THREE.Raycaster();

        let isPlayMode = false;
        let moveSpeed = 0.15;
        let worldGravity = 0.015;
        let velocityY = 0;
        let isGrounded = false;
        let spawnPoint = null;
        let currentTool = 'place';
        let selectedItemType = 'block';

        const playerHeight = 1.6;
        const playerRadius = 0.4;
        const jumpPower = 0.3;

        // --- MOBILE JOYSTICK LOGIC ---
        let joystickActive = false;
        let joystickPos = { x: 0, y: 0 };
        const joystickWrapper = document.getElementById('joystick-wrapper');
        const joystickKnob = document.getElementById('joystick-knob');
        const mobileJump = document.getElementById('jump-btn-mobile');

        const handleJoystick = (e) => {
            if (!joystickActive) return;
            const touch = e.touches ? e.touches[0] : e;
            const rect = joystickWrapper.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            let dx = touch.clientX - centerX;
            let dy = touch.clientY - centerY;
            const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 50);
            const angle = Math.atan2(dy, dx);
            
            joystickPos.x = (Math.cos(angle) * dist) / 50;
            joystickPos.y = (Math.sin(angle) * dist) / 50;
            
            joystickKnob.style.transform = `translate(calc(-50% + ${Math.cos(angle)*dist}px), calc(-50% + ${Math.sin(angle)*dist}px))`;
        };

        joystickWrapper.addEventListener('touchstart', (e) => { joystickActive = true; handleJoystick(e); });
        window.addEventListener('touchmove', handleJoystick);
        window.addEventListener('touchend', () => { 
            joystickActive = false; 
            joystickPos = { x: 0, y: 0 }; 
            joystickKnob.style.transform = `translate(-50%, -50%)`;
        });
        mobileJump.addEventListener('touchstart', () => { if(isGrounded) velocityY = jumpPower; });

        // --- POINTER LOCK & CAMERA ---
        const requestLock = () => {
            if (isPlayMode && !document.pointerLockElement) {
                renderer.domElement.requestPointerLock();
            }
        };

        renderer.domElement.addEventListener('click', requestLock);

        window.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement === renderer.domElement || (isPlayMode && 'ontouchstart' in window)) {
                const movementX = e.movementX || 0;
                const movementY = e.movementY || 0;
                camera.rotation.y -= movementX * 0.002;
                camera.rotation.x -= movementY * 0.002;
                camera.rotation.x = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, camera.rotation.x));
            }
        });

        // Mobile Look Logic (Right side of screen)
        let lastTouchX, lastTouchY;
        window.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            if (touch.clientX > window.innerWidth / 2) {
                if (lastTouchX !== undefined) {
                    camera.rotation.y -= (touch.clientX - lastTouchX) * 0.005;
                    camera.rotation.x -= (touch.clientY - lastTouchY) * 0.005;
                    camera.rotation.x = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, camera.rotation.x));
                }
                lastTouchX = touch.clientX;
                lastTouchY = touch.clientY;
            }
        }, { passive: false });
        window.addEventListener('touchend', () => { lastTouchX = undefined; });

        window.togglePlayTest = () => {
            isPlayMode = !isPlayMode;
            const btn = document.getElementById('playTestBtn');
            const isMobile = 'ontouchstart' in window;

            if (isPlayMode) {
                if (!spawnPoint) { alert("Place a Spawn Point first!"); isPlayMode = false; return; }
                btn.innerText = "STOP ⏹";
                btn.classList.add('playing');
                document.getElementById('crosshair').style.display = 'block';
                if (!isMobile) renderer.domElement.requestPointerLock();
                else { joystickWrapper.style.display = 'block'; mobileJump.style.display = 'flex'; }
                camera.position.set(spawnPoint.position.x, spawnPoint.position.y + playerHeight, spawnPoint.position.z);
                velocityY = 0;
            } else {
                btn.innerText = "PLAY TEST ▶";
                btn.classList.remove('playing');
                document.getElementById('crosshair').style.display = 'none';
                document.exitPointerLock();
                joystickWrapper.style.display = 'none';
                mobileJump.style.display = 'none';
            }
        };

        // --- BUILDING LOGIC ---
        window.selectItem = (t) => { selectedItemType = t; };
        window.exitGame = () => { location.reload(); };

        window.addEventListener('pointerdown', (e) => {
            if (isPlayMode || e.target !== renderer.domElement) return;
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const hits = raycaster.intersectObjects(objects);
            if (hits.length > 0) {
                const hit = hits[0];
                if (selectedItemType === 'block') {
                    const m = new THREE.Mesh(blockGeo, new THREE.MeshStandardMaterial({ color: 0x888888 }));
                    m.position.copy(hit.point).add(hit.face.normal.multiplyScalar(0.5)).round();
                    scene.add(m); objects.push(m);
                } else {
                    if (spawnPoint) { scene.remove(spawnPoint); objects.splice(objects.indexOf(spawnPoint), 1); }
                    spawnPoint = new THREE.Mesh(spawnGeo, spawnMat);
                    spawnPoint.position.copy(hit.point).add(hit.face.normal.multiplyScalar(0.1));
                    scene.add(spawnPoint); objects.push(spawnPoint);
                }
            }
        });

        const keys = {};
        window.addEventListener('keydown', (e) => keys[e.code] = true);
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        function animate() {
            requestAnimationFrame(animate);
            
            if (isPlayMode) {
                // Gravity & Floor Collision
                downRay.set(camera.position, new THREE.Vector3(0, -1, 0));
                const groundHits = downRay.intersectObjects(objects);
                
                // If ray hits something below player height
                if (groundHits.length > 0 && groundHits[0].distance <= playerHeight) {
                    isGrounded = true;
                    if (velocityY < 0) {
                        velocityY = 0;
                        camera.position.y = groundHits[0].point.y + playerHeight;
                    }
                } else {
                    isGrounded = false;
                    velocityY -= worldGravity;
                }

                if (keys['Space'] && isGrounded) velocityY = jumpPower;
                camera.position.y += velocityY;

                // Movement
                const move = new THREE.Vector3();
                if (keys['KeyW']) move.z -= 1;
                if (keys['KeyS']) move.z += 1;
                if (keys['KeyA']) move.x -= 1;
                if (keys['KeyD']) move.x += 1;
                
                // Joystick input
                if (joystickActive) {
                    move.z = joystickPos.y;
                    move.x = joystickPos.x;
                }

                if (move.length() > 0) {
                    move.normalize();
                    const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
                    forward.y = 0; forward.normalize();
                    const right = new THREE.Vector3().crossVectors(forward, new THREE.Vector3(0, 1, 0));
                    
                    const finalMove = forward.multiplyScalar(-move.z).add(right.multiplyScalar(move.x));
                    
                    // Simple wall collision
                    sideRay.set(camera.position, finalMove);
                    const wallHits = sideRay.intersectObjects(objects.filter(o => o !== floor));
                    if (wallHits.length === 0 || wallHits[0].distance > playerRadius) {
                        camera.position.add(finalMove.multiplyScalar(moveSpeed));
                    }
                }

                // Void reset
                if (camera.position.y < -20) {
                    camera.position.set(spawnPoint.position.x, spawnPoint.position.y + playerHeight, spawnPoint.position.z);
                    velocityY = 0;
                }
            } else {
                // Flying in build mode
                if (keys['KeyW']) camera.translateZ(-moveSpeed);
                if (keys['KeyS']) camera.translateZ(moveSpeed);
                if (keys['KeyA']) camera.translateX(-moveSpeed);
                if (keys['KeyD']) camera.translateX(moveSpeed);
            }

            document.getElementById('coords').innerText = `X: ${camera.position.x.toFixed(1)} | Y: ${camera.position.y.toFixed(1)} | Z: ${camera.position.z.toFixed(1)}`;
            renderer.render(scene, camera);
        }

        document.getElementById('loading-overlay').style.display = 'none';
        animate();
    </script>
</body>
</html>
