<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bubble Games | Engine</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: 'Segoe UI', sans-serif; touch-action: none; color: white; }
        .controls { position: absolute; z-index: 10; display: flex; gap: 10px; }
        #top-bar { top: 20px; right: 20px; flex-direction: column; align-items: flex-end; }
        
        #settings-panel { 
            position: absolute; top: 100px; left: 20px; 
            background: rgba(0,0,0,0.85); padding: 15px; border-radius: 12px; 
            border: 1px solid #00d4ff; width: 220px; z-index: 50;
            backdrop-filter: blur(10px);
        }
        .setting-group { margin-bottom: 15px; }
        .label-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .setting-group label { font-size: 11px; text-transform: uppercase; color: #00d4ff; font-weight: bold; }
        
        .num-input {
            width: 50px; background: #111; border: 1px solid #444; color: #00d4ff;
            font-size: 12px; border-radius: 4px; padding: 2px 4px; text-align: center;
        }

        #properties-ui {
            margin-top: 15px; border-top: 1px solid rgba(0, 212, 255, 0.3); padding-top: 15px;
        }

        input[type="range"] { width: 100%; cursor: pointer; accent-color: #00d4ff; }
        input[type="color"] { width: 100%; height: 30px; border: none; background: none; cursor: pointer; }

        button { 
            width: 140px; height: 45px; font-size: 12px; font-weight: bold;
            background: rgba(0, 212, 255, 0.1); color: white;
            border: 1px solid #00d4ff; border-radius: 8px; cursor: pointer;
            backdrop-filter: blur(5px); margin-bottom: 5px;
            display: flex; align-items: center; justify-content: center; transition: 0.2s;
            text-transform: uppercase;
        }
        
        #publishBtn { background: #00d4ff; color: #000; }
        #playTestBtn { background: #2ecc71; color: #000; border-color: #2ecc71; }
        #playTestBtn.playing { background: #e74c3c; color: white; border-color: #e74c3c; }

        .active-tool { background: #00d4ff !important; color: #000 !important; box-shadow: 0 0 15px #00d4ff; }
        #deleteModeBtn.active-tool { background: #ff3232 !important; border-color: #ff3232 !important; color: white !important; box-shadow: 0 0 15px #ff3232; }

        #item-selector { 
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 15px; background: rgba(0,0,0,0.8); padding: 10px;
            border-radius: 15px; border: 2px solid #333; z-index: 20;
        }
        .item-card {
            width: 60px; height: 60px; border-radius: 10px; border: 2px solid #444;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; background: #111; transition: 0.2s;
        }
        .item-card.selected { border-color: #00d4ff; background: rgba(0, 212, 255, 0.2); }
        .item-label { font-size: 10px; color: white; text-transform: uppercase; margin-top: 4px; }

        #info { position: absolute; top: 10px; left: 10px; color: white; pointer-events: none; }
        #coords { font-family: monospace; color: #00d4ff; margin-top: 5px; background: rgba(0,0,0,0.5); padding: 5px; border-radius: 5px; }
        #crosshair { 
            position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; 
            border: 2px solid white; border-radius: 50%; transform: translate(-50%, -50%); 
            display: none; pointer-events: none; 
        }
        #loading-overlay { position: fixed; inset: 0; background: #050505; z-index: 100; display: flex; align-items: center; justify-content: center; color: #00d4ff; font-weight: bold; }

        #chat-container { position: absolute; bottom: 120px; left: 20px; width: 250px; height: 150px; z-index: 60; pointer-events: none; }
        #chat-messages { flex-grow: 1; overflow-y: auto; background: rgba(0,0,0,0.3); border-radius: 8px; padding: 10px; font-size: 12px; display: flex; flex-direction: column; gap: 4px; }
        #chat-input { margin-top: 5px; background: rgba(0,0,0,0.8); border: 1px solid #00d4ff; color: white; padding: 8px; border-radius: 4px; pointer-events: auto; outline: none; width: 90%; }
        
        .player-label { position: absolute; background: rgba(0,0,0,0.8); color: #00d4ff; padding: 2px 8px; border-radius: 4px; font-size: 12px; pointer-events: none; transform: translate(-50%, -100%); z-index: 5; }
    </style>
</head>
<body>
    <div id="loading-overlay">INITIALIZING ENGINE...</div>

    <div id="info">
        <h2 id="gameNameDisplay" style="margin:0; color:#00d4ff;">BUBBLE GAMES</h2>
        <p id="status">Status: LOADING...</p>
        <div id="coords">POS - X: 0 | Y: 0 | Z: 0</div>
    </div>

    <div id="chat-container">
        <div id="chat-messages"></div>
        <input type="text" id="chat-input" placeholder="Press Enter to chat..." autocomplete="off">
    </div>

    <div id="settings-panel" style="display:none;">
        <div class="setting-group">
            <div class="label-container">
                <label>World Grid</label>
                <input type="checkbox" id="grid-toggle" checked>
            </div>
        </div>

        <div class="setting-group">
            <div class="label-container"><label>Move Speed</label></div>
            <input type="range" id="speed-slider" min="0.01" max="1.0" step="0.01" value="0.12">
        </div>

        <div id="properties-ui" style="display:none;">
            <label style="color: #00ff88; font-size: 10px; display: block; margin-bottom: 10px;">PROPERTIES</label>
            <div class="setting-group">
                <label>Color</label>
                <input type="color" id="prop-color">
            </div>
            <div class="setting-group">
                <label>Scale</label>
                <input type="range" id="prop-size" min="0.2" max="10" step="0.1" value="1">
            </div>
        </div>
    </div>

    <div id="item-selector" style="display:none;">
        <div class="item-card selected" onclick="selectItem('block')" id="card-block">
            <div style="width:20px; height:20px; background:#ccc; border:1px solid #fff;"></div>
            <div class="item-label">Block</div>
        </div>
        <div class="item-card" onclick="selectItem('spawn')" id="card-spawn">
            <div style="width:20px; height:5px; background:#00ffff; box-shadow:0 0 10px #00ffff;"></div>
            <div class="item-label">Spawn</div>
        </div>
    </div>

    <div id="top-bar" class="controls">
        <button id="playTestBtn" onclick="togglePlayTest()">PLAY TEST ▶</button>
        <button id="publishBtn" onclick="publishGame()" style="display:none;">PUBLISH 🚀</button>
        <button id="dragModeBtn" onclick="toggleTool('drag')" style="display:none;">MODIFY 🛠️</button>
        <button id="deleteModeBtn" onclick="toggleTool('delete')" style="display:none;">DELETE ✖</button>
        <button onclick="exitGame()">EXIT</button>
    </div>
    <div id="crosshair"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="importmap">
    { 
        "imports": { 
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        } 
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { TransformControls } from 'three/addons/controls/TransformControls.js';

        const SUPABASE_URL = 'https://sideqpofgknyfagrjnke.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_ULjlm97u7-dg8ekTPU84aA_rA1CtUnH';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = "Guest_" + Math.floor(Math.random() * 999);
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0c);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1.2));
        const gridHelper = new THREE.GridHelper(100, 100, 0x00d4ff, 0x222222);
        scene.add(gridHelper);

        const floor = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.MeshBasicMaterial({ visible: false }));
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        const objects = [floor]; 
        const blockGeo = new THREE.BoxGeometry(1, 1, 1);
        const spawnGeo = new THREE.BoxGeometry(1, 0.2, 1);
        
        const gizmo = new TransformControls(camera, renderer.domElement);
        gizmo.setMode('translate');
        gizmo.setSize(0.8);
        scene.add(gizmo);

        let isPlayMode = false;
        let currentTool = 'place';
        let selectedItemType = 'block';
        let moveSpeed = 0.12;
        let spawnPoint = null;
        const playerHeight = 1.4;

        // UI LISTENERS
        document.getElementById('grid-toggle').onchange = (e) => { gridHelper.visible = e.target.checked; };
        document.getElementById('speed-slider').oninput = (e) => { moveSpeed = parseFloat(e.target.value); };
        
        // PROPERTY LISTENERS
        document.getElementById('prop-color').oninput = (e) => {
            if (gizmo.object) gizmo.object.material.color.set(e.target.value);
        };
        document.getElementById('prop-size').oninput = (e) => {
            if (gizmo.object) {
                const s = parseFloat(e.target.value);
                gizmo.object.scale.set(s, s, s);
            }
        };

        window.toggleTool = (tool) => {
            currentTool = (currentTool === tool) ? 'place' : tool;
            if (currentTool !== 'drag') { 
                gizmo.detach(); 
                document.getElementById('properties-ui').style.display = 'none';
            }
            document.getElementById('deleteModeBtn').classList.toggle('active-tool', currentTool === 'delete');
            document.getElementById('dragModeBtn').classList.toggle('active-tool', currentTool === 'drag');
        };

        window.selectItem = (type) => {
            selectedItemType = type; 
            currentTool = 'place'; 
            gizmo.detach();
            document.querySelectorAll('.item-card').forEach(c => c.classList.remove('selected'));
            document.getElementById(`card-${type}`).classList.add('selected');
        };

        function createBlock(type, pos, scale = 1, color = 0xcccccc) {
            const isSpawn = type === 'spawn';
            const material = new THREE.MeshStandardMaterial({ color: isSpawn ? 0x00ffff : color });
            
            // Add grid to block
            const mesh = new THREE.Mesh(isSpawn ? spawnGeo : blockGeo, material);
            if (!isSpawn) {
                const edges = new THREE.EdgesGeometry(blockGeo);
                const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x444444 }));
                mesh.add(line);
            }

            mesh.position.copy(pos);
            mesh.scale.set(scale, scale, scale);
            scene.add(mesh);
            objects.push(mesh);
            if (isSpawn) spawnPoint = mesh;
            return mesh;
        }

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('pointerdown', (e) => {
            if (e.target.closest('button') || e.target.closest('.item-card') || e.target.closest('#settings-panel') || isPlayMode) return;
            
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            
            const intersects = raycaster.intersectObjects(objects);
            if (intersects.length > 0) {
                const intersect = intersects[0];
                
                if (currentTool === 'drag' && intersect.object !== floor) {
                    gizmo.attach(intersect.object);
                    document.getElementById('properties-ui').style.display = 'block';
                    document.getElementById('prop-color').value = "#" + intersect.object.material.color.getHexString();
                    document.getElementById('prop-size').value = intersect.object.scale.x;
                } else if (currentTool === 'delete' && intersect.object !== floor) {
                    if (intersect.object === spawnPoint) spawnPoint = null;
                    gizmo.detach();
                    scene.remove(intersect.object);
                    objects.splice(objects.indexOf(intersect.object), 1);
                } else if (currentTool === 'place') {
                    const placePos = intersect.object === floor 
                        ? new THREE.Vector3(Math.round(intersect.point.x), selectedItemType === 'spawn' ? 0.1 : 0.5, Math.round(intersect.point.z))
                        : intersect.object.position.clone().add(intersect.face.normal);
                    createBlock(selectedItemType, placePos);
                }
            }
        });

        // Basic Camera Controls
        let isRightClick = false;
        window.oncontextmenu = (e) => e.preventDefault();
        window.addEventListener('pointerdown', (e) => { if(e.button === 2) isRightClick = true; });
        window.addEventListener('pointerup', () => isRightClick = false);
        window.addEventListener('pointermove', (e) => {
            if(!isRightClick || isPlayMode) return;
            camera.rotation.y -= e.movementX * 0.003;
            camera.rotation.x -= e.movementY * 0.003;
        });

        const keys = {};
        window.onkeydown = (e) => keys[e.code] = true;
        window.onkeyup = (e) => keys[e.code] = false;

        window.togglePlayTest = () => {
            isPlayMode = !isPlayMode;
            const btn = document.getElementById('playTestBtn');
            if (isPlayMode) {
                if (!spawnPoint) { alert("Add a spawn point first!"); isPlayMode = false; return; }
                btn.innerText = "STOP ⏹"; btn.classList.add('playing');
                camera.position.set(spawnPoint.position.x, spawnPoint.position.y + 1, spawnPoint.position.z);
                document.getElementById('crosshair').style.display = "block";
            } else {
                btn.innerText = "PLAY TEST ▶"; btn.classList.remove('playing');
                document.getElementById('crosshair').style.display = "none";
            }
        };

        window.exitGame = () => window.location.href = 'index.html';

        function animate() {
            requestAnimationFrame(animate);
            if (keys['KeyW']) camera.translateZ(-moveSpeed);
            if (keys['KeyS']) camera.translateZ(moveSpeed);
            if (keys['KeyA']) camera.translateX(-moveSpeed);
            if (keys['KeyD']) camera.translateX(moveSpeed);
            
            document.getElementById('coords').innerText = `X: ${Math.round(camera.position.x)} Y: ${Math.round(camera.position.y)} Z: ${Math.round(camera.position.z)}`;
            renderer.render(scene, camera);
        }

        async function init() {
            document.getElementById('settings-panel').style.display = 'block';
            document.getElementById('item-selector').style.display = 'flex';
            ['publishBtn', 'dragModeBtn', 'deleteModeBtn'].forEach(id => document.getElementById(id).style.display = 'flex');
            document.getElementById('loading-overlay').style.display = 'none';
            camera.position.set(0, 5, 10);
            camera.lookAt(0, 0, 0);
            animate();
        }
        init();
    </script>
</body>
</html>
