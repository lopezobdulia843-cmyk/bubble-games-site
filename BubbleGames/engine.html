<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bubble Games - Pro Engine</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; touch-action: none; color: white; }
        
        /* UI OVERLAYS */
        .controls { position: absolute; z-index: 10; display: flex; gap: 10px; }
        #top-bar { top: 20px; right: 20px; flex-direction: column; align-items: flex-end; }
        
        #settings-panel { 
            position: absolute; top: 100px; left: 20px; 
            background: rgba(0,0,0,0.85); padding: 15px; border-radius: 12px; 
            border: 1px solid #00d4ff; width: 220px; z-index: 50;
            backdrop-filter: blur(10px);
        }
        .setting-group { margin-bottom: 18px; }
        .label-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .setting-group label { font-size: 11px; text-transform: uppercase; color: #00d4ff; font-weight: bold; }
        
        .num-input {
            width: 60px; background: #111; border: 1px solid #444; color: #00d4ff;
            font-size: 12px; border-radius: 4px; padding: 2px 4px; text-align: center;
        }

        button { 
            width: 150px; height: 45px; font-size: 13px; font-weight: bold;
            background: rgba(0, 212, 255, 0.1); color: white;
            border: 2px solid #00d4ff; border-radius: 10px; cursor: pointer;
            backdrop-filter: blur(5px); margin-bottom: 5px;
            transition: 0.2s;
        }
        
        #publishBtn { background: #00d4ff; color: #000; }
        #playTestBtn { background: #2ecc71; color: #000; border-color: #2ecc71; }
        #playTestBtn.playing { background: #e74c3c; color: white; border-color: #e74c3c; }
        #respawnBtn { background: rgba(255, 255, 255, 0.1); border-color: #fff; width: 100px; height: 35px; margin-top: 10px; display: none; }

        .active-tool { background: #00d4ff !important; color: #000 !important; }

        #item-selector { 
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 15px; background: rgba(0,0,0,0.8); padding: 12px;
            border-radius: 15px; border: 2px solid #333; z-index: 20;
        }
        .item-card {
            width: 65px; height: 65px; border-radius: 10px; border: 2px solid #444;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; background: #111; transition: 0.2s;
        }
        .item-card.selected { border-color: #00d4ff; background: rgba(0, 212, 255, 0.2); }
        .item-icon { width: 30px; height: 30px; margin-bottom: 4px; border-radius: 4px; }
        .icon-block { background: #cccccc; border: 1px solid #999; }
        .icon-spawn { background: #00ffff; box-shadow: 0 0 10px #00ffff; }

        #info { position: absolute; top: 10px; left: 10px; pointer-events: none; }
        #coords { font-family: monospace; color: #00d4ff; margin-top: 5px; background: rgba(0,0,0,0.5); padding: 5px; border-radius: 5px; font-size: 12px; }
        
        #crosshair { 
            position: absolute; top: 50%; left: 50%; width: 8px; height: 8px; 
            border: 2px solid rgba(255,255,255,0.8); border-radius: 50%; transform: translate(-50%, -50%); 
            display: none; pointer-events: none; 
        }

        #chat-container {
            position: absolute; bottom: 120px; left: 20px; width: 280px;
            height: 180px; display: flex; flex-direction: column; z-index: 60; pointer-events: none;
        }
        #chat-messages {
            flex-grow: 1; overflow-y: auto; background: rgba(0,0,0,0.3);
            border-radius: 8px; padding: 10px; font-size: 13px; display: flex; flex-direction: column; gap: 4px;
        }
        #chat-input {
            margin-top: 8px; background: rgba(0,0,0,0.8); border: 1px solid #00d4ff;
            color: white; padding: 8px; border-radius: 4px; pointer-events: auto; outline: none;
        }
        #loading-overlay { position: fixed; inset: 0; background: #050505; z-index: 1000; display: flex; align-items: center; justify-content: center; color: #00d4ff; font-family: monospace; letter-spacing: 4px; }
    </style>
</head>
<body>
    <div id="loading-overlay">SYSTEM_LOADING...</div>

    <div id="info">
        <h2 id="gameNameDisplay" style="margin:0; color:#00d4ff; letter-spacing: 2px;">BUBBLE GAMES</h2>
        <p id="status" style="font-size: 10px; margin: 5px 0;">MODE: INITIALIZING</p>
        <div id="coords">X: 0 | Y: 0 | Z: 0</div>
        <button id="respawnBtn" onclick="respawnPlayer()">RESPAWN</button>
    </div>

    <div id="chat-container">
        <div id="chat-messages"></div>
        <input type="text" id="chat-input" placeholder="Press Enter to chat..." autocomplete="off">
    </div>

    <div id="settings-panel">
        <div class="setting-group">
            <div class="label-container">
                <label>Speed</label>
                <input type="number" id="speed-num" class="num-input" value="12">
            </div>
            <input type="range" id="speed-slider" min="5" max="50" step="1" value="12">
        </div>
        <div class="setting-group">
            <div class="label-container">
                <label>Gravity</label>
                <input type="number" id="gravity-num" class="num-input" value="30">
            </div>
            <input type="range" id="gravity-slider" min="5" max="100" step="1" value="30">
        </div>
    </div>

    <div id="item-selector">
        <div class="item-card selected" onclick="selectItem('block')" id="card-block">
            <div class="item-icon icon-block"></div>
            <div style="font-size: 10px;">BLOCK</div>
        </div>
        <div class="item-card" onclick="selectItem('spawn')" id="card-spawn">
            <div class="item-icon icon-spawn"></div>
            <div style="font-size: 10px;">SPAWN</div>
        </div>
    </div>

    <div id="top-bar" class="controls">
        <button id="playTestBtn" onclick="togglePlayTest()">PLAY TEST ▶</button>
        <button id="publishBtn" onclick="publishGame()">PUBLISH 🚀</button>
        <button id="deleteModeBtn" onclick="toggleTool('delete')">DELETE MODE</button>
        <button onclick="exitGame()">EXIT</button>
    </div>
    
    <div id="crosshair"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="importmap">
    { 
        "imports": { 
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        } 
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { TransformControls } from 'three/addons/controls/TransformControls.js';

        // --- DATABASE CONFIG ---
        const SUPABASE_URL = 'https://sideqpofgknyfagrjnke.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_ULjlm97u7-dg8ekTPU84aA_rA1CtUnH';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- ENGINE VARIABLES ---
        let isPlayMode = false;
        let currentTool = 'place';
        let selectedItemType = 'block';
        let objects = [];
        let spawnPoint = null;
        let currentUser = "Guest_" + Math.floor(Math.random() * 9999);
        
        // Physics variables (Standardized)
        let moveSpeed = 12; 
        let gravityForce = 30;
        let jumpPower = 12;
        let velocity = new THREE.Vector3();
        let isGrounded = false;
        const playerHeight = 1.6;

        // Scene Setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const clock = new THREE.Clock();
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const keys = {};

        // Lighting & Grid
        scene.add(new THREE.AmbientLight(0xffffff, 1.0));
        const gridHelper = new THREE.GridHelper(100, 100, 0x00d4ff, 0x222222);
        scene.add(gridHelper);

        const floorGeo = new THREE.PlaneGeometry(1000, 1000);
        const floorMat = new THREE.MeshBasicMaterial({ visible: false });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);
        objects.push(floor);

        // --- TEXTURES ---
        const canvas = document.createElement('canvas');
        canvas.width = 128; canvas.height = 128;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#1a1a1a'; ctx.fillRect(0,0,128,128);
        ctx.strokeStyle = '#00d4ff'; ctx.lineWidth = 4; ctx.strokeRect(0,0,128,128);
        const gridTex = new THREE.CanvasTexture(canvas);
        gridTex.wrapS = gridTex.wrapT = THREE.RepeatWrapping;

        const blockGeo = new THREE.BoxGeometry(1, 1, 1);
        const spawnGeo = new THREE.BoxGeometry(1, 0.2, 1);
        const spawnMat = new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x00ffff, emissiveIntensity: 1 });

        // --- MULTIPLAYER & CHAT ---
        const gameId = localStorage.getItem('currentGameId') || 'lobby';
        const channel = supabaseClient.channel(`room_${gameId}`);

        function addChatMessage(user, text) {
            const div = document.createElement('div');
            div.style.color = user === "System" ? "#ffcc00" : "#fff";
            div.innerHTML = `<strong style="color:#00d4ff">${user}:</strong> ${text}`;
            const container = document.getElementById('chat-messages');
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        document.getElementById('chat-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && e.target.value.trim() !== '') {
                const msg = e.target.value.trim();
                channel.send({ type: 'broadcast', event: 'chat', payload: { user: currentUser, text: msg } });
                addChatMessage("You", msg);
                e.target.value = ''; e.target.blur();
            }
        });

        channel.on('broadcast', { event: 'chat' }, ({ payload }) => {
            addChatMessage(payload.user, payload.text);
        }).subscribe();

        // --- CORE FUNCTIONS ---
        window.selectItem = (type) => {
            selectedItemType = type;
            document.querySelectorAll('.item-card').forEach(c => c.classList.remove('selected'));
            document.getElementById(`card-${type}`).classList.add('selected');
            currentTool = 'place';
        };

        window.toggleTool = (tool) => {
            currentTool = (currentTool === tool) ? 'place' : tool;
            document.getElementById('deleteModeBtn').classList.toggle('active-tool', currentTool === 'delete');
        };

        window.respawnPlayer = () => {
            if (spawnPoint) {
                camera.position.set(spawnPoint.position.x, spawnPoint.position.y + 2, spawnPoint.position.z);
            } else {
                camera.position.set(0, 5, 0);
            }
            velocity.set(0, 0, 0);
        };

        window.togglePlayTest = () => {
            isPlayMode = !isPlayMode;
            const btn = document.getElementById('playTestBtn');
            const crosshair = document.getElementById('crosshair');
            const settings = document.getElementById('settings-panel');
            const items = document.getElementById('item-selector');
            const respawn = document.getElementById('respawnBtn');

            if (isPlayMode) {
                if (!spawnPoint) { alert("Add a Spawn Point first!"); isPlayMode = false; return; }
                btn.innerText = "STOP TEST ⏹"; btn.classList.add('playing');
                crosshair.style.display = 'block'; settings.style.display = 'none';
                items.style.display = 'none'; respawn.style.display = 'block';
                document.getElementById('status').innerText = "MODE: PLAYING";
                window.respawnPlayer();
            } else {
                btn.innerText = "PLAY TEST ▶"; btn.classList.remove('playing');
                crosshair.style.display = 'none'; settings.style.display = 'block';
                items.style.display = 'flex'; respawn.style.display = 'none';
                document.getElementById('status').innerText = "MODE: BUILDING";
                camera.position.y += 5;
            }
        };

        // --- PHYSICS ENGINE (DELTA TIME) ---
        function handlePhysics(dt) {
            if (!isPlayMode) {
                // Fly Controls for Editor
                const flySpeed = moveSpeed * dt * 2;
                if (keys['KeyW']) camera.translateZ(-flySpeed);
                if (keys['KeyS']) camera.translateZ(flySpeed);
                if (keys['KeyA']) camera.translateX(-flySpeed);
                if (keys['KeyD']) camera.translateX(flySpeed);
                if (keys['Space']) camera.position.y += flySpeed;
                if (keys['ShiftLeft']) camera.position.y -= flySpeed;
                return;
            }

            // Apply Gravity
            velocity.y -= gravityForce * dt;

            // Movement Input
            const move = new THREE.Vector3();
            if (document.activeElement.tagName !== 'INPUT') {
                if (keys['KeyW']) move.z -= 1;
                if (keys['KeyS']) move.z += 1;
                if (keys['KeyA']) move.x -= 1;
                if (keys['KeyD']) move.x += 1;
            }

            if (move.length() > 0) {
                move.applyQuaternion(camera.quaternion);
                move.y = 0;
                move.normalize();
                velocity.x = move.x * moveSpeed;
                velocity.z = move.z * moveSpeed;
            } else {
                velocity.x *= 0.1; // Quick stop
                velocity.z *= 0.1;
            }

            // Ground Collision
            raycaster.set(camera.position, new THREE.Vector3(0, -1, 0));
            const groundHits = raycaster.intersectObjects(objects);
            isGrounded = false;

            if (groundHits.length > 0) {
                const hit = groundHits[0];
                if (hit.distance <= playerHeight) {
                    isGrounded = true;
                    if (velocity.y < 0) velocity.y = 0;
                    camera.position.y += (playerHeight - hit.distance); // Smooth snap to floor
                }
            }

            // Jump
            if (keys['Space'] && isGrounded && document.activeElement.tagName !== 'INPUT') {
                velocity.y = jumpPower;
                isGrounded = false;
            }

            // Apply Final Velocity
            camera.position.x += velocity.x * dt;
            camera.position.y += velocity.y * dt;
            camera.position.z += velocity.z * dt;

            // Void Protection
            if (camera.position.y < -50) window.respawnPlayer();
        }

        // --- INPUTS ---
        window.addEventListener('keydown', (e) => keys[e.code] = true);
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        let isRotating = false;
        window.addEventListener('mousedown', (e) => {
            if (e.target.tagName !== 'CANVAS') return;
            isRotating = true;
        });
        window.addEventListener('mouseup', () => isRotating = false);
        window.addEventListener('mousemove', (e) => {
            if (!isRotating) return;
            camera.rotation.y -= e.movementX * 0.003;
            camera.rotation.x -= e.movementY * 0.003;
            camera.rotation.x = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, camera.rotation.x));
        });

        // Click to Place/Delete
        window.addEventListener('click', (e) => {
            if (isPlayMode || e.target.tagName !== 'CANVAS') return;
            
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            
            const intersects = raycaster.intersectObjects(objects);
            if (intersects.length > 0) {
                const hit = intersects[0];
                
                if (currentTool === 'delete') {
                    if (hit.object !== floor) {
                        if (hit.object === spawnPoint) spawnPoint = null;
                        scene.remove(hit.object);
                        objects = objects.filter(o => o !== hit.object);
                    }
                } else {
                    const isSpawn = selectedItemType === 'spawn';
                    const mesh = new THREE.Mesh(
                        isSpawn ? spawnGeo : blockGeo, 
                        isSpawn ? spawnMat : new THREE.MeshStandardMaterial({ map: gridTex })
                    );
                    
                    // Grid Snapping Math
                    const normal = hit.face.normal.clone();
                    const newPos = hit.object.position.clone().add(normal);
                    
                    if (hit.object === floor) {
                        mesh.position.set(Math.round(hit.point.x), isSpawn ? 0.1 : 0.5, Math.round(hit.point.z));
                    } else {
                        mesh.position.copy(newPos);
                    }
                    
                    scene.add(mesh);
                    objects.push(mesh);
                    if (isSpawn) {
                        if (spawnPoint) {
                            scene.remove(spawnPoint);
                            objects = objects.filter(o => o !== spawnPoint);
                        }
                        spawnPoint = mesh;
                    }
                }
            }
        });

        // --- SETTINGS SYNC ---
        document.getElementById('speed-slider').addEventListener('input', (e) => {
            moveSpeed = parseInt(e.target.value);
            document.getElementById('speed-num').value = moveSpeed;
        });
        document.getElementById('gravity-slider').addEventListener('input', (e) => {
            gravityForce = parseInt(e.target.value);
            document.getElementById('gravity-num').value = gravityForce;
        });

        // --- MAIN LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            const dt = Math.min(clock.getDelta(), 0.1); // Cap DT to prevent glitches
            
            handlePhysics(dt);
            
            document.getElementById('coords').innerText = 
                `X: ${Math.round(camera.position.x)} | Y: ${Math.round(camera.position.y)} | Z: ${Math.round(camera.position.z)}`;
            
            renderer.render(scene, camera);
        }

        // Initialize
        camera.rotation.order = 'YXZ';
        camera.position.set(0, 5, 10);
        document.getElementById('loading-overlay').style.display = 'none';
        document.getElementById('status').innerText = "MODE: BUILDING";
        addChatMessage("System", "Welcome to Bubble Games Pro Engine.");
        animate();

        // Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Publishing
        window.publishGame = async () => {
            if (!spawnPoint) return alert("Need a Spawn Point!");
            const gameName = prompt("Enter Game Name:");
            if (!gameName) return;

            const mapData = objects.filter(o => o !== floor).map(o => ({
                x: o.position.x, y: o.position.y, z: o.position.z,
                t: o.material === spawnMat ? 'spawn' : 'block'
            }));

            try {
                await supabaseClient.from('games').insert([{
                    name: gameName,
                    blocks: mapData,
                    creator: currentUser,
                    config: { speed: moveSpeed, gravity: gravityForce }
                }]);
                alert("Game Published Successfully!");
            } catch (e) {
                alert("Error saving game: " + e.message);
            }
        };

        window.exitGame = () => { if(confirm("Exit to menu?")) window.location.href = 'index.html'; };

    </script>
</body>
</html>
