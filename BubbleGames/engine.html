<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bubble Games</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: sans-serif; touch-action: none; color: white; }
        .controls { position: absolute; z-index: 10; display: flex; gap: 10px; }
        #top-bar { top: 20px; right: 20px; flex-direction: column; align-items: flex-end; }
        
        #settings-panel { 
            position: absolute; top: 100px; left: 20px; 
            background: rgba(0,0,0,0.85); padding: 15px; border-radius: 12px; 
            border: 1px solid #00d4ff; width: 200px; z-index: 50;
            backdrop-filter: blur(10px);
        }
        .setting-group { margin-bottom: 18px; }
        .label-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .setting-group label { font-size: 11px; text-transform: uppercase; color: #00d4ff; font-weight: bold; }
        
        .num-input {
            width: 50px; background: #111; border: 1px solid #444; color: #00d4ff;
            font-size: 12px; border-radius: 4px; padding: 2px 4px; text-align: center;
        }

        button { 
            width: 140px; height: 50px; font-size: 14px; font-weight: bold;
            background: rgba(0, 212, 255, 0.1); color: white;
            border: 2px solid #00d4ff; border-radius: 10px; cursor: pointer;
            backdrop-filter: blur(5px); margin-bottom: 5px;
            display: flex; align-items: center; justify-content: center; transition: 0.2s;
        }
        
        #publishBtn { background: #00d4ff; color: #000; }
        #playTestBtn { background: #2ecc71; color: #000; border-color: #2ecc71; }
        #playTestBtn.playing { background: #e74c3c; color: white; border-color: #e74c3c; }

        #item-selector { 
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 15px; background: rgba(0,0,0,0.8); padding: 10px;
            border-radius: 15px; border: 2px solid #333; z-index: 20;
        }
        .item-card {
            width: 60px; height: 60px; border-radius: 10px; border: 2px solid #444;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; background: #111; transition: 0.2s;
        }
        .item-card.selected { border-color: #00d4ff; background: rgba(0, 212, 255, 0.2); }

        /* --- THE OWNER TAG COOL EFFECT --- */
        .player-label {
            position: absolute; background: rgba(0,0,0,0.8); color: #00d4ff;
            padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: bold;
            border: 1px solid #00d4ff; pointer-events: none; white-space: nowrap;
            transform: translate(-50%, -100%); z-index: 5;
        }

        .owner-tag {
            color: #ff0000;
            text-shadow: 0 0 8px #ff0000;
            animation: rainbow-glow 3s linear infinite;
        }

        @keyframes rainbow-glow {
            0% { color: #ff00d4; text-shadow: 0 0 10px #ff00d4; }
            33% { color: #00d4ff; text-shadow: 0 0 10px #00d4ff; }
            66% { color: #2ecc71; text-shadow: 0 0 10px #2ecc71; }
            100% { color: #ff00d4; text-shadow: 0 0 10px #ff00d4; }
        }

        #chat-container {
            position: absolute; bottom: 100px; left: 20px; width: 250px;
            height: 200px; display: flex; flex-direction: column; z-index: 60; pointer-events: none;
        }
        #chat-messages {
            flex-grow: 1; overflow-y: auto; background: rgba(0,0,0,0.4);
            border-radius: 8px; padding: 10px; font-size: 13px;
            display: flex; flex-direction: column; gap: 4px;
        }
        #chat-input {
            margin-top: 5px; background: rgba(0,0,0,0.8); border: 1px solid #00d4ff;
            color: white; padding: 8px; border-radius: 4px; pointer-events: auto; outline: none;
        }
        .chat-user { color: #00d4ff; font-weight: bold; }
        .owner-chat { color: #ff00d4; font-weight: bold; animation: rainbow-glow 3s linear infinite; }
    </style>
</head>
<body>
    <div id="loading-overlay" style="position:fixed; inset:0; background:#050505; z-index:100; display:flex; align-items:center; justify-content:center; color:#00d4ff;">INITIALIZING...</div>

    <div id="info" style="position:absolute; top:10px; left:10px;">
        <h2 id="gameNameDisplay" style="margin:0; color:#00d4ff;">BUBBLE GAMES</h2>
        <p id="status">Status: LOADING...</p>
        <div id="coords" style="font-family:monospace; color:#00d4ff; background:rgba(0,0,0,0.5); padding:5px; border-radius:5px;">POS - X: 0 | Y: 0 | Z: 0</div>
    </div>

    <div id="chat-container">
        <div id="chat-messages"></div>
        <input type="text" id="chat-input" placeholder="Press Enter to chat..." autocomplete="off">
    </div>

    <div id="settings-panel" style="display:none;">
        <div class="setting-group">
            <label>Speed</label>
            <input type="number" id="speed-num" class="num-input" value="0.12">
        </div>
    </div>

    <div id="item-selector" style="display:none;">
        <div class="item-card selected" onclick="selectItem('block')" id="card-block"><div class="item-label">Block</div></div>
        <div class="item-card" onclick="selectItem('spawn')" id="card-spawn"><div class="item-label">Spawn</div></div>
    </div>

    <div id="top-bar" class="controls">
        <button id="playTestBtn" onclick="togglePlayTest()">PLAY TEST ▶</button>
        <button id="publishBtn" onclick="publishGame()" style="display:none;">PUBLISH 🚀</button>
        <button onclick="exitGame()">EXIT</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { TransformControls } from 'three/addons/controls/TransformControls.js';

        const SUPABASE_URL = 'https://sideqpofgknyfagrjnke.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_ULjlm97u7-dg8ekTPU84aA_rA1CtUnH';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = "Guest_" + Math.floor(Math.random() * 999);
        let currentRole = "Player"; // Default role

        async function loadUserData() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (user) {
                currentUser = user.email.split('@')[0];
                // Check metadata for role
                if (user.user_metadata && user.user_metadata.role) {
                    currentRole = user.user_metadata.role;
                }
            }
        }
        loadUserData();

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        scene.add(new THREE.AmbientLight(0xffffff, 1.2));

        const floor = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.MeshBasicMaterial({ visible: false }));
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);
        const objects = [floor];

        let remotePlayers = {};
        const gameId = localStorage.getItem('currentGameId') || 'lobby';
        const channel = supabaseClient.channel(`room_${gameId}`);

        const chatMessages = document.getElementById('chat-messages');
        const chatInput = document.getElementById('chat-input');

        function addChatMessage(user, text, role = "Player") {
            const div = document.createElement('div');
            div.className = 'chat-msg';
            const userClass = (role === "Owner") ? "owner-chat" : "chat-user";
            const tag = (role === "Owner") ? "[OWNER] " : "";
            div.innerHTML = `<span class="${userClass}">${tag}${user}:</span> ${text}`;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        chatInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && chatInput.value.trim() !== '') {
                const msg = chatInput.value.trim();
                channel.send({
                    type: 'broadcast',
                    event: 'chat',
                    payload: { user: currentUser, text: msg, role: currentRole }
                });
                addChatMessage("You", msg, currentRole);
                chatInput.value = '';
                chatInput.blur();
            }
        });

        channel.on('broadcast', { event: 'chat' }, ({ payload }) => {
            addChatMessage(payload.user, payload.text, payload.role);
        });

        channel.on('broadcast', { event: 'move' }, ({ payload }) => {
            if (payload.id === currentUser) return;
            if (!remotePlayers[payload.id]) {
                const mesh = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.6, 0.8), new THREE.MeshStandardMaterial({ color: 0x00d4ff }));
                scene.add(mesh);
                
                const label = document.createElement('div');
                label.className = 'player-label';
                // Check if they are Owner
                if (payload.role === "Owner") {
                    label.innerHTML = `<span class="owner-tag">[OWNER]</span> ${payload.id}`;
                    label.style.borderColor = "#ff00d4";
                } else {
                    label.innerText = payload.id;
                }
                
                document.body.appendChild(label);
                remotePlayers[payload.id] = { mesh, label };
            }
            remotePlayers[payload.id].mesh.position.set(payload.x, payload.y - 0.8, payload.z);
        }).subscribe();

        let isPlayMode = false;
        let moveSpeed = 0.12;

        function animate() {
            requestAnimationFrame(animate);
            if (isPlayMode) {
                // Movement logic here... (W/A/S/D)
                
                // Broadcast position AND role
                channel.send({ 
                    type: 'broadcast', 
                    event: 'move', 
                    payload: { id: currentUser, role: currentRole, x: camera.position.x, y: camera.position.y, z: camera.position.z } 
                });
            }

            // Update Labels
            for (let id in remotePlayers) {
                const p = remotePlayers[id];
                const pos = p.mesh.position.clone().add(new THREE.Vector3(0, 1.5, 0));
                pos.project(camera);
                p.label.style.left = `${(pos.x * 0.5 + 0.5) * window.innerWidth}px`;
                p.label.style.top = `${(-(pos.y * 0.5) + 0.5) * window.innerHeight}px`;
            }
            renderer.render(scene, camera);
        }
        animate();

        // Helper functions
        window.togglePlayTest = () => { isPlayMode = !isPlayMode; document.getElementById('loading-overlay').style.display = 'none'; };
        window.exitGame = () => { window.location.href = 'index.html'; };
        window.selectItem = (t) => console.log("Selected", t);
    </script>
</body>
</html>
