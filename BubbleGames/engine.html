<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bubble Games | Engine</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: sans-serif; touch-action: none; color: white; }
        .controls { position: absolute; z-index: 10; display: flex; gap: 10px; }
        #top-bar { top: 20px; right: 20px; flex-direction: column; align-items: flex-end; }
        
        #settings-panel { 
            position: absolute; top: 100px; left: 20px; 
            background: rgba(0,0,0,0.8); padding: 15px; border-radius: 12px; 
            border: 1px solid #00d4ff; width: 180px; z-index: 50;
        }
        .setting-group { margin-bottom: 15px; }
        .setting-group label { display: block; font-size: 11px; text-transform: uppercase; color: #00d4ff; margin-bottom: 5px; }
        input[type="range"] { width: 100%; cursor: pointer; accent-color: #00d4ff; }

        button { 
            width: 140px; height: 50px; font-size: 14px; font-weight: bold;
            background: rgba(0, 212, 255, 0.1); color: white;
            border: 2px solid #00d4ff; border-radius: 10px; cursor: pointer;
            backdrop-filter: blur(5px); margin-bottom: 5px;
            display: flex; align-items: center; justify-content: center; transition: 0.2s;
        }
        
        #publishBtn { background: #00d4ff; color: #000; }
        #playTestBtn { background: #2ecc71; color: #000; border-color: #2ecc71; }
        #playTestBtn.playing { background: #e74c3c; color: white; border-color: #e74c3c; }

        .active-tool { background: #00d4ff !important; color: #000 !important; box-shadow: 0 0 15px #00d4ff; }
        #deleteModeBtn.active-tool { background: #ff3232 !important; border-color: #ff3232 !important; color: white !important; box-shadow: 0 0 15px #ff3232; }

        #item-selector { 
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 15px; background: rgba(0,0,0,0.8); padding: 10px;
            border-radius: 15px; border: 2px solid #333; z-index: 20;
        }
        .item-card {
            width: 60px; height: 60px; border-radius: 10px; border: 2px solid #444;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; background: #111; transition: 0.2s;
        }
        .item-card:hover { border-color: #00d4ff; }
        .item-card.selected { border-color: #00d4ff; background: rgba(0, 212, 255, 0.2); }
        .item-icon { width: 30px; height: 30px; margin-bottom: 2px; border-radius: 4px; }
        .icon-block { background: #cccccc; border: 1px solid #999; }
        .icon-spawn { background: #00ffff; box-shadow: 0 0 10px #00ffff; }
        .item-label { font-size: 10px; color: white; text-transform: uppercase; }

        #info { position: absolute; top: 10px; left: 10px; color: white; pointer-events: none; }
        #coords { font-family: monospace; color: #00d4ff; margin-top: 5px; background: rgba(0,0,0,0.5); padding: 5px; border-radius: 5px; }
        #crosshair { 
            position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; 
            border: 2px solid white; border-radius: 50%; transform: translate(-50%, -50%); 
            display: none; pointer-events: none; 
        }
        #loading-overlay { position: fixed; inset: 0; background: #050505; z-index: 100; display: flex; align-items: center; justify-content: center; color: #00d4ff; font-weight: bold; }
    </style>
</head>
<body>
    <div id="loading-overlay">INITIALIZING...</div>

    <div id="info">
        <h2 id="gameNameDisplay" style="margin:0; color:#00d4ff;">BUBBLE GAMES</h2>
        <p id="status">Status: LOADING...</p>
        <div id="coords">POS - X: 0 | Y: 0 | Z: 0</div>
    </div>

    <div id="settings-panel" style="display:none;">
        <div class="setting-group">
            <label>Move Speed</label>
            <input type="range" id="speed-slider" min="0.05" max="0.3" step="0.01" value="0.12">
        </div>
        <div class="setting-group">
            <label>Gravity</label>
            <input type="range" id="gravity-slider" min="0.005" max="0.03" step="0.001" value="0.012">
        </div>
        <div id="part-settings" style="display:none; border-top: 1px solid #333; padding-top: 10px;">
            <label>Part Size</label>
            <input type="range" id="size-slider" min="0.2" max="5" step="0.1" value="1">
        </div>
    </div>

    <div id="item-selector" style="display:none;">
        <div class="item-card selected" onclick="selectItem('block')" id="card-block">
            <div class="item-icon icon-block"></div>
            <div class="item-label">Block</div>
        </div>
        <div class="item-card" onclick="selectItem('spawn')" id="card-spawn">
            <div class="item-icon icon-spawn"></div>
            <div class="item-label">Spawn</div>
        </div>
    </div>

    <div id="top-bar" class="controls">
        <button id="playTestBtn" onclick="togglePlayTest()">PLAY TEST ▶</button>
        <button id="publishBtn" onclick="publishGame()" style="display:none;">PUBLISH 🚀</button>
        <button id="dragModeBtn" onclick="toggleTool('drag')" style="display:none;">DRAG PART</button>
        <button id="deleteModeBtn" onclick="toggleTool('delete')" style="display:none;">DELETE</button>
        <button onclick="exitGame()">EXIT</button>
    </div>
    <div id="crosshair"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="importmap">
    { 
        "imports": { 
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        } 
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { TransformControls } from 'three/addons/controls/TransformControls.js';

        const SUPABASE_URL = 'https://sideqpofgknyfagrjnke.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_ULjlm97u7-dg8ekTPU84aA_rA1CtUnH';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = "Guest_" + Math.floor(Math.random() * 999);
        async function getCreator() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (user) currentUser = user.email.split('@')[0];
        }
        getCreator();

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0c);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1.2));
        const grid = new THREE.GridHelper(100, 100, 0x00d4ff, 0x222222);
        scene.add(grid);

        const floor = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.MeshBasicMaterial({ visible: false }));
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        const objects = [floor]; 
        const blockGeo = new THREE.BoxGeometry(1, 1, 1);
        const spawnGeo = new THREE.BoxGeometry(1, 0.2, 1);
        const spawnMat = new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x00ffff, emissiveIntensity: 2 });
        
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        const gizmo = new TransformControls(camera, renderer.domElement);
        gizmo.setMode('translate');
        gizmo.setSize(0.6); 
        scene.add(gizmo);

        // --- PHYSICS SETTINGS ---
        let isPlayMode = false;
        let currentTool = 'place';
        let selectedItemType = 'block';
        let moveSpeed = 0.12;
        let worldGravity = 0.012;
        let velocityY = 0;
        let isGrounded = false;
        let spawnPoint = null;
        let editorCamPos = new THREE.Vector3();
        let editorCamRot = new THREE.Euler();
        const playerHeight = 1.8; 
        const playerRadius = 0.4;
        const jumpPower = 0.22;

        const keys = {};
        window.addEventListener('keydown', (e) => keys[e.code] = true);
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        // --- BOX COLLISION ENGINE ---
        function checkCollisions(newPos) {
            let grounded = false;
            const playerBox = new THREE.Box3().setFromCenterAndSize(
                new THREE.Vector3(newPos.x, newPos.y - (playerHeight/2), newPos.z),
                new THREE.Vector3(playerRadius * 2, playerHeight, playerRadius * 2)
            );

            for (let obj of objects) {
                if (obj === floor) {
                    if (newPos.y <= playerHeight) {
                        newPos.y = playerHeight;
                        grounded = true;
                    }
                    continue;
                }

                const objBox = new THREE.Box3().setFromObject(obj);
                if (playerBox.intersectsBox(objBox)) {
                    const overlapX = Math.min(playerBox.max.x, objBox.max.x) - Math.max(playerBox.min.x, objBox.min.x);
                    const overlapZ = Math.min(playerBox.max.z, objBox.max.z) - Math.max(playerBox.min.z, objBox.min.z);
                    const overlapY = Math.min(playerBox.max.y, objBox.max.y) - Math.max(playerBox.min.y, objBox.min.y);

                    if (overlapY < overlapX && overlapY < overlapZ) {
                        if (playerBox.getCenter(new THREE.Vector3()).y > objBox.getCenter(new THREE.Vector3()).y) {
                            newPos.y = objBox.max.y + (playerHeight);
                            grounded = true;
                            velocityY = 0;
                        } else {
                            newPos.y = objBox.min.y - 0.1;
                            velocityY = 0;
                        }
                    } else {
                        if (overlapX < overlapZ) {
                            newPos.x += (playerBox.getCenter(new THREE.Vector3()).x > objBox.getCenter(new THREE.Vector3()).x) ? overlapX : -overlapX;
                        } else {
                            newPos.z += (playerBox.getCenter(new THREE.Vector3()).z > objBox.getCenter(new THREE.Vector3()).z) ? overlapZ : -overlapZ;
                        }
                        playerBox.setFromCenterAndSize(
                            new THREE.Vector3(newPos.x, newPos.y - (playerHeight/2), newPos.z),
                            new THREE.Vector3(playerRadius * 2, playerHeight, playerRadius * 2)
                        );
                    }
                }
            }
            return grounded;
        }

        // --- UI FUNCTIONS ---
        window.togglePlayTest = () => {
            const btn = document.getElementById('playTestBtn');
            isPlayMode = !isPlayMode;
            if (isPlayMode) {
                if (!spawnPoint) { alert("❌ Need a Spawn Point!"); isPlayMode = false; return; }
                editorCamPos.copy(camera.position); editorCamRot.copy(camera.rotation);
                btn.innerText = "STOP TEST ⏹"; btn.classList.add('playing');
                document.getElementById('crosshair').style.display = 'block';
                ['publishBtn', 'dragModeBtn', 'deleteModeBtn', 'item-selector', 'settings-panel'].forEach(id => document.getElementById(id).style.display = 'none');
                gizmo.detach();
                camera.position.set(spawnPoint.position.x, spawnPoint.position.y + 2, spawnPoint.position.z);
                velocityY = 0;
            } else {
                btn.innerText = "PLAY TEST ▶"; btn.classList.remove('playing');
                document.getElementById('crosshair').style.display = 'none';
                ['publishBtn', 'dragModeBtn', 'deleteModeBtn', 'item-selector', 'settings-panel'].forEach(id => document.getElementById(id).style.display = 'flex');
                camera.position.copy(editorCamPos); camera.rotation.copy(editorCamRot);
            }
        };

        window.selectItem = (type) => {
            selectedItemType = type;
            document.querySelectorAll('.item-card').forEach(c => c.classList.remove('selected'));
            document.getElementById(`card-${type}`).classList.add('selected');
        };

        window.toggleTool = (tool) => {
            currentTool = (currentTool === tool) ? 'place' : tool;
            if (currentTool !== 'drag') gizmo.detach();
            document.getElementById('deleteModeBtn').classList.toggle('active-tool', currentTool === 'delete');
            document.getElementById('dragModeBtn').classList.toggle('active-tool', currentTool === 'drag');
        };

        window.exitGame = () => location.href = 'index.html';

        window.publishGame = async () => {
            if (!spawnPoint) { alert("❌ Need a Spawn Point!"); return; }
            const blocksData = objects.filter(obj => obj !== floor).map(obj => ({
                x: obj.position.x, y: obj.position.y, z: obj.position.z, 
                s: obj.scale.x, type: (obj === spawnPoint) ? 'spawn' : 'block'
            }));
            const name = prompt("Game Name:");
            if (!name) return;
            await supabaseClient.from('games').insert([{ name, blocks: blocksData, creator: currentUser, config: { gravity: worldGravity, speed: moveSpeed } }]);
            alert("🚀 Published!"); exitGame();
        };

        // --- MAIN LOOP ---
        function animate() {
            requestAnimationFrame(animate);

            if (isPlayMode) {
                let newPos = camera.position.clone();
                const dir = new THREE.Vector3();
                const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
                forward.y = 0; forward.normalize();
                const right = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
                right.y = 0; right.normalize();

                if (keys['KeyW']) dir.add(forward);
                if (keys['KeyS']) dir.sub(forward);
                if (keys['KeyA']) dir.sub(right);
                if (keys['KeyD']) dir.add(right);

                if (dir.length() > 0) {
                    dir.normalize().multiplyScalar(moveSpeed);
                    newPos.x += dir.x; newPos.z += dir.z;
                }

                velocityY -= worldGravity;
                newPos.y += velocityY;

                if (keys['Space'] && isGrounded) {
                    velocityY = jumpPower;
                    isGrounded = false;
                }

                isGrounded = checkCollisions(newPos);
                camera.position.copy(newPos);
                if (camera.position.y < -20) camera.position.set(spawnPoint.position.x, spawnPoint.position.y+2, spawnPoint.position.z);
            }

            document.getElementById('coords').innerText = `POS - X: ${camera.position.x.toFixed(1)} | Y: ${camera.position.y.toFixed(1)} | Z: ${camera.position.z.toFixed(1)}`;
            renderer.render(scene, camera);
        }

        // --- INPUTS ---
        let isDraggingCam = false;
        let prevMouse = { x: 0, y: 0 };

        window.addEventListener('pointerdown', (e) => {
            if (e.target.closest('button') || e.target.closest('.item-card') || e.target.closest('input')) return;
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(objects);

            if (!isPlayMode && currentTool === 'drag' && intersects.length > 0 && intersects[0].object !== floor) {
                gizmo.attach(intersects[0].object);
            } else {
                isDraggingCam = true; prevMouse = { x: e.clientX, y: e.clientY };
            }
        });

        window.addEventListener('pointermove', (e) => {
            if (!isDraggingCam) return;
            camera.rotation.y -= (e.clientX - prevMouse.x) * 0.003;
            camera.rotation.x -= (e.clientY - prevMouse.y) * 0.003;
            camera.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, camera.rotation.x));
            prevMouse = { x: e.clientX, y: e.clientY };
        });

        window.addEventListener('pointerup', (e) => {
            isDraggingCam = false;
            if (isPlayMode || e.target.closest('button') || e.target.closest('.item-card')) return;
            
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(objects);
            if (intersects.length > 0) {
                const hit = intersects[0];
                if (currentTool === 'delete' && hit.object !== floor) {
                    if (hit.object === spawnPoint) spawnPoint = null;
                    scene.remove(hit.object); objects.splice(objects.indexOf(hit.object), 1);
                    gizmo.detach();
                } else if (currentTool === 'place') {
                    const mesh = selectedItemType === 'spawn' ? new THREE.Mesh(spawnGeo, spawnMat) : new THREE.Mesh(blockGeo, new THREE.MeshStandardMaterial({color: 0xcccccc}));
                    mesh.position.copy(hit.point).add(hit.face.normal.multiplyScalar(0.5));
                    mesh.position.x = Math.round(mesh.position.x);
                    mesh.position.y = selectedItemType === 'spawn' ? hit.point.y + 0.1 : Math.round(mesh.position.y);
                    mesh.position.z = Math.round(mesh.position.z);
                    scene.add(mesh); objects.push(mesh);
                    if (selectedItemType === 'spawn') {
                        if (spawnPoint) { scene.remove(spawnPoint); objects.splice(objects.indexOf(spawnPoint), 1); }
                        spawnPoint = mesh;
                    }
                }
            }
        });

        // --- INIT ---
        camera.rotation.order = "YXZ";
        camera.position.set(0, 5, 10);
        document.getElementById('speed-slider').oninput = (e) => moveSpeed = parseFloat(e.target.value);
        document.getElementById('gravity-slider').oninput = (e) => worldGravity = parseFloat(e.target.value);
        
        async function load() {
            const id = localStorage.getItem('currentGameId');
            if (id) {
                const { data } = await supabaseClient.from('games').select('*').eq('id', id).single();
                if (data && data.blocks) {
                    data.blocks.forEach(b => {
                        const m = b.type === 'spawn' ? new THREE.Mesh(spawnGeo, spawnMat) : new THREE.Mesh(blockGeo, new THREE.MeshStandardMaterial({color: 0xcccccc}));
                        m.position.set(b.x, b.y, b.z); m.scale.set(b.s, b.s, b.s);
                        scene.add(m); objects.push(m);
                        if (b.type === 'spawn') spawnPoint = m;
                    });
                }
            }
            document.getElementById('loading-overlay').style.display = 'none';
            document.getElementById('status').innerText = "Status: READY";
            animate();
        }
        load();
    </script>
</body>
</html>
