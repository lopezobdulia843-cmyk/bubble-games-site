<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bubble Games | Pro Engine</title>
    
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <script src="https://unpkg.com/blockly/lua_compressed.js"></script>
    <script src="https://unpkg.com/blockly/blocks_compressed.js"></script>
    <script src="https://unpkg.com/blockly/javascript_compressed.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fengari-web@0.1.4/dist/fengari-web.js"></script>

    <style>
        :root { --neon: #00d4ff; --bg: #050505; --panel: rgba(15, 15, 15, 0.9); }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: var(--bg); font-family: 'Segoe UI', Roboto, sans-serif; color: white; user-select: none; -webkit-user-select: none; }
        
        canvas { display: block; }

        /* --- UI OVERLAY --- */
        #hud { position: absolute; inset: 0; pointer-events: none; z-index: 10; }
        #hud * { pointer-events: auto; }

        .panel { background: var(--panel); border: 1px solid #333; border-radius: 12px; backdrop-filter: blur(10px); }

        /* --- TOP BAR --- */
        #top-bar { position: absolute; top: 20px; left: 20px; right: 20px; display: flex; justify-content: space-between; align-items: flex-start; pointer-events: none; }
        .stats { pointer-events: none; text-shadow: 2px 2px 4px black; }
        .stats h1 { margin: 0; color: var(--neon); font-size: 24px; letter-spacing: 2px; }
        .btn-group { display: flex; flex-direction: column; gap: 8px; align-items: flex-end; }

        button { 
            background: rgba(255,255,255,0.05); border: 1px solid var(--neon); color: white;
            padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold;
            transition: all 0.2s; min-width: 120px; text-transform: uppercase; font-size: 12px;
        }
        button:hover { background: var(--neon); color: black; box-shadow: 0 0 15px var(--neon); }
        button.active { background: var(--neon); color: black; }
        #play-btn { background: #2ecc71; border-color: #2ecc71; color: black; font-size: 16px; }
        #play-btn.stop { background: #e74c3c; border-color: #e74c3c; color: white; }

        /* --- INVENTORY / ITEM SELECTOR --- */
        #inventory { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; padding: 10px; }
        .slot { width: 50px; height: 50px; border: 2px solid #444; border-radius: 8px; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; }
        .slot:hover { border-color: var(--neon); }
        .slot.selected { border-color: var(--neon); background: rgba(0, 212, 255, 0.2); box-shadow: 0 0 10px var(--neon); }

        /* --- SCRATCH MODAL --- */
        #script-editor { position: fixed; inset: 40px; z-index: 1000; display: none; flex-direction: column; }
        #blockly-container { flex-grow: 1; border-radius: 8px 8px 0 0; overflow: hidden; }
        .editor-footer { background: #111; padding: 15px; display: flex; justify-content: flex-end; gap: 10px; border-radius: 0 0 8px 8px; }

        /* --- MOBILE JOYSTICK --- */
        #mobile-controls { position: absolute; inset: 0; pointer-events: none; display: none; }
        #move-stick { position: absolute; left: 50px; bottom: 50px; width: 120px; height: 120px; background: rgba(255,255,255,0.1); border-radius: 50%; border: 1px solid rgba(255,255,255,0.2); }
        #stick-head { position: absolute; width: 50px; height: 50px; background: var(--neon); border-radius: 50%; left: 35px; top: 35px; opacity: 0.8; }
        #jump-btn { position: absolute; right: 50px; bottom: 50px; width: 80px; height: 80px; border-radius: 50%; background: rgba(0,212,255,0.2); border: 2px solid var(--neon); display: flex; align-items: center; justify-content: center; font-weight: bold; pointer-events: auto; }

        #crosshair { position: absolute; top: 50%; left: 50%; width: 8px; height: 8px; border: 2px solid white; border-radius: 50%; transform: translate(-50%, -50%); display: none; pointer-events: none; }
    </style>
</head>
<body>

    <div id="hud">
        <div id="top-bar">
            <div class="stats">
                <h1>BUBBLE ENGINE <span style="font-size: 12px; opacity: 0.5;">PRO</span></h1>
                <div id="pos-display">X: 0 Y: 0 Z: 0</div>
            </div>
            <div class="btn-group">
                <button id="play-btn" onclick="app.togglePlay()">Play Game</button>
                <button id="tool-drag" onclick="app.setTool('drag')">Drag/Move</button>
                <button id="tool-script" onclick="app.setTool('script')">Block Script</button>
                <button id="tool-delete" onclick="app.setTool('delete')" style="border-color:#ff3232;">Delete</button>
            </div>
        </div>

        <div id="inventory" class="panel">
            <div class="slot selected" onclick="app.setItem('block')">Cube</div>
            <div class="slot" onclick="app.setItem('sphere')">Ball</div>
            <div class="slot" onclick="app.setItem('spawn')">Spawn</div>
        </div>

        <div id="crosshair"></div>

        <div id="mobile-controls">
            <div id="move-stick"><div id="stick-head"></div></div>
            <div id="jump-btn">JUMP</div>
        </div>
    </div>

    <div id="script-editor" class="panel">
        <div id="blockly-container"></div>
        <div class="editor-footer">
            <button onclick="app.closeEditor()" style="border-color:#888;">Cancel</button>
            <button onclick="app.saveScript()" style="background:var(--neon); color:black;">Attach to Block</button>
        </div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { TransformControls } from 'three/addons/controls/TransformControls.js';

        class Engine {
            constructor() {
                this.scene = new THREE.Scene();
                this.camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                this.renderer = new THREE.WebGLRenderer({ antialias: true });
                this.objects = [];
                this.isPlay = false;
                this.currentTool = 'place';
                this.selectedItem = 'block';
                this.activeObject = null;
                this.velocity = new THREE.Vector3();
                this.isGrounded = false;
                this.keys = {};
                
                this.init();
            }

            init() {
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setPixelRatio(window.devicePixelRatio);
                document.body.appendChild(this.renderer.domElement);

                this.scene.background = new THREE.Color(0x050505);
                this.scene.add(new THREE.AmbientLight(0xffffff, 1.2));
                
                const grid = new THREE.GridHelper(200, 100, 0x00d4ff, 0x222222);
                this.scene.add(grid);

                this.gizmo = new TransformControls(this.camera, this.renderer.domElement);
                this.scene.add(this.gizmo);

                this.camera.position.set(5, 5, 5);
                this.camera.lookAt(0,0,0);
                this.camera.rotation.order = 'YXZ';

                this.initBlockly();
                this.setupEvents();
                this.animate();
            }

            initBlockly() {
                const toolbox = {
                    'kind': 'categoryToolbox',
                    'contents': [
                        { 'kind': 'category', 'name': 'Logic', 'colour': '210', 'contents': [{ 'kind': 'block', 'type': 'controls_if' }, { 'kind': 'block', 'type': 'logic_compare' }] },
                        { 'kind': 'category', 'name': 'Loops', 'colour': '120', 'contents': [{ 'kind': 'block', 'type': 'controls_repeat_ext' }] },
                        { 'kind': 'category', 'name': 'Math', 'colour': '230', 'contents': [{ 'kind': 'block', 'type': 'math_number' }, { 'kind': 'block', 'type': 'math_arithmetic' }] },
                        { 'kind': 'category', 'name': 'Actions', 'colour': '160', 'contents': [{ 'kind': 'block', 'type': 'text_print' }] }
                    ]
                };

                this.workspace = Blockly.inject('blockly-container', {
                    toolbox: toolbox,
                    theme: Blockly.Themes.Dark,
                    scrollbars: true,
                    trashcan: true
                });
            }

            setupEvents() {
                window.addEventListener('resize', () => {
                    this.camera.aspect = window.innerWidth / window.innerHeight;
                    this.camera.updateProjectionMatrix();
                    this.renderer.setSize(window.innerWidth, window.innerHeight);
                });

                window.addEventListener('keydown', (e) => this.keys[e.code] = true);
                window.addEventListener('keyup', (e) => this.keys[e.code] = false);

                this.renderer.domElement.addEventListener('mousedown', (e) => {
                    if (this.isPlay || e.button !== 0) return;
                    
                    const mouse = new THREE.Vector2((e.clientX / window.innerWidth) * 2 - 1, -(e.clientY / window.innerHeight) * 2 + 1);
                    const ray = new THREE.Raycaster();
                    ray.setFromCamera(mouse, this.camera);
                    
                    const hits = ray.intersectObjects(this.objects);

                    if (hits.length > 0) {
                        const target = hits[0].object;
                        if (this.currentTool === 'delete') {
                            this.scene.remove(target);
                            this.objects = this.objects.filter(o => o !== target);
                            this.gizmo.detach();
                        } else if (this.currentTool === 'drag') {
                            this.activeObject = target;
                            this.gizmo.attach(target);
                        } else if (this.currentTool === 'script') {
                            this.activeObject = target;
                            document.getElementById('script-editor').style.display = 'flex';
                            Blockly.svgResize(this.workspace);
                        }
                    } else if (this.currentTool === 'place') {
                        this.createObject(ray.ray.at(10));
                    }
                });

                // Right click to look around
                window.addEventListener('mousemove', (e) => {
                    if (this.isPlay || (this.keys['MouseDown2'] || e.buttons === 2)) {
                        this.camera.rotation.y -= e.movementX * 0.003;
                        this.camera.rotation.x -= e.movementY * 0.003;
                        this.camera.rotation.x = Math.max(-1.5, Math.min(1.5, this.camera.rotation.x));
                    }
                });
                window.addEventListener('contextmenu', e => e.preventDefault());
            }

            createObject(pos) {
                let geo;
                if (this.selectedItem === 'sphere') geo = new THREE.SphereGeometry(0.5);
                else geo = new THREE.BoxGeometry(1, 1, 1);

                const mat = new THREE.MeshStandardMaterial({ color: 0xcccccc });
                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.set(Math.round(pos.x), Math.round(pos.y) + 0.5, Math.round(pos.z));
                this.scene.add(mesh);
                this.objects.push(mesh);
            }

            togglePlay() {
                this.isPlay = !this.isPlay;
                const btn = document.getElementById('play-btn');
                this.gizmo.detach();
                
                if (this.isPlay) {
                    btn.innerText = "Stop Test";
                    btn.classList.add('stop');
                    document.getElementById('crosshair').style.display = 'block';
                    this.camera.position.set(0, 2, 5);
                } else {
                    btn.innerText = "Play Game";
                    btn.classList.remove('stop');
                    document.getElementById('crosshair').style.display = 'none';
                }
            }

            setTool(t) {
                this.currentTool = t;
                document.querySelectorAll('.btn-group button').forEach(b => b.classList.remove('active'));
                document.getElementById('tool-' + t).classList.add('active');
            }

            setItem(type) {
                this.selectedItem = type;
                document.querySelectorAll('.slot').forEach(s => s.classList.remove('selected'));
                event.target.classList.add('selected');
            }

            saveScript() {
                const code = Blockly.Lua.workspaceToCode(this.workspace);
                if (this.activeObject) {
                    this.activeObject.userData.script = code;
                    this.activeObject.material.emissive.setHex(0x00d4ff);
                }
                this.closeEditor();
            }

            closeEditor() { document.getElementById('script-editor').style.display = 'none'; }

            animate() {
                requestAnimationFrame(() => this.animate());

                if (this.isPlay) {
                    const speed = 0.15;
                    const move = new THREE.Vector3();
                    if (this.keys['KeyW']) move.z -= 1;
                    if (this.keys['KeyS']) move.z += 1;
                    if (this.keys['KeyA']) move.x -= 1;
                    if (this.keys['KeyD']) move.x += 1;

                    move.applyEuler(new THREE.Euler(0, this.camera.rotation.y, 0)).normalize();
                    this.camera.position.addScaledVector(move, speed);

                    // Gravity
                    this.velocity.y -= 0.015;
                    this.camera.position.y += this.velocity.y;
                    if (this.camera.position.y <= 1.6) {
                        this.camera.position.y = 1.6;
                        this.velocity.y = 0;
                        this.isGrounded = true;
                    }
                    if (this.keys['Space'] && this.isGrounded) {
                        this.velocity.y = 0.25;
                        this.isGrounded = false;
                    }
                }

                document.getElementById('pos-display').innerText = `X: ${Math.round(this.camera.position.x)} Y: ${Math.round(this.camera.position.y)} Z: ${Math.round(this.camera.position.z)}`;
                this.renderer.render(this.scene, this.camera);
            }
        }

        window.app = new Engine();
    </script>
</body>
</html>
