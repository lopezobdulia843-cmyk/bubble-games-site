<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bubble Games | Studio</title>
    <style>
        :root { --primary: #00d4ff; --bg: #050505; --danger: #ff3232; }
        body { margin: 0; overflow: hidden; background: var(--bg); font-family: sans-serif; touch-action: none; color: white; }
        .controls { position: absolute; z-index: 10; display: flex; gap: 10px; }
        #top-bar { top: 20px; right: 20px; flex-direction: column; align-items: flex-end; }
        
        #settings-panel { 
            position: absolute; top: 100px; left: 20px; 
            background: rgba(0,0,0,0.85); padding: 15px; border-radius: 12px; 
            border: 1px solid var(--primary); width: 180px; z-index: 50;
            backdrop-filter: blur(10px);
        }
        .setting-group { margin-bottom: 15px; }
        .setting-group label { display: block; font-size: 11px; text-transform: uppercase; color: var(--primary); margin-bottom: 5px; }
        input[type="range"] { width: 100%; cursor: pointer; accent-color: var(--primary); }

        button { 
            width: 140px; height: 50px; font-size: 14px; font-weight: bold;
            background: rgba(0, 212, 255, 0.1); color: white;
            border: 2px solid var(--primary); border-radius: 10px; cursor: pointer;
            backdrop-filter: blur(5px); margin-bottom: 5px;
            display: flex; align-items: center; justify-content: center; transition: 0.2s;
        }
        
        #publishBtn { background: var(--primary); color: #000; }
        #playTestBtn { background: #2ecc71; color: #000; border-color: #2ecc71; }
        #playTestBtn.playing { background: #e74c3c; color: white; border-color: #e74c3c; }

        .active-tool { background: var(--primary) !important; color: #000 !important; box-shadow: 0 0 15px var(--primary); }
        #deleteModeBtn.active-tool { background: var(--danger) !important; border-color: var(--danger) !important; color: white !important; box-shadow: 0 0 15px var(--danger); }

        #item-selector { 
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 15px; background: rgba(0,0,0,0.8); padding: 10px;
            border-radius: 15px; border: 2px solid #333; z-index: 20;
        }
        .item-card {
            width: 60px; height: 60px; border-radius: 10px; border: 2px solid #444;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; background: #111; transition: 0.2s;
        }
        .item-card:hover { border-color: var(--primary); }
        .item-card.selected { border-color: var(--primary); background: rgba(0, 212, 255, 0.2); }
        .item-icon { width: 30px; height: 30px; margin-bottom: 2px; border-radius: 4px; }
        .icon-block { background: #cccccc; border: 1px solid #999; }
        .icon-spawn { background: #00ffff; box-shadow: 0 0 10px #00ffff; }
        .item-label { font-size: 10px; color: white; text-transform: uppercase; }

        #info { position: absolute; top: 10px; left: 10px; color: white; pointer-events: none; }
        #coords { font-family: monospace; color: var(--primary); margin-top: 5px; background: rgba(0,0,0,0.5); padding: 5px; border-radius: 5px; }
        #crosshair { 
            position: absolute; top: 50%; left: 50%; width: 12px; height: 12px; 
            border: 2px solid white; border-radius: 50%; transform: translate(-50%, -50%); 
            display: none; pointer-events: none; 
        }
        #loading-overlay { position: fixed; inset: 0; background: #050505; z-index: 100; display: flex; align-items: center; justify-content: center; color: var(--primary); font-weight: bold; }

        .player-label {
            position: absolute; background: rgba(0,0,0,0.8); color: var(--primary);
            padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: bold;
            border: 1px solid var(--primary); pointer-events: none; white-space: nowrap;
            transform: translate(-50%, -100%); z-index: 5;
        }
    </style>
</head>
<body>
    <div id="loading-overlay">SYNCHRONIZING ASSETS...</div>

    <div id="info">
        <h2 id="gameNameDisplay" style="margin:0; color:var(--primary);">BUBBLE GAMES STUDIO</h2>
        <p id="status">Status: LOADING...</p>
        <div id="coords">POS - X: 0 | Y: 0 | Z: 0</div>
    </div>

    <div id="settings-panel" style="display:none;">
        <div class="setting-group">
            <label>Move Speed</label>
            <input type="range" id="speed-slider" min="0.02" max="0.30" step="0.01" value="0.12">
        </div>
        <div class="setting-group">
            <label>Gravity</label>
            <input type="range" id="gravity-slider" min="0.001" max="0.03" step="0.001" value="0.008">
        </div>
        <div id="part-settings" style="display:none; border-top: 1px solid #333; padding-top: 10px;">
            <label>Part Size</label>
            <input type="range" id="size-slider" min="0.5" max="10" step="0.5" value="1">
            <p style="font-size: 9px; color: #888; margin-top:5px;">Editing Active Part</p>
        </div>
    </div>

    <div id="item-selector" style="display:none;">
        <div class="item-card selected" onclick="selectItem('block')" id="card-block">
            <div class="item-icon icon-block"></div>
            <div class="item-label">Block</div>
        </div>
        <div class="item-card" onclick="selectItem('spawn')" id="card-spawn">
            <div class="item-icon icon-spawn"></div>
            <div class="item-label">Spawn</div>
        </div>
    </div>

    <div id="top-bar" class="controls">
        <button id="playTestBtn" onclick="togglePlayTest()">PLAY TEST ▶</button>
        <button id="publishBtn" onclick="publishGame()" style="display:none;">PUBLISH 🚀</button>
        <button id="dragModeBtn" onclick="toggleTool('drag')" style="display:none;">DRAG PART</button>
        <button id="deleteModeBtn" onclick="toggleTool('delete')" style="display:none;">DELETE</button>
        <button onclick="exitGame()">EXIT STUDIO</button>
    </div>
    <div id="crosshair"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="importmap">
    { 
        "imports": { 
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        } 
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { TransformControls } from 'three/addons/controls/TransformControls.js';

        const SUPABASE_URL = 'https://sideqpofgknyfagrjnke.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_ULjlm97u7-dg8ekTPU84aA_rA1CtUnH';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = "Guest_" + Math.floor(Math.random() * 999);
        let isOwner = false;

        async function getCreator() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (user) {
                currentUser = user.email.split('@')[0];
                isOwner = currentUser === "abraham";
            }
        }

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0c);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1.2));
        const grid = new THREE.GridHelper(100, 100, 0x00d4ff, 0x222222);
        scene.add(grid);

        const floor = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.MeshBasicMaterial({ visible: false }));
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        const objects = [floor]; 
        const blockGeo = new THREE.BoxGeometry(1, 1, 1);
        const spawnGeo = new THREE.BoxGeometry(1.2, 0.2, 1.2);
        const spawnMat = new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x00ffff, emissiveIntensity: 2 });
        
        const raycaster = new THREE.Raycaster();
        const downRay = new THREE.Raycaster(); 
        const wallRay = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        const gizmo = new TransformControls(camera, renderer.domElement);
        gizmo.setMode('translate');
        gizmo.setSize(0.6); 
        scene.add(gizmo);

        let remotePlayers = {};
        const gameId = localStorage.getItem('currentGameId') || 'lobby';
        const channel = supabaseClient.channel(`room_${gameId}`);

        let isPlayMode = false; 
        let currentTool = 'place'; 
        let selectedItemType = 'block'; 
        let moveSpeed = 0.12;
        let worldGravity = 0.008;
        let velocityY = 0;
        let isGrounded = false;
        let spawnPoint = null;
        let editorCamPos = new THREE.Vector3();
        let editorCamRot = new THREE.Euler();
        const playerHeight = 1.6; 
        const jumpStrength = 0.15;
        const keys = {};

        // --- CORE FUNCTIONS ---

        window.togglePlayTest = () => {
            const btn = document.getElementById('playTestBtn');
            isPlayMode = !isPlayMode;
            if (isPlayMode) {
                if (!spawnPoint) { alert("⚠️ Place a Spawn Point first!"); isPlayMode = false; return; }
                editorCamPos.copy(camera.position);
                editorCamRot.copy(camera.rotation);
                btn.innerText = "STOP TEST ⏹"; btn.classList.add('playing');
                document.getElementById('status').innerText = "Status: PLAY TESTING";
                document.getElementById('crosshair').style.display = 'block';
                ['publishBtn', 'dragModeBtn', 'deleteModeBtn', 'item-selector', 'settings-panel'].forEach(id => document.getElementById(id).style.display = 'none');
                gizmo.detach();
                camera.position.set(spawnPoint.position.x, spawnPoint.position.y + 1.6, spawnPoint.position.z);
                velocityY = 0;
            } else {
                btn.innerText = "PLAY TEST ▶"; btn.classList.remove('playing');
                document.getElementById('status').innerText = "Status: STUDIO MODE";
                document.getElementById('crosshair').style.display = 'none';
                if(isOwner) ['publishBtn', 'dragModeBtn', 'deleteModeBtn', 'item-selector', 'settings-panel'].forEach(id => document.getElementById(id).style.display = 'flex');
                camera.position.copy(editorCamPos); camera.rotation.copy(editorCamRot);
            }
        };

        window.publishGame = async () => {
            if (!spawnPoint) { alert("❌ You need a spawn point!"); return; }
            const blocksData = objects.filter(obj => obj !== floor).map(obj => ({ 
                x: obj.position.x, y: obj.position.y, z: obj.position.z, s: obj.scale.x, type: (obj === spawnPoint) ? 'spawn' : 'block' 
            }));
            const name = prompt("Game Name:");
            if (!name) return;
            const { error } = await supabaseClient.from('games').insert([{ name, creator: currentUser, blocks: blocksData }]);
            if (!error) { alert("Game Published!"); window.location.href = 'index.html'; }
        };

        window.exitGame = () => window.location.href = 'index.html';

        window.toggleTool = (tool) => {
            currentTool = (currentTool === tool) ? 'place' : tool;
            gizmo.detach();
            document.getElementById('deleteModeBtn').classList.toggle('active-tool', currentTool === 'delete');
            document.getElementById('dragModeBtn').classList.toggle('active-tool', currentTool === 'drag');
        };

        window.selectItem = (type) => {
            selectedItemType = type;
            document.querySelectorAll('.item-card').forEach(c => c.classList.remove('selected'));
            document.getElementById(`card-${type}`).classList.add('selected');
        };

        // --- INITIALIZATION ---

        async function init() {
            await getCreator();
            const editMode = localStorage.getItem('editMode') === 'true';
            
            if (isOwner && editMode) {
                document.getElementById('status').innerText = "Status: STUDIO MODE";
                ['publishBtn', 'dragModeBtn', 'deleteModeBtn', 'item-selector', 'settings-panel'].forEach(id => document.getElementById(id).style.display = 'flex');
            } else {
                isPlayMode = true;
                document.getElementById('status').innerText = "Status: PLAYING";
                document.getElementById('playTestBtn').style.display = 'none';
                document.getElementById('crosshair').style.display = 'block';
            }

            camera.position.set(0, 5, 10);
            camera.rotation.order = "YXZ";
            document.getElementById('loading-overlay').style.display = 'none';
            animate();
        }

        // --- INPUTS ---

        window.addEventListener('pointerdown', (e) => {
            if (e.target.closest('.controls') || e.target.closest('#settings-panel') || e.target.closest('#item-selector')) return;
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(objects);

            if (!isPlayMode) {
                if (currentTool === 'drag' && intersects.length > 0 && intersects[0].object !== floor) {
                    gizmo.attach(intersects[0].object);
                } else if (currentTool === 'delete' && intersects.length > 0 && intersects[0].object !== floor) {
                    const obj = intersects[0].object;
                    if (obj === spawnPoint) spawnPoint = null;
                    scene.remove(obj);
                    objects.splice(objects.indexOf(obj), 1);
                } else if (currentTool === 'place' && intersects.length > 0) {
                    const hit = intersects[0];
                    const isSpawn = selectedItemType === 'spawn';
                    const m = new THREE.Mesh(isSpawn ? spawnGeo : blockGeo, isSpawn ? spawnMat : new THREE.MeshStandardMaterial({ color: 0xcccccc }));
                    
                    const pos = hit.point.clone().add(hit.face.normal.multiplyScalar(0.5));
                    m.position.set(Math.round(pos.x), isSpawn ? 0.1 : Math.round(pos.y), Math.round(pos.z));
                    
                    scene.add(m);
                    objects.push(m);
                    if (isSpawn) {
                        if (spawnPoint) { scene.remove(spawnPoint); objects.splice(objects.indexOf(spawnPoint), 1); }
                        spawnPoint = m;
                    }
                }
            }
        });

        window.addEventListener('keydown', (e) => { keys[e.key.toLowerCase()] = true; });
        window.addEventListener('keyup', (e) => { keys[e.key.toLowerCase()] = false; });

        // --- LOOP ---

        function animate() {
            requestAnimationFrame(animate);
            document.getElementById('coords').innerText = `X: ${Math.round(camera.position.x)} | Y: ${Math.round(camera.position.y)} | Z: ${Math.round(camera.position.z)}`;

            if (isPlayMode) {
                // Gravity & Collision
                downRay.set(camera.position, new THREE.Vector3(0, -1, 0));
                const groundHits = downRay.intersectObjects(objects);
                if (groundHits.length > 0 && groundHits[0].distance <= playerHeight) {
                    if (velocityY < 0) { velocityY = 0; isGrounded = true; }
                } else {
                    isGrounded = false;
                    velocityY -= worldGravity;
                }
                if (keys[' '] && isGrounded) velocityY = jumpStrength;
                camera.position.y += velocityY;

                // Movement
                let move = new THREE.Vector3();
                if (keys['w']) move.z -= 1; if (keys['s']) move.z += 1;
                if (keys['a']) move.x -= 1; if (keys['d']) move.x += 1;
                move.applyQuaternion(camera.quaternion);
                move.y = 0;
                camera.position.addScaledVector(move.normalize(), moveSpeed);
            } else {
                // Freecam
                if (keys['w']) camera.translateZ(-0.2); if (keys['s']) camera.translateZ(0.2);
                if (keys['a']) camera.translateX(-0.2); if (keys['d']) camera.translateX(0.2);
            }

            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
