<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bubble Games - Studio Pro</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: 'Segoe UI', sans-serif; touch-action: none; color: white; }
        .controls { position: absolute; z-index: 10; display: flex; gap: 10px; }
        #top-bar { top: 20px; right: 20px; flex-direction: column; align-items: flex-end; }
        
        #settings-panel { 
            position: absolute; top: 100px; left: 20px; 
            background: rgba(0,0,0,0.85); padding: 15px; border-radius: 12px; 
            border: 1px solid #00d4ff; width: 200px; z-index: 50;
            backdrop-filter: blur(10px);
        }
        .setting-group { margin-bottom: 18px; }
        .label-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .setting-group label { font-size: 11px; text-transform: uppercase; color: #00d4ff; font-weight: bold; }
        
        .num-input {
            width: 50px; background: #111; border: 1px solid #444; color: #00d4ff;
            font-size: 12px; border-radius: 4px; padding: 2px 4px; text-align: center;
        }

        button { 
            width: 140px; height: 50px; font-size: 14px; font-weight: bold;
            background: rgba(0, 212, 255, 0.1); color: white;
            border: 2px solid #00d4ff; border-radius: 10px; cursor: pointer;
            backdrop-filter: blur(5px); margin-bottom: 5px;
            display: flex; align-items: center; justify-content: center; transition: 0.2s;
        }
        button:hover { background: rgba(0, 212, 255, 0.3); }
        #publishBtn { background: #00d4ff; color: #000; }
        #playTestBtn { background: #2ecc71; color: #000; border-color: #2ecc71; }
        #playTestBtn.playing { background: #e74c3c; color: white; border-color: #e74c3c; }

        .active-tool { background: #00d4ff !important; color: #000 !important; box-shadow: 0 0 15px #00d4ff; }

        #item-selector { 
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 15px; background: rgba(0,0,0,0.8); padding: 10px;
            border-radius: 15px; border: 2px solid #333; z-index: 20;
        }
        .item-card {
            width: 60px; height: 60px; border-radius: 10px; border: 2px solid #444;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; background: #111; transition: 0.2s;
        }
        .item-card.selected { border-color: #00d4ff; background: rgba(0, 212, 255, 0.2); }

        #info { position: absolute; top: 10px; left: 10px; color: white; pointer-events: none; }
        #coords { font-family: monospace; color: #00d4ff; margin-top: 5px; background: rgba(0,0,0,0.5); padding: 5px; border-radius: 5px; }
        #crosshair { 
            position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; 
            border: 2px solid white; border-radius: 50%; transform: translate(-50%, -50%); 
            display: none; pointer-events: none; 
        }
        #loading-overlay { position: fixed; inset: 0; background: #050505; z-index: 100; display: flex; align-items: center; justify-content: center; color: #00d4ff; font-weight: bold; }

        /* SCRIPT EDITOR & AUTOCOMPLETE */
        #script-editor-panel {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(10, 10, 15, 0.98); padding: 20px; border-radius: 12px;
            border: 2px solid #f39c12; width: 600px; height: 450px; z-index: 80;
            display: none; flex-direction: column;
        }
        #script-textarea {
            flex-grow: 1; background: #0a0a0a; color: #00ff88; font-family: 'Consolas', monospace;
            border: 1px solid #333; padding: 10px; resize: none; outline: none; border-radius: 5px; font-size: 14px;
        }
        #autocomplete-list {
            position: absolute; background: #222; border: 1px solid #444; 
            display: none; flex-direction: column; z-index: 100; max-height: 150px; overflow-y: auto;
        }
        .suggestion-item { padding: 5px 10px; cursor: pointer; font-size: 12px; }
        .suggestion-item:hover { background: #00d4ff; color: black; }

        .player-label { position: absolute; background: rgba(0,0,0,0.8); color: #00d4ff; padding: 2px 8px; border-radius: 4px; font-size: 12px; z-index: 5; pointer-events: none; }
    </style>
</head>
<body>
    <div id="loading-overlay">BUBBLE ENGINE LOADING...</div>

    <div id="info">
        <h2 id="gameNameDisplay" style="margin:0; color:#00d4ff;">BUBBLE GAMES</h2>
        <p id="status">Status: BUILDING</p>
        <div id="coords">POS - X: 0 | Y: 0 | Z: 0</div>
    </div>

    <div id="script-editor-panel">
        <div style="display:flex; justify-content: space-between; align-items: center;">
            <h3 style="color:#f39c12; margin:0;">📜 SCRIPT EDITOR</h3>
            <label style="font-size: 12px; color: #aaa;">
                <input type="checkbox" id="isServerScript"> ServerScript
            </label>
        </div>
        <div style="position:relative; flex-grow:1; margin-top:10px;">
            <textarea id="script-textarea" spellcheck="false" placeholder="// e.g. part.position.y += 0.1;"></textarea>
            <div id="autocomplete-list"></div>
        </div>
        <div style="display:flex; gap:10px; margin-top:10px; justify-content: flex-end;">
            <button onclick="closeScriptEditor()" style="width:100px; height:35px; border-color:#555;">CANCEL</button>
            <button id="saveScriptBtn" onclick="saveScript()" style="width:120px; height:35px; background:#f39c12; color:black; border:none;">SAVE & APPLY</button>
        </div>
    </div>

    <div id="settings-panel">
        <div class="setting-group">
            <div class="label-container"><label>Speed</label><input type="number" id="speed-num" class="num-input" value="0.12"></div>
            <input type="range" id="speed-slider" min="0.01" max="0.5" step="0.01" value="0.12">
        </div>
        <div class="setting-group">
            <div class="label-container"><label>Gravity</label><input type="number" id="gravity-num" class="num-input" value="0.015"></div>
            <input type="range" id="gravity-slider" min="0" max="0.05" step="0.001" value="0.015">
        </div>
        <div id="part-settings" style="display:none; border-top:1px solid #333; padding-top:10px;">
            <label style="font-size:10px;">PART SCALE</label>
            <input type="range" id="size-slider" min="0.1" max="10" step="0.1" value="1">
        </div>
    </div>

    <div id="item-selector">
        <div class="item-card selected" onclick="selectItem('block')" id="card-block">
            <div style="width:20px; height:20px; background:#ccc; border:1px solid #999;"></div>
            <div style="font-size:9px; margin-top:4px;">BLOCK</div>
        </div>
        <div class="item-card" onclick="selectItem('spawn')" id="card-spawn">
            <div style="width:20px; height:5px; background:#00ffff; box-shadow:0 0 5px #00ffff;"></div>
            <div style="font-size:9px; margin-top:4px;">SPAWN</div>
        </div>
    </div>

    <div id="top-bar" class="controls">
        <button id="playTestBtn" onclick="togglePlayTest()">PLAY TEST ▶</button>
        <button id="publishBtn" onclick="publishGame()">PUBLISH 🚀</button>
        <button id="dragModeBtn" onclick="toggleTool('drag')">DRAG</button>
        <button id="scriptModeBtn" onclick="toggleTool('script')">SCRIPT</button>
        <button id="deleteModeBtn" onclick="toggleTool('delete')">DELETE</button>
        <button onclick="exitGame()">EXIT</button>
    </div>
    <div id="crosshair"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { TransformControls } from 'three/addons/controls/TransformControls.js';

        const SUPABASE_URL = 'https://sideqpofgknyfagrjnke.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_ULjlm97u7-dg8ekTPU84aA_rA1CtUnH';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0c);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1.0));
        const grid = new THREE.GridHelper(100, 100, 0x00d4ff, 0x222222);
        scene.add(grid);

        // --- GLOBAL STATE ---
        let isPlayMode = false;
        let currentTool = 'place';
        let selectedItemType = 'block';
        let moveSpeed = 0.12;
        let worldGravity = 0.015;
        let velocityY = 0;
        let isGrounded = false;
        let spawnPoint = null;
        let objects = [];
        let activeRuntimeScripts = [];
        let editorState = { pos: new THREE.Vector3(), rot: new THREE.Euler() };

        // --- SCRIPT ICON TEXTURE ---
        function createScriptIcon() {
            const canvas = document.createElement('canvas');
            canvas.width = 64; canvas.height = 64;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#f39c12';
            ctx.beginPath(); ctx.arc(32, 32, 28, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = 'black'; ctx.font = 'bold 40px monospace'; ctx.textAlign = 'center';
            ctx.fillText('{ }', 32, 45);
            return new THREE.CanvasTexture(canvas);
        }
        const scriptIconTex = createScriptIcon();

        const gizmo = new TransformControls(camera, renderer.domElement);
        scene.add(gizmo);

        // --- COLLISION & PHYSICS ---
        const playerRadius = 0.5;
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        function checkCollisions(targetPos) {
            const playerBox = new THREE.Box3().setFromCenterAndSize(targetPos, new THREE.Vector3(0.8, 1.8, 0.8));
            for (let obj of objects) {
                if (obj === spawnPoint || obj.isFloor) continue;
                const objBox = new THREE.Box3().setFromObject(obj);
                if (playerBox.intersectsBox(objBox)) return true;
            }
            return false;
        }

        // --- AUTOCOMPLETE LOGIC ---
        const keywords = ['part.position.x', 'part.position.y', 'part.position.z', 'part.rotation.y', 'part.scale.x', 'Math.sin(Date.now()*0.001)', 'scene.remove(part)', 'part.material.color.setHex(0xff0000)'];
        const textarea = document.getElementById('script-textarea');
        const autoList = document.getElementById('autocomplete-list');

        textarea.oninput = (e) => {
            const val = textarea.value.split('\n').pop().trim();
            if (val.length < 2) { autoList.style.display = 'none'; return; }
            const matches = keywords.filter(k => k.startsWith(val));
            if (matches.length > 0) {
                autoList.innerHTML = matches.map(m => `<div class="suggestion-item">${m}</div>`).join('');
                autoList.style.display = 'flex';
                autoList.style.left = '10px'; autoList.style.top = '10px';
            } else { autoList.style.display = 'none'; }
        };

        autoList.onclick = (e) => {
            if (e.target.className === 'suggestion-item') {
                const lines = textarea.value.split('\n');
                lines[lines.length-1] = e.target.innerText;
                textarea.value = lines.join('\n');
                autoList.style.display = 'none';
                textarea.focus();
            }
        };

        // --- CORE FUNCTIONS ---
        window.togglePlayTest = () => {
            isPlayMode = !isPlayMode;
            const btn = document.getElementById('playTestBtn');
            
            if (isPlayMode) {
                if (!spawnPoint) { alert("Add a Spawn Point first!"); isPlayMode = false; return; }
                
                // SAVE EDITOR STATE
                editorState.pos.copy(camera.position);
                editorState.rot.copy(camera.rotation);
                
                // SETUP PLAY
                btn.innerText = "STOP TEST ⏹"; btn.classList.add('playing');
                document.getElementById('crosshair').style.display = 'block';
                camera.position.set(spawnPoint.position.x, spawnPoint.position.y + 1, spawnPoint.position.z);
                
                // LOCK MOUSE IF PC
                if (!('ontouchstart' in window)) {
                    renderer.domElement.requestPointerLock();
                }

                // COMPILE SCRIPTS
                activeRuntimeScripts = [];
                objects.forEach(obj => {
                    if (obj.userData.scriptCode) {
                        try {
                            const logic = new Function('part', 'scene', obj.userData.scriptCode);
                            activeRuntimeScripts.push({ part: obj, logic });
                        } catch(e) { console.error("Script Error:", e); }
                    }
                    if (obj.scriptIcon) obj.scriptIcon.visible = false;
                });
            } else {
                // STOP & RESET
                btn.innerText = "PLAY TEST ▶"; btn.classList.remove('playing');
                document.getElementById('crosshair').style.display = 'none';
                camera.position.copy(editorState.pos);
                camera.rotation.copy(editorState.rot);
                document.exitPointerLock?.();
                
                // SHOW ICONS AGAIN
                objects.forEach(obj => { if (obj.scriptIcon) obj.scriptIcon.visible = true; });
                activeRuntimeScripts = [];
            }
        };

        let activeScriptBlock = null;
        window.saveScript = () => {
            if (activeScriptBlock) {
                activeScriptBlock.userData.scriptCode = textarea.value;
                activeScriptBlock.userData.isServer = document.getElementById('isServerScript').checked;
                
                if (!activeScriptBlock.scriptIcon) {
                    const spriteMat = new THREE.SpriteMaterial({ map: scriptIconTex });
                    const sprite = new THREE.Sprite(spriteMat);
                    sprite.scale.set(0.5, 0.5, 0.5);
                    sprite.position.y = 0.8;
                    activeScriptBlock.add(sprite);
                    activeScriptBlock.scriptIcon = sprite;
                }
            }
            closeScriptEditor();
        };

        window.publishGame = async () => {
            const gameData = objects.map(o => ({
                x: o.position.x, y: o.position.y, z: o.position.z,
                s: o.scale.x, 
                type: o === spawnPoint ? 'spawn' : 'block',
                script: o.userData.scriptCode || null,
                isServer: o.userData.isServer || false
            }));
            
            const id = localStorage.getItem('currentGameId');
            try {
                await supabaseClient.from('games').update({ 
                    blocks: gameData, 
                    config: { speed: moveSpeed, gravity: worldGravity } 
                }).eq('id', id);
                alert("Game Published & Scripts Saved!");
            } catch (e) { alert("Error publishing: " + e.message); }
        };

        // --- INPUTS ---
        const keys = {};
        window.onkeydown = (e) => { keys[e.code] = true; if (e.code === 'Escape' && isPlayMode) togglePlayTest(); };
        window.onkeyup = (e) => keys[e.code] = false;

        window.onmousedown = (e) => {
            if (isPlayMode || e.target.closest('button') || e.target.closest('#settings-panel')) return;
            
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            
            const intersects = raycaster.intersectObjects(objects);
            if (intersects.length > 0) {
                const target = intersects[0].object;
                if (currentTool === 'delete') {
                    scene.remove(target);
                    objects = objects.filter(o => o !== target);
                } else if (currentTool === 'script') {
                    activeScriptBlock = target;
                    textarea.value = target.userData.scriptCode || "";
                    document.getElementById('isServerScript').checked = target.userData.isServer || false;
                    document.getElementById('script-editor-panel').style.display = 'flex';
                } else if (currentTool === 'drag') {
                    gizmo.attach(target);
                }
            } else if (currentTool === 'place') {
                const planeIntersect = raycaster.intersectObject(grid);
                if (planeIntersect.length > 0) {
                    const pos = planeIntersect[0].point.round();
                    const geo = selectedItemType === 'spawn' ? new THREE.BoxGeometry(1, 0.2, 1) : new THREE.BoxGeometry(1,1,1);
                    const mat = new THREE.MeshStandardMaterial({ color: selectedItemType === 'spawn' ? 0x00ffff : 0xcccccc });
                    const m = new THREE.Mesh(geo, mat);
                    m.position.set(pos.x, selectedItemType === 'spawn' ? 0.1 : 0.5, pos.z);
                    m.userData = {};
                    scene.add(m);
                    objects.push(m);
                    if (selectedItemType === 'spawn') spawnPoint = m;
                }
            }
        };

        document.addEventListener('mousemove', (e) => {
            if (isPlayMode && document.pointerLockElement) {
                camera.rotation.y -= e.movementX * 0.002;
                camera.rotation.x -= e.movementY * 0.002;
                camera.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, camera.rotation.x));
            }
        });

        // --- MAIN LOOP ---
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const delta = Math.min(clock.getDelta(), 0.1); // Cap delta to prevent teleporting through walls

            if (isPlayMode) {
                // PHYSICS (Fixed step logic)
                velocityY -= worldGravity;
                let nextPos = camera.position.clone();
                nextPos.y += velocityY;

                // Ground check
                if (nextPos.y < 1.4) {
                    nextPos.y = 1.4;
                    velocityY = 0;
                    isGrounded = true;
                } else {
                    isGrounded = false;
                }

                // Movement
                const dir = new THREE.Vector3();
                if (keys['KeyW']) dir.z -= 1;
                if (keys['KeyS']) dir.z += 1;
                if (keys['KeyA']) dir.x -= 1;
                if (keys['KeyD']) dir.x += 1;
                dir.applyQuaternion(camera.quaternion);
                dir.y = 0;
                dir.normalize().multiplyScalar(moveSpeed);

                const moveStep = nextPos.clone().add(dir);
                if (!checkCollisions(moveStep)) {
                    camera.position.copy(moveStep);
                } else {
                    camera.position.y = nextPos.y; // Slide against walls
                }

                if (keys['Space'] && isGrounded) {
                    velocityY = 0.3;
                }

                // Run Scripts
                activeRuntimeScripts.forEach(s => s.logic(s.part, scene));
            }

            document.getElementById('coords').innerText = `POS - X: ${camera.position.x.toFixed(1)} | Y: ${camera.position.y.toFixed(1)} | Z: ${camera.position.z.toFixed(1)}`;
            renderer.render(scene, camera);
        }

        // --- INITIALIZE ---
        async function loadGame() {
            const id = localStorage.getItem('currentGameId');
            if (!id) { document.getElementById('loading-overlay').style.display = 'none'; return; }
            
            const { data } = await supabaseClient.from('games').select('*').eq('id', id).single();
            if (data && data.blocks) {
                data.blocks.forEach(b => {
                    const geo = b.type === 'spawn' ? new THREE.BoxGeometry(1, 0.2, 1) : new THREE.BoxGeometry(1,1,1);
                    const mat = new THREE.MeshStandardMaterial({ color: b.type === 'spawn' ? 0x00ffff : 0xcccccc });
                    const m = new THREE.Mesh(geo, mat);
                    m.position.set(b.x, b.y, b.z);
                    m.scale.set(b.s, b.s, b.s);
                    m.userData = { scriptCode: b.script, isServer: b.isServer };
                    
                    if (b.script) {
                        const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: scriptIconTex }));
                        sprite.scale.set(0.5, 0.5, 0.5); sprite.position.y = 0.8;
                        m.add(sprite); m.scriptIcon = sprite;
                    }
                    
                    scene.add(m); objects.push(m);
                    if (b.type === 'spawn') spawnPoint = m;
                });
                if (data.config) {
                    moveSpeed = data.config.speed || 0.12;
                    worldGravity = data.config.gravity || 0.015;
                    document.getElementById('speed-num').value = moveSpeed;
                    document.getElementById('gravity-num').value = worldGravity;
                }
            }
            document.getElementById('loading-overlay').style.display = 'none';
        }

        window.selectItem = (t) => { selectedItemType = t; currentTool = 'place'; gizmo.detach(); };
        window.toggleTool = (t) => { currentTool = (currentTool === t ? 'place' : t); gizmo.detach(); };
        window.closeScriptEditor = () => { document.getElementById('script-editor-panel').style.display = 'none'; };
        window.exitGame = () => { window.location.href = 'index.html'; };

        loadGame();
        animate();
    </script>
</body>
</html>
