<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bubble Games - Editor</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: sans-serif; touch-action: none; color: white; }
        .controls { position: absolute; z-index: 10; display: flex; gap: 10px; }
        #top-bar { top: 20px; right: 20px; flex-direction: column; align-items: flex-end; }
        
        #settings-panel { 
            position: absolute; top: 100px; left: 20px; 
            background: rgba(0,0,0,0.8); padding: 15px; border-radius: 12px; 
            border: 1px solid #00d4ff; width: 180px; z-index: 50;
        }
        .setting-group { margin-bottom: 15px; }
        .setting-group label { display: block; font-size: 11px; text-transform: uppercase; color: #00d4ff; margin-bottom: 5px; }
        input[type="range"] { width: 100%; cursor: pointer; accent-color: #00d4ff; }

        button { 
            width: 140px; height: 50px; font-size: 14px; font-weight: bold;
            background: rgba(0, 212, 255, 0.1); color: white;
            border: 2px solid #00d4ff; border-radius: 10px; cursor: pointer;
            backdrop-filter: blur(5px); margin-bottom: 5px;
            display: flex; align-items: center; justify-content: center; transition: 0.2s;
        }
        
        #publishBtn { background: #00d4ff; color: #000; }
        #saveBtn { background: #f39c12; color: #000; border-color: #f39c12; }
        #playTestBtn { background: #2ecc71; color: #000; border-color: #2ecc71; }
        #playTestBtn.playing { background: #e74c3c; color: white; border-color: #e74c3c; }

        .active-tool { background: #00d4ff !important; color: #000 !important; box-shadow: 0 0 15px #00d4ff; }
        #deleteModeBtn.active-tool { background: #ff3232 !important; border-color: #ff3232 !important; color: white !important; box-shadow: 0 0 15px #ff3232; }

        #item-selector { 
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 15px; background: rgba(0,0,0,0.8); padding: 10px;
            border-radius: 15px; border: 2px solid #333; z-index: 20;
        }
        .item-card {
            width: 60px; height: 60px; border-radius: 10px; border: 2px solid #444;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; background: #111; transition: 0.2s;
        }
        .item-card:hover { border-color: #00d4ff; }
        .item-card.selected { border-color: #00d4ff; background: rgba(0, 212, 255, 0.2); }
        .item-icon { width: 30px; height: 30px; margin-bottom: 2px; border-radius: 4px; }
        .icon-block { background: #cccccc; border: 1px solid #999; }
        .icon-spawn { background: #00ffff; box-shadow: 0 0 10px #00ffff; }
        .item-label { font-size: 10px; color: white; text-transform: uppercase; }

        #info { position: absolute; top: 10px; left: 10px; color: white; pointer-events: none; }
        #coords { font-family: monospace; color: #00d4ff; margin-top: 5px; background: rgba(0,0,0,0.5); padding: 5px; border-radius: 5px; }
        #crosshair { 
            position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; 
            border: 2px solid white; border-radius: 50%; transform: translate(-50%, -50%); 
            display: none; pointer-events: none; 
        }
        #loading-overlay { position: fixed; inset: 0; background: #050505; z-index: 100; display: flex; align-items: center; justify-content: center; color: #00d4ff; font-weight: bold; }
        
        .editor-ui-hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="loading-overlay">INITIALIZING EDITOR...</div>

    <div id="info">
        <h2 id="gameNameDisplay" style="margin:0; color:#00d4ff;">BUBBLE EDITOR</h2>
        <p id="status">Status: BUILDING MODE</p>
        <div id="coords">POS - X: 0 | Y: 0 | Z: 0</div>
    </div>

    <div id="settings-panel" class="editor-ui">
        <div class="setting-group">
            <label>Move Speed</label>
            <input type="range" id="speed-slider" min="0.02" max="0.25" step="0.01" value="0.08">
        </div>
        <div class="setting-group">
            <label>Gravity</label>
            <input type="range" id="gravity-slider" min="0.001" max="0.03" step="0.001" value="0.008">
        </div>
        <div id="part-settings" style="display:block; border-top: 1px solid #333; padding-top: 10px;">
            <label>Selected Part Size</label>
            <input type="range" id="size-slider" min="0.2" max="5" step="0.1" value="1">
            <p style="font-size: 9px; color: #888; margin-top:5px;">Drag mode to resize</p>
        </div>
    </div>

    <div id="item-selector" class="editor-ui">
        <div class="item-card selected" onclick="selectItem('block')" id="card-block">
            <div class="item-icon icon-block"></div>
            <div class="item-label">Block</div>
        </div>
        <div class="item-card" onclick="selectItem('spawn')" id="card-spawn">
            <div class="item-icon icon-spawn"></div>
            <div class="item-label">Spawn</div>
        </div>
    </div>

    <div id="top-bar" class="controls">
        <button id="playTestBtn" onclick="togglePlayTest()">PLAY TEST ▶</button>
        <button id="saveBtn" class="editor-ui" onclick="quickSave()">QUICK SAVE 💾</button>
        <button id="publishBtn" class="editor-ui" onclick="publishGame()">PUBLISH 🚀</button>
        <button id="dragModeBtn" class="editor-ui" onclick="toggleTool('drag')">DRAG / RESIZE</button>
        <button id="deleteModeBtn" class="editor-ui" onclick="toggleTool('delete')">DELETE</button>
        <button onclick="exitGame()">EXIT</button>
    </div>
    <div id="crosshair"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="importmap">
    { 
        "imports": { 
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        } 
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { TransformControls } from 'three/addons/controls/TransformControls.js';

        const SUPABASE_URL = 'https://sideqpofgknyfagrjnke.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_ULjlm97u7-dg8ekTPU84aA_rA1CtUnH';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = "Guest";
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0c);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1.2));
        const grid = new THREE.GridHelper(100, 100, 0x00d4ff, 0x222222);
        scene.add(grid);

        const floor = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.MeshBasicMaterial({ visible: false }));
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        const objects = [floor]; 
        const blockGeo = new THREE.BoxGeometry(1, 1, 1);
        const spawnGeo = new THREE.BoxGeometry(0.8, 0.2, 0.8);
        const spawnMat = new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x00ffff, emissiveIntensity: 2 });
        
        const raycaster = new THREE.Raycaster();
        const downRay = new THREE.Raycaster(); 
        const mouse = new THREE.Vector2();
        const gizmo = new TransformControls(camera, renderer.domElement);
        scene.add(gizmo);

        let isPlayMode = false; 
        let currentTool = 'place'; 
        let selectedItemType = 'block'; 
        let moveSpeed = 0.08;
        let worldGravity = 0.008;
        let velocityY = 0;
        let isGrounded = false;
        let spawnPoint = null;
        let selectedObject = null;
        let editorCamPos = new THREE.Vector3(0, 5, 10);
        let editorCamRot = new THREE.Euler(-0.4, 0, 0);
        const playerHeight = 1.6; 
        const keys = {};

        // Slider Updates
        document.getElementById('speed-slider').oninput = (e) => moveSpeed = parseFloat(e.target.value);
        document.getElementById('gravity-slider').oninput = (e) => worldGravity = parseFloat(e.target.value);
        document.getElementById('size-slider').oninput = (e) => {
            if (selectedObject && selectedObject !== floor) {
                const s = parseFloat(e.target.value);
                selectedObject.scale.set(s, s, s);
            }
        };

        function updateUIVisibility() {
            document.querySelectorAll('.editor-ui').forEach(el => {
                isPlayMode ? el.classList.add('editor-ui-hidden') : el.classList.remove('editor-ui-hidden');
            });
        }

        window.togglePlayTest = () => {
            const btn = document.getElementById('playTestBtn');
            isPlayMode = !isPlayMode;
            updateUIVisibility();

            if (isPlayMode) {
                if (!spawnPoint) { 
                    alert("❌ Place a Spawn Point first!"); 
                    isPlayMode = false; 
                    updateUIVisibility();
                    return; 
                }
                editorCamPos.copy(camera.position);
                editorCamRot.copy(camera.rotation);
                btn.innerText = "STOP TEST ⏹"; btn.classList.add('playing');
                document.getElementById('status').innerText = "Status: PLAY TESTING";
                document.getElementById('crosshair').style.display = 'block';
                gizmo.detach();
                camera.position.set(spawnPoint.position.x, spawnPoint.position.y + 1.6, spawnPoint.position.z);
            } else {
                btn.innerText = "PLAY TEST ▶"; btn.classList.remove('playing');
                document.getElementById('status').innerText = "Status: BUILDING MODE";
                document.getElementById('crosshair').style.display = 'none';
                camera.position.copy(editorCamPos);
                camera.rotation.copy(editorCamRot);
                velocityY = 0;
            }
        };

        window.quickSave = async () => {
            const blocksData = objects.filter(obj => obj !== floor).map(obj => ({ 
                x: obj.position.x, y: obj.position.y, z: obj.position.z, s: obj.scale.x, type: (obj === spawnPoint) ? 'spawn' : 'block' 
            }));
            const editId = localStorage.getItem('currentGameId');
            if(editId) {
                const { error } = await supabaseClient.from('games').update({ blocks: blocksData }).eq('id', editId);
                if (!error) alert("💾 Quick Saved!");
                else alert("Error: " + error.message);
            } else {
                alert("Publish the game first to save it to your library!");
            }
        };

        window.publishGame = async () => {
            if (!spawnPoint) { alert("❌ Need a Spawn Point!"); return; }
            const name = prompt("Name your game:"); if (!name) return;
            const blocksData = objects.filter(obj => obj !== floor).map(obj => ({ 
                x: obj.position.x, y: obj.position.y, z: obj.position.z, s: obj.scale.x, type: (obj === spawnPoint) ? 'spawn' : 'block' 
            }));
            const { data, error } = await supabaseClient.from('games').insert([{ name, blocks: blocksData, creator: currentUser }]).select();
            if (!error) {
                alert("🚀 Game Published!");
                window.location.href = 'index.html';
            } else alert(error.message);
        };

        window.toggleTool = (tool) => {
            currentTool = (currentTool === tool) ? 'place' : tool;
            gizmo.detach();
            document.getElementById('deleteModeBtn').classList.toggle('active-tool', currentTool === 'delete');
            document.getElementById('dragModeBtn').classList.toggle('active-tool', currentTool === 'drag');
        };

        window.selectItem = (type) => {
            selectedItemType = type; currentTool = 'place'; gizmo.detach();
            document.querySelectorAll('.item-card').forEach(c => c.classList.remove('selected'));
            document.getElementById(`card-${type}`).classList.add('selected');
        };

        window.exitGame = () => { if(confirm("Exit to menu?")) window.location.href = 'index.html'; };

        async function init() {
            camera.position.copy(editorCamPos);
            camera.rotation.copy(editorCamRot);
            
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (user) currentUser = user.email.split('@')[0];

            const id = localStorage.getItem('currentGameId');
            if (id) {
                const { data: game } = await supabaseClient.from('games').select('*').eq('id', id).single();
                if (game && game.blocks) {
                    game.blocks.forEach(d => {
                        const isSpawn = d.type === 'spawn';
                        const mesh = new THREE.Mesh(isSpawn ? spawnGeo : blockGeo, isSpawn ? spawnMat : new THREE.MeshStandardMaterial({ color: 0xcccccc }));
                        mesh.position.set(d.x, d.y, d.z); mesh.scale.set(d.s||1, d.s||1, d.s||1);
                        scene.add(mesh); objects.push(mesh); if (isSpawn) spawnPoint = mesh;
                    });
                }
            }
            document.getElementById('loading-overlay').style.display = 'none';
        }
        init();

        window.addEventListener('keydown', (e) => { keys[e.key.toLowerCase()] = true; if(e.code === "Space") keys["space"] = true; });
        window.addEventListener('keyup', (e) => { keys[e.key.toLowerCase()] = false; if(e.code === "Space") keys["space"] = false; });

        let isDraggingCam = false; let prevMouse = { x: 0, y: 0 };
        window.addEventListener('pointerdown', (e) => {
            if (e.target.closest('button') || e.target.closest('.item-card') || e.target.closest('input')) return;
            
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(objects);

            if (!isPlayMode) {
                if (currentTool === 'drag' && intersects.length > 0 && intersects[0].object !== floor) {
                    selectedObject = intersects[0].object;
                    gizmo.attach(selectedObject);
                } else if (currentTool === 'place' && intersects.length > 0) {
                    const intersect = intersects[0];
                    const isSpawn = selectedItemType === 'spawn';
                    const m = new THREE.Mesh(isSpawn ? spawnGeo : blockGeo, isSpawn ? spawnMat : new THREE.MeshStandardMaterial({ color: 0xcccccc }));
                    
                    const normal = intersect.face.normal.clone();
                    const pos = intersect.point.clone().add(normal.multiplyScalar(0.5));
                    m.position.set(Math.round(pos.x), isSpawn ? pos.y : Math.round(pos.y), Math.round(pos.z));
                    
                    scene.add(m); objects.push(m);
                    if (isSpawn) { 
                        if(spawnPoint) { scene.remove(spawnPoint); objects.splice(objects.indexOf(spawnPoint), 1); }
                        spawnPoint = m; 
                    }
                } else if (currentTool === 'delete' && intersects.length > 0 && intersects[0].object !== floor) {
                    if (intersects[0].object === spawnPoint) spawnPoint = null;
                    scene.remove(intersects[0].object);
                    objects.splice(objects.indexOf(intersects[0].object), 1);
                } else if (!gizmo.dragging) {
                    isDraggingCam = true; prevMouse = { x: e.clientX, y: e.clientY };
                }
            }
        });

        window.addEventListener('pointermove', (e) => {
            if (!isDraggingCam || isPlayMode) return;
            camera.rotation.y -= (e.clientX - prevMouse.x) * 0.003;
            camera.rotation.x -= (e.clientY - prevMouse.y) * 0.003;
            prevMouse = { x: e.clientX, y: e.clientY };
        });
        window.addEventListener('pointerup', () => isDraggingCam = false);

        function animate() {
            requestAnimationFrame(animate);
            if (isPlayMode) {
                // Gravity & Floor Detection
                downRay.set(camera.position, new THREE.Vector3(0, -1, 0));
                const hits = downRay.intersectObjects(objects);
                if (hits.length > 0 && hits[0].distance <= playerHeight) {
                    if (velocityY < 0) { velocityY = 0; isGrounded = true; camera.position.y = hits[0].point.y + playerHeight; }
                } else { isGrounded = false; velocityY -= worldGravity; }

                if (keys["space"] && isGrounded) { velocityY = 0.15; isGrounded = false; }
                camera.position.y += velocityY;

                // Movement
                let move = new THREE.Vector3();
                if (keys['w']) move.z -= 1; if (keys['s']) move.z += 1;
                if (keys['a']) move.x -= 1; if (keys['d']) move.x += 1;
                if (move.length() > 0) {
                    move.applyQuaternion(camera.quaternion);
                    move.y = 0; move.normalize();
                    camera.position.addScaledVector(move, moveSpeed);
                }
                // Void Check
                if (camera.position.y < -20) camera.position.set(spawnPoint.position.x, spawnPoint.position.y + 1.6, spawnPoint.position.z);
            } else {
                // Flying Controls in Build Mode
                if (keys['w']) camera.translateZ(-0.2); if (keys['s']) camera.translateZ(0.2);
                if (keys['a']) camera.translateX(-0.2); if (keys['d']) camera.translateX(0.2);
            }
            document.getElementById('coords').innerText = `X: ${camera.position.x.toFixed(1)} | Y: ${camera.position.y.toFixed(1)} | Z: ${camera.position.z.toFixed(1)}`;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
