<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bubbler+ | Architect Engine</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');
:root{--cyan:#00d4ff;--mag:#ff00cc;--green:#00ff88;--dark:#050508;--panel:rgba(5,5,15,0.94);--border:rgba(0,212,255,0.25);--red:#ff3355;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--dark);font-family:'Share Tech Mono',monospace;color:#fff;overflow:hidden;height:100vh;touch-action:none;}
#app{display:flex;height:100vh;width:100vw;}
#viewport{flex:1;position:relative;overflow:hidden;}
canvas{display:block;}
#hud{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;}
#hud-tl{position:absolute;top:12px;left:12px;}
#game-title{font-family:'Orbitron',sans-serif;font-size:16px;font-weight:900;color:var(--cyan);text-shadow:0 0 20px var(--cyan);letter-spacing:4px;}
#coords{font-size:11px;color:var(--cyan);background:rgba(0,0,0,0.6);padding:5px 9px;border-radius:6px;border:1px solid rgba(0,212,255,0.18);line-height:1.7;margin-top:6px;}
#hud-tr{position:absolute;top:12px;right:12px;display:flex;flex-direction:column;gap:5px;align-items:flex-end;pointer-events:auto;}
.hbtn{font-family:'Orbitron',sans-serif;font-size:10px;font-weight:700;padding:7px 12px;border-radius:7px;cursor:pointer;letter-spacing:1px;transition:all .15s;border:1px solid var(--border);background:rgba(0,0,0,0.75);color:#fff;white-space:nowrap;}
.hbtn:hover{border-color:var(--cyan);color:var(--cyan);}
#playBtn{border-color:var(--green);color:var(--green);}
#playBtn:hover,#playBtn.on{background:var(--green);color:#000;box-shadow:0 0 18px var(--green);}
#publishBtn{border-color:var(--mag);color:var(--mag);}
#publishBtn:hover{background:var(--mag);color:#000;}
#exitBtn{border-color:var(--red);color:var(--red);}
#exitBtn:hover{background:var(--red);color:#fff;}
#learnBtn{border-color:#ffaa00;color:#ffaa00;}
#learnBtn:hover{background:#ffaa00;color:#000;}
#crosshair{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:14px;height:14px;border:2px solid rgba(255,255,255,.8);border-radius:50%;display:none;pointer-events:none;}
#crosshair::before,#crosshair::after{content:'';position:absolute;background:rgba(255,255,255,.8);}
#crosshair::before{width:1px;height:6px;left:50%;top:-8px;transform:translateX(-50%);}
#crosshair::after{height:1px;width:6px;top:50%;left:-8px;transform:translateY(-50%);}
#notif{position:absolute;top:55px;left:50%;transform:translateX(-50%);pointer-events:none;z-index:50;display:flex;flex-direction:column;gap:5px;align-items:center;}
.notif{background:rgba(0,0,0,.88);border:1px solid var(--cyan);color:var(--cyan);padding:7px 14px;border-radius:7px;font-size:12px;animation:nin .2s ease,nout .3s 2.2s ease forwards;}
.notif.err{border-color:var(--red);color:var(--red);}
.notif.ok{border-color:var(--green);color:var(--green);}
@keyframes nin{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:none}}
@keyframes nout{to{opacity:0}}
#tool-bar{position:absolute;top:50%;left:12px;transform:translateY(-50%);display:flex;flex-direction:column;gap:6px;pointer-events:auto;z-index:5;}
.tbtn{width:40px;height:40px;border-radius:8px;border:1px solid #2a2a3a;background:rgba(0,0,0,.75);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;transition:all .15s;}
.tbtn:hover,.tbtn.on{border-color:var(--cyan);box-shadow:0 0 10px rgba(0,212,255,.4);}
.tbtn.del.on{border-color:var(--red);box-shadow:0 0 10px rgba(255,51,85,.4);}
#item-bar{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);display:flex;gap:7px;background:rgba(0,0,0,.88);padding:8px;border-radius:12px;border:1px solid var(--border);pointer-events:auto;z-index:5;}
.icard{width:54px;height:54px;border-radius:8px;border:2px solid #2a2a3a;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;background:#08080f;transition:all .15s;gap:3px;}
.icard:hover{border-color:var(--cyan);}
.icard.sel{border-color:var(--cyan);background:rgba(0,212,255,.12);box-shadow:0 0 10px rgba(0,212,255,.25);}
.iicon{width:24px;height:24px;border-radius:4px;}
.i-block{background:#ccc;border:1px solid #999;}
.i-spawn{background:#00ffff;box-shadow:0 0 7px #00ffff;border-radius:50%;}
.i-slab{background:linear-gradient(to right,#00d4ff,#0055aa);height:10px!important;margin-top:7px;}
.i-ramp{background:linear-gradient(45deg,#888,#ccc);clip-path:polygon(0 100%,100% 100%,100% 0);}
.ilabel{font-size:9px;color:#aaa;letter-spacing:.5px;}
#sidebar{width:340px;min-width:340px;background:var(--panel);border-left:1px solid var(--border);display:flex;flex-direction:column;backdrop-filter:blur(20px);z-index:10;}
#tabs{display:flex;border-bottom:1px solid var(--border);}
.tab{flex:1;padding:9px 2px;text-align:center;cursor:pointer;font-size:9px;letter-spacing:1px;color:#444;transition:all .2s;font-family:'Orbitron',sans-serif;}
.tab.on{color:var(--cyan);border-bottom:2px solid var(--cyan);}
.tab-panel{display:none;flex:1;flex-direction:column;overflow:hidden;}
.tab-panel.on{display:flex;}
#editor-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;padding:10px;gap:7px;min-height:0;} 
#editor-outer{flex:1;position:relative;min-height:0;display:flex;flex-direction:column;}
#code-editor{flex:1;min-height:0;background:#020204;border:1px solid rgba(0,212,255,.18);border-radius:8px;color:#e0e0e0;font-family:'Share Tech Mono',monospace;font-size:13px;line-height:1.7;padding:12px;resize:none;outline:none;tab-size:2;overflow:auto;scrollbar-width:thin;scrollbar-color:var(--cyan) transparent;display:block;width:100%;box-sizing:border-box;}
#code-editor:focus{border-color:rgba(0,212,255,.35);}
#btn-row{display:flex;gap:6px;}
#run-btn{flex:1;font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;padding:9px;border-radius:7px;cursor:pointer;letter-spacing:2px;background:linear-gradient(135deg,rgba(0,212,255,.15),rgba(0,255,136,.08));color:var(--cyan);border:1px solid var(--cyan);transition:all .2s;}
#run-btn:hover{background:var(--cyan);color:#000;box-shadow:0 0 18px var(--cyan);}
#attach-btn{font-family:'Orbitron',sans-serif;font-size:10px;padding:9px 10px;border-radius:7px;cursor:pointer;background:rgba(255,0,204,.08);color:var(--mag);border:1px solid var(--mag);transition:all .2s;white-space:nowrap;}
#attach-btn:hover{background:var(--mag);color:#000;}
#console-wrap{height:110px;border-top:1px solid var(--border);display:flex;flex-direction:column;}
#console-title{font-size:9px;color:#333;letter-spacing:2px;padding:5px 10px;font-family:'Orbitron',sans-serif;}
#console-log{flex:1;overflow-y:auto;padding:3px 10px 7px;font-size:11px;line-height:1.8;scrollbar-width:thin;scrollbar-color:#333 transparent;}
.log-ok{color:var(--green);}.log-err{color:#ff4444;}.log-info{color:#777;}.log-warn{color:#ffaa00;}
#ref-wrap{flex:1;overflow-y:auto;padding:10px;scrollbar-width:thin;scrollbar-color:var(--cyan) transparent;}
.ref-sec{margin-bottom:14px;}
.ref-ttl{font-family:'Orbitron',sans-serif;font-size:9px;color:var(--mag);letter-spacing:2px;margin-bottom:7px;padding-bottom:3px;border-bottom:1px solid rgba(255,0,204,.18);}
.rc{background:rgba(0,0,0,.4);border-left:2px solid var(--cyan);padding:5px 8px;border-radius:0 5px 5px 0;margin-bottom:3px;font-size:11px;cursor:pointer;transition:all .15s;line-height:1.6;}
.rc:hover{background:rgba(0,212,255,.07);border-left-color:var(--mag);}
.rc .kw{color:var(--cyan);}
.rc .cm{color:#444;font-size:10px;display:block;margin-top:1px;}
#objects-wrap{flex:1;overflow-y:auto;padding:10px;scrollbar-width:thin;scrollbar-color:var(--cyan) transparent;}
.oi{background:rgba(0,0,0,.4);border:1px solid #1e1e2e;border-radius:6px;padding:7px 10px;margin-bottom:5px;font-size:11px;transition:all .15s;display:flex;justify-content:space-between;align-items:center;}
.oi:hover{border-color:var(--cyan);}
.oi.hscript{border-color:rgba(255,0,204,.35);}
.oi .oname{color:var(--cyan);font-weight:bold;}
.oi .opos{color:#444;font-size:10px;}
.sbadge{font-size:9px;color:var(--mag);background:rgba(255,0,204,.12);border:1px solid rgba(255,0,204,.3);border-radius:3px;padding:1px 5px;margin-left:5px;}
.oi-actions{display:flex;gap:4px;align-items:center;}
.oi-edit{color:var(--mag);cursor:pointer;padding:2px 5px;font-size:11px;border-radius:3px;}
.oi-edit:hover{background:rgba(255,0,204,.15);}
.oi-del{color:#ff4444;cursor:pointer;padding:2px 5px;border-radius:3px;}
.oi-del:hover{background:rgba(255,68,68,.2);}

/* MODALS & OVERLAYS */
#psm, #pm{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(8px);}
#psm.open, #pm.open{display:flex;}
#psm-box, #pm-box{background:#070710;border:1px solid var(--mag);border-radius:12px;width:580px;max-width:95vw;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 0 40px rgba(255,0,204,.2);}
#psm-hdr, #pm-hdr{padding:12px 16px;background:rgba(255,0,204,.06);border-bottom:1px solid rgba(255,0,204,.2);display:flex;align-items:center;justify-content:space-between;}
#psm-title, #pm-hdr-title{font-family:'Orbitron',sans-serif;font-size:13px;color:var(--mag);letter-spacing:2px;}
#psm-x{color:#555;cursor:pointer;font-size:18px;line-height:1;padding:2px 6px;}
#psm-x:hover{color:#fff;}
#psm-ed{height:280px;background:#020204;color:#e0e0e0;font-family:'Share Tech Mono',monospace;font-size:12px;line-height:1.7;padding:12px;border:none;outline:none;resize:none;width:100%;tab-size:2;overflow:auto;}
#loading{position:fixed;inset:0;background:#050508;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;}
#ltitle{font-family:'Orbitron',sans-serif;font-size:36px;font-weight:900;color:var(--cyan);text-shadow:0 0 40px var(--cyan);letter-spacing:10px;}
#lbar-w{width:280px;height:2px;background:#111;}
#lbar{height:100%;background:var(--cyan);width:0;transition:width .3s;}
</style>
</head>
<body>

<div id="loading"><div id="ltitle">BUBBLER+</div><div id="lsub">INITIALIZING ARCHITECT ENGINE</div><div id="lbar-w"><div id="lbar"></div></div></div>

<div id="psm">
  <div id="psm-box">
    <div id="psm-hdr"><div id="psm-title">📜 PART SCRIPT</div><div id="psm-x" onclick="closePSM()">✕</div></div>
    <textarea id="psm-ed" spellcheck="false" placeholder="// Use 'self' to refer to this part"></textarea>
    <div style="padding:10px; display:flex; gap:10px; background:#040408;">
      <button onclick="savePSM()" style="background:var(--mag); border:none; padding:8px 15px; color:#000; font-family:'Orbitron'; font-weight:bold; border-radius:4px; cursor:pointer;">SAVE</button>
      <button onclick="closePSM()" style="background:transparent; border:1px solid #333; padding:8px 15px; color:#555; font-family:'Orbitron'; border-radius:4px; cursor:pointer;">CANCEL</button>
    </div>
  </div>
</div>

<div id="app">
  <div id="viewport">
    <div id="hud">
      <div id="hud-tl">
        <div id="game-title">BUBBLER+</div>
        <div id="coords">X:0 Y:0 Z:0</div>
      </div>
      <div id="hud-tr">
        <button class="hbtn" id="playBtn" onclick="togglePlay()">▶ PLAY</button>
        <button class="hbtn" id="exitBtn" onclick="location.reload()">✕ RESET</button>
      </div>
      <div id="crosshair"></div>
      <div id="notif"></div>
    </div>
    <div id="item-bar">
      <div class="icard sel" onclick="selItem('block')" id="c-block"><div class="iicon i-block"></div><div class="ilabel">BLOCK</div></div>
      <div class="icard" onclick="selItem('spawn')" id="c-spawn"><div class="iicon i-spawn"></div><div class="ilabel">SPAWN</div></div>
    </div>
    <div id="tool-bar">
      <div class="tbtn on" id="t-place" onclick="setTool('place')">🧱</div>
      <div class="tbtn del" id="t-delete" onclick="setTool('delete')">🗑</div>
    </div>
  </div>

  <div id="sidebar">
    <div id="tabs">
      <div class="tab on" onclick="showTab('code')">✏️ SCRIPT</div>
      <div class="tab" onclick="showTab('objects')">🗂️ WORLD</div>
    </div>
    <div class="tab-panel on" id="tab-code">
      <div id="editor-wrap">
        <textarea id="code-editor" spellcheck="false" placeholder="// Build your world here..."></textarea>
        <button id="run-btn" onclick="runServerScript()">▶ RUN SCRIPT</button>
      </div>
      <div id="console-wrap">
        <div id="console-log"></div>
      </div>
    </div>
    <div class="tab-panel" id="tab-objects">
      <div id="obj-list"></div>
    </div>
  </div>
</div>

<script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}</script>
<script type="module">
import * as THREE from 'three';
import { TransformControls } from 'three/addons/controls/TransformControls.js';

// --- ENGINE CORE ---
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050508);
const camera = new THREE.PerspectiveCamera(75, 1, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({antialias:true});
const vp = document.getElementById('viewport');
vp.appendChild(renderer.domElement);

function resize(){ renderer.setSize(vp.clientWidth, vp.clientHeight); camera.aspect=vp.clientWidth/vp.clientHeight; camera.updateProjectionMatrix(); }
window.addEventListener('resize', resize); resize();

const amb = new THREE.AmbientLight(0xffffff, 0.6); scene.add(amb);
const sun = new THREE.PointLight(0x00d4ff, 2, 100); sun.position.set(10,20,10); scene.add(sun);
const grid = new THREE.GridHelper(100, 100, 0x222222, 0x111111); scene.add(grid);

// --- STATE ---
let isPlay = false, tool = 'place', selItem = 'block';
let objects = [], sObjs = {}, partScripts = {};
let playerSpeed = 0.15, gravity = 0.015, jumpPower = 0.3;
let velY = 0, isGrounded = false;
const keys = {};

// --- BUILDER TOOLS ---
window.setTool = (t) => {
    tool = t;
    document.querySelectorAll('.tbtn').forEach(b => b.classList.remove('on'));
    document.getElementById('t-'+t).classList.add('on');
};

window.selItem = (i) => {
    selItem = i;
    document.querySelectorAll('.icard').forEach(b => b.classList.remove('sel'));
    document.getElementById('c-'+i).classList.add('sel');
};

const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

renderer.domElement.addEventListener('mousedown', (e) => {
    if(isPlay) return;
    mouse.x = (e.clientX / vp.clientWidth) * 2 - 1;
    mouse.y = -(e.clientY / vp.clientHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObjects(objects.concat(grid));

    if(hits.length > 0){
        const hit = hits[0];
        if(tool === 'place'){
            const pos = hit.point.clone().add(hit.face.normal.clone().multiplyScalar(0.5));
            pos.x = Math.round(pos.x); pos.y = Math.round(pos.y); pos.z = Math.round(pos.z);
            createPart("Part_"+Math.floor(Math.random()*999), pos, selItem);
        } else if(tool === 'delete' && hit.object !== grid){
            scene.remove(hit.object);
            objects = objects.filter(o => o !== hit.object);
            updateObjList();
        }
    }
});

function createPart(name, pos, type){
    const geo = type === 'spawn' ? new THREE.CylinderGeometry(0.5, 0.5, 0.2) : new THREE.BoxGeometry(1,1,1);
    const mat = new THREE.MeshStandardMaterial({color: type === 'spawn' ? 0x00ffff : 0x444444});
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.copy(pos);
    mesh.userData = { name, type };
    scene.add(mesh);
    objects.push(mesh);
    sObjs[name] = mesh;
    updateObjList();
    return mesh;
}

// --- SCRIPT PARSER ---
window.runServerScript = () => {
    const code = document.getElementById('code-editor').value;
    const lines = code.split('\n');
    log("Executing script...", "info");
    
    lines.forEach(line => {
        try {
            if(line.startsWith('construct.')){
                const match = line.match(/construct\.\[(.*)\.SIZE\.(.*)\]/);
                if(match) createPart(match[1], new THREE.Vector3(0,5,0), 'block');
            }
            if(line.startsWith('set.')){
                if(line.includes('PLAYER.SPEED')) playerSpeed = parseFloat(line.split('.').pop()) / 100;
            }
        } catch(e) { log("Error: " + e.message, "err"); }
    });
};

function log(msg, type){
    const l = document.getElementById('console-log');
    l.innerHTML += `<div class="log-${type}">› ${msg}</div>`;
    l.scrollTop = l.scrollHeight;
}

// --- PLAYER CONTROLLER ---
function updatePlayer(){
    if(!isPlay) return;
    const dir = new THREE.Vector3();
    if(keys['w']) dir.z -= 1; if(keys['s']) dir.z += 1;
    if(keys['a']) dir.x -= 1; if(keys['d']) dir.x += 1;
    dir.applyQuaternion(camera.quaternion).normalize();
    camera.position.addScaledVector(dir, playerSpeed);
    
    // Simple Gravity
    velY -= gravity;
    camera.position.y += velY;
    if(camera.position.y < 1.6) { camera.position.y = 1.6; velY = 0; isGrounded = true; }
}

window.togglePlay = () => {
    isPlay = !isPlay;
    const btn = document.getElementById('playBtn');
    if(isPlay){
        btn.innerText = "⏹ STOP";
        btn.classList.add('on');
        renderer.domElement.requestPointerLock();
    } else {
        btn.innerText = "▶ PLAY";
        btn.classList.remove('on');
        document.exitPointerLock();
    }
};

// --- GAME LOOP ---
function animate(){
    requestAnimationFrame(animate);
    updatePlayer();
    renderer.render(scene, camera);
}

// Init
camera.position.set(5,5,5);
camera.lookAt(0,0,0);
document.getElementById('lbar').style.width = "100%";
setTimeout(() => document.getElementById('loading').style.display='none', 1000);
window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

// UI Helpers
function updateObjList(){
    const list = document.getElementById('obj-list');
    list.innerHTML = objects.map(o => `
        <div class="oi">
            <span class="oname">${o.userData.name}</span>
            <span class="oi-del" onclick="deleteObj('${o.uuid}')">✕</span>
        </div>
    `).join('');
}

animate();
</script>
</body>
</html>
