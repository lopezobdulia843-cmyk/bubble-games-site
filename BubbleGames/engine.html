<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bubble Games</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: sans-serif; touch-action: none; color: white; user-select: none; }
        .controls { position: absolute; z-index: 10; display: flex; gap: 10px; }
        #top-bar { top: 20px; right: 20px; flex-direction: column; align-items: flex-end; }
        
        #settings-panel { 
            position: absolute; top: 100px; left: 20px; 
            background: rgba(0,0,0,0.85); padding: 15px; border-radius: 12px; 
            border: 1px solid #00d4ff; width: 200px; z-index: 50;
            backdrop-filter: blur(10px);
        }
        .setting-group { margin-bottom: 18px; }
        .label-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .setting-group label { font-size: 11px; text-transform: uppercase; color: #00d4ff; font-weight: bold; }
        
        .num-input {
            width: 50px; background: #111; border: 1px solid #444; color: #00d4ff;
            font-size: 12px; border-radius: 4px; padding: 2px 4px; text-align: center;
        }

        button { 
            width: 140px; height: 50px; font-size: 14px; font-weight: bold;
            background: rgba(0, 212, 255, 0.1); color: white;
            border: 2px solid #00d4ff; border-radius: 10px; cursor: pointer;
            backdrop-filter: blur(5px); margin-bottom: 5px;
            display: flex; align-items: center; justify-content: center; transition: 0.2s;
        }
        
        #playTestBtn { background: #2ecc71; color: #000; border-color: #2ecc71; }
        #playTestBtn.playing { background: #e74c3c; color: white; border-color: #e74c3c; }

        #item-selector { 
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 15px; background: rgba(0,0,0,0.8); padding: 10px;
            border-radius: 15px; border: 2px solid #333; z-index: 20;
        }
        .item-card {
            width: 60px; height: 60px; border-radius: 10px; border: 2px solid #444;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; background: #111;
        }
        .item-card.selected { border-color: #00d4ff; background: rgba(0, 212, 255, 0.2); }

        #crosshair { 
            position: absolute; top: 50%; left: 50%; width: 12px; height: 12px; 
            border: 2px solid white; border-radius: 50%; transform: translate(-50%, -50%); 
            display: none; pointer-events: none; z-index: 100;
        }

        /* Mobile Controls */
        #joystick-wrapper {
            position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px;
            background: rgba(255,255,255,0.1); border-radius: 50%; display: none; z-index: 60;
        }
        #joystick-knob {
            position: absolute; top: 35px; left: 35px; width: 50px; height: 50px;
            background: #00d4ff; border-radius: 50%;
        }
        #jump-btn {
            position: absolute; bottom: 40px; right: 40px; width: 70px; height: 70px;
            background: rgba(0, 212, 255, 0.3); border: 2px solid #00d4ff;
            border-radius: 50%; display: none; z-index: 60; color: white; font-weight: bold;
        }

        #chat-container { position: absolute; bottom: 100px; left: 20px; width: 250px; height: 160px; z-index: 60; pointer-events: none; }
        #chat-messages { flex-grow: 1; overflow-y: auto; background: rgba(0,0,0,0.4); border-radius: 8px; padding: 10px; font-size: 12px; height: 120px; }
        #chat-input { margin-top: 5px; background: rgba(0,0,0,0.8); border: 1px solid #00d4ff; color: white; padding: 8px; border-radius: 4px; pointer-events: auto; width: 100%; outline: none; }
    </style>
</head>
<body>
    <div id="crosshair"></div>
    <div id="joystick-wrapper"><div id="joystick-knob"></div></div>
    <button id="jump-btn">JUMP</button>

    <div id="info">
        <h2 id="gameNameDisplay" style="margin:10px; color:#00d4ff;">PROJECT BUBBLER</h2>
        <div id="coords" style="margin-left:10px; font-family:monospace; font-size:12px;">X: 0 Y: 0 Z: 0</div>
    </div>

    <div id="chat-container">
        <div id="chat-messages"></div>
        <input type="text" id="chat-input" placeholder="Chat..." autocomplete="off">
    </div>

    <div id="settings-panel" style="display:none;">
        <div class="setting-group">
            <label>Speed</label>
            <input type="range" id="speed-slider" min="5" max="25" value="12">
        </div>
        <div class="setting-group">
            <label>Gravity</label>
            <input type="range" id="gravity-slider" min="10" max="60" value="30">
        </div>
    </div>

    <div id="item-selector" style="display:none;">
        <div class="item-card selected" onclick="selectItem('block')" id="card-block">BLOCK</div>
        <div class="item-card" onclick="selectItem('spawn')" id="card-spawn">SPAWN</div>
    </div>

    <div id="top-bar" class="controls">
        <button id="playTestBtn" onclick="togglePlayTest()">PLAY TEST</button>
        <button id="publishBtn" onclick="publishGame()" style="display:none;">PUBLISH</button>
        <button onclick="exitGame()">EXIT</button>
    </div>

    <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0c);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const light = new THREE.AmbientLight(0xffffff, 1.5);
        scene.add(light);

        const floor = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.MeshBasicMaterial({ color: 0x111111, side: THREE.DoubleSide }));
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        const objects = [floor];
        let spawnPoint = null;
        let isPlayMode = false;
        let velocityY = 0;
        let isGrounded = false;
        const playerHeight = 1.6;
        let moveSpeed = 12; // Units per second
        let gravityValue = 30; // Units per second squared
        
        const clock = new THREE.Clock();
        const keys = {};

        // Mobile Logic
        const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
        const joystickWrapper = document.getElementById('joystick-wrapper');
        const joystickKnob = document.getElementById('joystick-knob');
        let joystickActive = false;
        let joystickVector = { x: 0, y: 0 };

        if (isMobile) {
            joystickWrapper.style.display = 'block';
            document.getElementById('jump-btn').style.display = 'block';
            
            joystickWrapper.addEventListener('pointerdown', () => joystickActive = true);
            window.addEventListener('pointermove', (e) => {
                if (!joystickActive) return;
                const rect = joystickWrapper.getBoundingClientRect();
                const centerX = rect.left + rect.width / 2;
                const centerY = rect.top + rect.height / 2;
                let dx = e.clientX - centerX;
                let dy = e.clientY - centerY;
                const dist = Math.sqrt(dx*dx + dy*dy);
                const max = 40;
                if (dist > max) { dx *= max/dist; dy *= max/dist; }
                joystickKnob.style.transform = `translate(${dx}px, ${dy}px)`;
                joystickVector = { x: dx/max, y: dy/max };
            });
            window.addEventListener('pointerup', () => {
                joystickActive = false;
                joystickKnob.style.transform = `translate(0px, 0px)`;
                joystickVector = { x: 0, y: 0 };
            });
            document.getElementById('jump-btn').addEventListener('pointerdown', () => { if(isGrounded) velocityY = 10; });
        }

        // Pointer Lock for PC
        renderer.domElement.addEventListener('click', () => {
            if (isPlayMode && !isMobile) renderer.domElement.requestPointerLock();
        });

        window.addEventListener('mousemove', (e) => {
            if (isPlayMode && (document.pointerLockElement === renderer.domElement || isMobile)) {
                const sensitivity = 0.002;
                camera.rotation.y -= e.movementX * sensitivity;
                camera.rotation.x -= e.movementY * sensitivity;
                camera.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, camera.rotation.x));
            }
        });

        window.togglePlayTest = () => {
            isPlayMode = !isPlayMode;
            const btn = document.getElementById('playTestBtn');
            if (isPlayMode) {
                btn.innerText = "STOP";
                document.getElementById('crosshair').style.display = 'block';
                camera.rotation.set(0,0,0);
                if (spawnPoint) camera.position.set(spawnPoint.position.x, spawnPoint.position.y + 2, spawnPoint.position.z);
            } else {
                btn.innerText = "PLAY TEST";
                document.getElementById('crosshair').style.display = 'none';
                document.exitPointerLock?.();
            }
        };

        window.exitGame = () => {
            if (confirm("Exit with unsaved changes?")) {
                window.location.reload(); 
            }
        };

        window.addEventListener('keydown', (e) => keys[e.code] = true);
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        const raycaster = new THREE.Raycaster();
        const downRay = new THREE.Raycaster();

        function animate() {
            requestAnimationFrame(animate);
            const delta = Math.min(clock.getDelta(), 0.1); // Cap delta to prevent falling through floor
            
            if (isPlayMode) {
                // Gravity & Floor Collision
                downRay.set(camera.position, new THREE.Vector3(0, -1, 0));
                const intersections = downRay.intersectObjects(objects);
                
                let floorY = 0;
                if (intersections.length > 0) floorY = intersections[0].point.y + playerHeight;

                if (camera.position.y > floorY + 0.01) {
                    velocityY -= gravityValue * delta;
                    isGrounded = false;
                } else {
                    camera.position.y = floorY;
                    velocityY = 0;
                    isGrounded = true;
                }

                if (keys['Space'] && isGrounded) velocityY = 12;
                camera.position.y += velocityY * delta;

                // Movement
                let moveX = 0;
                let moveZ = 0;
                
                if (isMobile) {
                    moveX = joystickVector.x;
                    moveZ = joystickVector.y;
                } else {
                    if (keys['KeyW']) moveZ = -1;
                    if (keys['KeyS']) moveZ = 1;
                    if (keys['KeyA']) moveX = -1;
                    if (keys['KeyD']) moveX = 1;
                }

                const direction = new THREE.Vector3(moveX, 0, moveZ).applyQuaternion(camera.quaternion);
                direction.y = 0;
                direction.normalize();
                
                camera.position.addScaledVector(direction, moveSpeed * delta);
            }

            document.getElementById('coords').innerText = `X: ${camera.position.x.toFixed(1)} Y: ${camera.position.y.toFixed(1)} Z: ${camera.position.z.toFixed(1)}`;
            renderer.render(scene, camera);
        }

        camera.rotation.order = 'YXZ';
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
