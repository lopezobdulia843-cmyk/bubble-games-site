<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bubble Games - Studio</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: sans-serif; touch-action: none; color: white; }
        .controls { position: absolute; z-index: 10; display: flex; gap: 10px; }
        #top-bar { top: 20px; right: 20px; flex-direction: column; align-items: flex-end; }
        
        #settings-panel { 
            position: absolute; top: 100px; left: 20px; 
            background: rgba(0,0,0,0.85); padding: 15px; border-radius: 12px; 
            border: 1px solid #00d4ff; width: 200px; z-index: 50;
            backdrop-filter: blur(10px);
        }
        .setting-group { margin-bottom: 18px; }
        .label-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .setting-group label { font-size: 11px; text-transform: uppercase; color: #00d4ff; font-weight: bold; }
        
        .num-input {
            width: 50px; background: #111; border: 1px solid #444; color: #00d4ff;
            font-size: 12px; border-radius: 4px; padding: 2px 4px; text-align: center;
        }
        .num-input:focus { border-color: #00d4ff; outline: none; }

        input[type="range"] { width: 100%; cursor: pointer; accent-color: #00d4ff; }

        button { 
            width: 140px; height: 50px; font-size: 14px; font-weight: bold;
            background: rgba(0, 212, 255, 0.1); color: white;
            border: 2px solid #00d4ff; border-radius: 10px; cursor: pointer;
            backdrop-filter: blur(5px); margin-bottom: 5px;
            display: flex; align-items: center; justify-content: center; transition: 0.2s;
        }
        button:hover { background: rgba(0, 212, 255, 0.3); }
        
        #publishBtn { background: #00d4ff; color: #000; }
        #playTestBtn { background: #2ecc71; color: #000; border-color: #2ecc71; }
        #playTestBtn.playing { background: #e74c3c; color: white; border-color: #e74c3c; }

        .active-tool { background: #00d4ff !important; color: #000 !important; box-shadow: 0 0 15px #00d4ff; }
        #deleteModeBtn.active-tool { background: #ff3232 !important; border-color: #ff3232 !important; color: white !important; box-shadow: 0 0 15px #ff3232; }
        #scriptModeBtn.active-tool { background: #f39c12 !important; border-color: #f39c12 !important; color: white !important; box-shadow: 0 0 15px #f39c12; }

        #item-selector { 
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 15px; background: rgba(0,0,0,0.8); padding: 10px;
            border-radius: 15px; border: 2px solid #333; z-index: 20;
        }
        .item-card {
            width: 60px; height: 60px; border-radius: 10px; border: 2px solid #444;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; background: #111; transition: 0.2s;
        }
        .item-card:hover { border-color: #00d4ff; }
        .item-card.selected { border-color: #00d4ff; background: rgba(0, 212, 255, 0.2); }
        .item-icon { width: 30px; height: 30px; margin-bottom: 2px; border-radius: 4px; }
        .icon-block { background: #cccccc; border: 1px solid #999; }
        .icon-spawn { background: #00ffff; box-shadow: 0 0 10px #00ffff; }
        .item-label { font-size: 10px; color: white; text-transform: uppercase; }

        #info { position: absolute; top: 10px; left: 10px; color: white; pointer-events: none; }
        #coords { font-family: monospace; color: #00d4ff; margin-top: 5px; background: rgba(0,0,0,0.5); padding: 5px; border-radius: 5px; }
        #crosshair { 
            position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; 
            border: 2px solid white; border-radius: 50%; transform: translate(-50%, -50%); 
            display: none; pointer-events: none; 
        }
        #loading-overlay { position: fixed; inset: 0; background: #050505; z-index: 100; display: flex; align-items: center; justify-content: center; color: #00d4ff; font-weight: bold; }

        .player-label {
            position: absolute; background: rgba(0,0,0,0.8); color: #00d4ff;
            padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: bold;
            border: 1px solid #00d4ff; pointer-events: none; white-space: nowrap;
            transform: translate(-50%, -100%); z-index: 5;
        }

        #chat-container {
            position: absolute; bottom: 100px; left: 20px; width: 250px;
            height: 200px; display: flex; flex-direction: column;
            z-index: 60; pointer-events: none;
        }
        #chat-messages {
            flex-grow: 1; overflow-y: auto; background: rgba(0,0,0,0.4);
            border-radius: 8px; padding: 10px; font-size: 13px;
            display: flex; flex-direction: column; gap: 4px;
            scrollbar-width: thin; scrollbar-color: #00d4ff transparent;
        }
        #chat-input {
            margin-top: 5px; background: rgba(0,0,0,0.8); border: 1px solid #00d4ff;
            color: white; padding: 8px; border-radius: 4px; pointer-events: auto;
            outline: none;
        }

        #script-editor-panel {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(10, 10, 15, 0.95); padding: 20px; border-radius: 12px;
            border: 2px solid #f39c12; width: 600px; height: 450px; z-index: 80;
            display: none; flex-direction: column; box-shadow: 0 0 30px rgba(243, 156, 18, 0.3);
        }
        #script-textarea {
            flex-grow: 1; background: #000; color: #00d4ff; font-family: 'Courier New', monospace;
            border: 1px solid #333; padding: 10px; resize: none; outline: none; border-radius: 5px;
            font-size: 14px; line-height: 1.4;
        }
        .script-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .toggle-container { display: flex; align-items: center; gap: 8px; cursor: pointer; color: #f39c12; font-size: 12px; }
        
        /* Script Indicator */
        .script-icon {
            position: absolute; background: #f39c12; color: black; font-weight: bold;
            padding: 2px 5px; border-radius: 3px; font-size: 10px; pointer-events: none;
            transform: translate(-50%, -50%); display: none; z-index: 5;
        }
    </style>
</head>
<body>
    <div id="loading-overlay">INITIALIZING ENGINE...</div>

    <div id="info">
        <h2 id="gameNameDisplay" style="margin:0; color:#00d4ff;">BUBBLE GAMES</h2>
        <p id="status">Status: LOADING...</p>
        <div id="coords">POS - X: 0 | Y: 0 | Z: 0</div>
    </div>

    <div id="chat-container">
        <div id="chat-messages"></div>
        <input type="text" id="chat-input" placeholder="Press Enter to chat..." autocomplete="off">
    </div>

    <div id="script-editor-panel">
        <div class="script-header">
            <h3 style="margin:0; color:#f39c12;">📜 SCRIPT EDITOR</h3>
            <label class="toggle-container">
                <input type="checkbox" id="server-script-toggle"> SERVER SCRIPT
            </label>
        </div>
        <textarea id="script-textarea" spellcheck="false" placeholder="// Example: part.position.y += Math.sin(Date.now()*0.005)*0.1;"></textarea>
        <div style="font-size: 10px; color: #666; margin-top: 5px;">Tip: Type 'part.' or 'math.' for help</div>
        <div class="script-buttons" style="display:flex; gap:10px; margin-top: 10px; justify-content: flex-end;">
            <button onclick="closeScriptEditor()" style="width:100px; height:35px;">CANCEL</button>
            <button id="saveScriptBtn" onclick="saveScript()" style="width:100px; height:35px; background:#f39c12; color:black;">SAVE</button>
        </div>
    </div>

    <div id="settings-panel" style="display:none;">
        <div class="setting-group">
            <div class="label-container"><label>Speed</label><input type="number" id="speed-num" class="num-input" step="0.01" value="0.12"></div>
            <input type="range" id="speed-slider" min="0.01" max="1.0" step="0.01" value="0.12">
        </div>
        <div class="setting-group">
            <div class="label-container"><label>Gravity</label><input type="number" id="gravity-num" class="num-input" step="0.001" value="0.015"></div>
            <input type="range" id="gravity-slider" min="0" max="0.1" step="0.001" value="0.015">
        </div>
        <div id="part-settings" style="display:none; border-top: 1px solid #333; padding-top: 10px;">
            <label style="font-size:11px; color:#00d4ff;">SIZE</label>
            <input type="range" id="size-slider" min="0.2" max="10" step="0.1" value="1">
        </div>
    </div>

    <div id="item-selector" style="display:none;">
        <div class="item-card selected" onclick="selectItem('block')" id="card-block"><div class="item-icon icon-block"></div><div class="item-label">Block</div></div>
        <div class="item-card" onclick="selectItem('spawn')" id="card-spawn"><div class="item-icon icon-spawn"></div><div class="item-label">Spawn</div></div>
    </div>

    <div id="top-bar" class="controls">
        <button id="playTestBtn" onclick="togglePlayTest()">PLAY TEST ▶</button>
        <button id="publishBtn" onclick="publishGame()" style="display:none;">PUBLISH 🚀</button>
        <button id="dragModeBtn" onclick="toggleTool('drag')" style="display:none;">MOVE</button>
        <button id="scriptModeBtn" onclick="toggleTool('script')" style="display:none;">SCRIPT</button>
        <button id="deleteModeBtn" onclick="toggleTool('delete')" style="display:none;">DELETE</button>
        <button onclick="exitGame()">EXIT</button>
    </div>
    <div id="crosshair"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { TransformControls } from 'three/addons/controls/TransformControls.js';

        const SUPABASE_URL = 'https://sideqpofgknyfagrjnke.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_ULjlm97u7-dg8ekTPU84aA_rA1CtUnH';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = "Guest_" + Math.floor(Math.random() * 999);
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0c);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1.2));
        const objects = []; 
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.MeshBasicMaterial({ visible: false }));
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);
        objects.push(floor);

        const gizmo = new TransformControls(camera, renderer.domElement);
        scene.add(gizmo);

        let isPlayMode = false;
        let isPC = !(/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent));
        let editorState = { pos: new THREE.Vector3(), rot: new THREE.Euler() };
        let activeScriptBlock = null;
        let spawnPoint = null;
        let moveSpeed = 0.12;
        let worldGravity = 0.015;
        let velocityY = 0;
        let isGrounded = false;
        let currentTool = 'place';
        let selectedItemType = 'block';

        // UI Refs
        const scriptTextArea = document.getElementById('script-textarea');

        // Autocomplete hints
        scriptTextArea.addEventListener('input', (e) => {
            const val = scriptTextArea.value;
            const lastWord = val.split(/[\s\n]+/).pop();
            if (lastWord === "part.") {
                const start = scriptTextArea.selectionStart;
                scriptTextArea.value = val.slice(0, start) + "position.y" + val.slice(start);
                scriptTextArea.selectionStart = scriptTextArea.selectionEnd = start;
            }
        });

        window.togglePlayTest = () => {
            isPlayMode = !isPlayMode;
            const btn = document.getElementById('playTestBtn');
            
            if (isPlayMode) {
                if (!spawnPoint) { alert("Add a Spawn Point first!"); isPlayMode = false; return; }
                
                // Save Editor State
                editorState.pos.copy(camera.position);
                editorState.rot.copy(camera.rotation);
                
                btn.innerText = "STOP TEST ⏹"; btn.classList.add('playing');
                document.getElementById('crosshair').style.display = 'block';
                ['publishBtn', 'dragModeBtn', 'scriptModeBtn', 'deleteModeBtn', 'item-selector', 'settings-panel'].forEach(id => document.getElementById(id).style.display = 'none');
                
                camera.position.set(spawnPoint.position.x, spawnPoint.position.y + 1.5, spawnPoint.position.z);
                gizmo.detach();

                if (isPC) renderer.domElement.requestPointerLock();
            } else {
                btn.innerText = "PLAY TEST ▶"; btn.classList.remove('playing');
                document.getElementById('crosshair').style.display = 'none';
                ['publishBtn', 'dragModeBtn', 'scriptModeBtn', 'deleteModeBtn', 'item-selector', 'settings-panel'].forEach(id => document.getElementById(id).style.display = 'flex');
                
                camera.position.copy(editorState.pos);
                camera.rotation.copy(editorState.rot);
                document.exitPointerLock?.();
            }
        };

        // Mouse Lock Handler
        document.addEventListener('mousemove', (e) => {
            if (isPlayMode && document.pointerLockElement === renderer.domElement) {
                camera.rotation.y -= e.movementX * 0.002;
                camera.rotation.x -= e.movementY * 0.002;
                camera.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, camera.rotation.x));
            }
        });

        window.saveScript = () => {
            if (activeScriptBlock) {
                activeScriptBlock.userData.scriptCode = scriptTextArea.value;
                activeScriptBlock.userData.isServer = document.getElementById('server-script-toggle').checked;
                
                // Create Script Indicator (The "Little Icon")
                if (!activeScriptBlock.userData.indicator) {
                    const div = document.createElement('div');
                    div.className = 'script-icon';
                    div.innerText = '</>';
                    document.body.appendChild(div);
                    activeScriptBlock.userData.indicator = div;
                }
            }
            closeScriptEditor();
        };

        window.closeScriptEditor = () => {
            document.getElementById('script-editor-panel').style.display = 'none';
            activeScriptBlock = null;
        };

        window.publishGame = async () => {
            const blocksData = objects.filter(obj => obj !== floor).map(obj => ({
                x: obj.position.x, y: obj.position.y, z: obj.position.z,
                s: obj.scale.x, type: (obj === spawnPoint) ? 'spawn' : 'block',
                script: obj.userData.scriptCode || null,
                isServer: obj.userData.isServer || false
            }));

            const config = { gravity: worldGravity, speed: moveSpeed };
            const editId = localStorage.getItem('currentGameId');

            try {
                await supabaseClient.from('games').update({ blocks: blocksData, config: config }).eq('id', editId);
                alert("Game Published with Scripts!");
            } catch (e) { alert("Error saving script to DB"); }
        };

        // Improved Collision (No more getting stuck)
        function checkCollisions(pos) {
            const ray = new THREE.Raycaster(pos, new THREE.Vector3(0, -1, 0), 0, 1.6);
            const intersects = ray.intersectObjects(objects.filter(o => o !== floor));
            isGrounded = intersects.length > 0;
            if (isGrounded) {
                velocityY = 0;
                camera.position.y = intersects[0].object.position.y + (intersects[0].object.scale.y / 2) + 1.4;
            }
        }

        const keys = {};
        window.addEventListener('keydown', (e) => { 
            keys[e.code] = true; 
            if (e.code === 'Space' && isGrounded && isPlayMode) velocityY = 0.25;
        });
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        function animate() {
            requestAnimationFrame(animate);
            
            if (isPlayMode) {
                // Gravity & Movement logic
                velocityY -= worldGravity;
                camera.position.y += velocityY;
                checkCollisions(camera.position);

                const dir = new THREE.Vector3();
                camera.getWorldDirection(dir); dir.y = 0; dir.normalize();
                const side = new THREE.Vector3().crossVectors(camera.up, dir).normalize();

                // Speed only affects player in play mode
                const currentSpeed = moveSpeed;
                if (keys['KeyW']) camera.position.add(dir.multiplyScalar(currentSpeed));
                if (keys['KeyS']) camera.position.sub(dir.multiplyScalar(currentSpeed));
                if (keys['KeyA']) camera.position.add(side.multiplyScalar(currentSpeed));
                if (keys['KeyD']) camera.position.sub(side.multiplyScalar(currentSpeed));
            }

            // Update Script Icons position
            objects.forEach(obj => {
                if (obj.userData.indicator) {
                    const icon = obj.userData.indicator;
                    if (!isPlayMode) {
                        const proj = obj.position.clone().project(camera);
                        icon.style.display = 'block';
                        icon.style.left = (proj.x * 0.5 + 0.5) * window.innerWidth + 'px';
                        icon.style.top = (-(proj.y * 0.5) + 0.5) * window.innerHeight + 'px';
                    } else {
                        icon.style.display = 'none';
                    }
                }
            });

            renderer.render(scene, camera);
        }
        
        // Final Init for scripts/colors
        setTimeout(() => { document.getElementById('loading-overlay').style.display = 'none'; }, 1000);
        animate();

        // Standard helpers
        window.selectItem = (t) => { selectedItemType = t; };
        window.toggleTool = (t) => { currentTool = t; gizmo.detach(); };
        window.exitGame = () => { window.location.reload(); };

        // Handle clicks for scripting/placing
        window.addEventListener('pointerdown', (e) => {
            if (e.target.closest('button') || e.target.closest('#settings-panel') || isPlayMode) return;
            const mouse = new THREE.Vector2((e.clientX / window.innerWidth) * 2 - 1, -(e.clientY / window.innerHeight) * 2 + 1);
            const ray = new THREE.Raycaster(); ray.setFromCamera(mouse, camera);
            const inter = ray.intersectObjects(objects);

            if (inter.length > 0) {
                const obj = inter[0].object;
                if (currentTool === 'script' && obj !== floor) {
                    activeScriptBlock = obj;
                    scriptTextArea.value = obj.userData.scriptCode || "";
                    document.getElementById('server-script-toggle').checked = obj.userData.isServer || false;
                    document.getElementById('script-editor-panel').style.display = 'flex';
                } else if (currentTool === 'place') {
                    const geo = selectedItemType === 'spawn' ? new THREE.BoxGeometry(1,0.2,1) : new THREE.BoxGeometry(1,1,1);
                    const mat = new THREE.MeshStandardMaterial({color: selectedItemType === 'spawn' ? 0x00ffff : 0xcccccc});
                    const m = new THREE.Mesh(geo, mat);
                    m.position.copy(inter[0].point).add(inter[0].face.normal.multiplyScalar(0.5));
                    scene.add(m); objects.push(m);
                    if (selectedItemType === 'spawn') spawnPoint = m;
                } else if (currentTool === 'drag' && obj !== floor) {
                    gizmo.attach(obj);
                } else if (currentTool === 'delete' && obj !== floor) {
                    scene.remove(obj); objects.splice(objects.indexOf(obj), 1);
                    if (obj.userData.indicator) obj.userData.indicator.remove();
                }
            }
        });
    </script>
</body>
</html>
