<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bubble Games - Studio</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: sans-serif; touch-action: none; color: white; user-select: none; }
        .controls { position: absolute; z-index: 10; display: flex; gap: 10px; }
        #top-bar { top: 20px; right: 20px; flex-direction: column; align-items: flex-end; }
        
        #settings-panel { 
            position: absolute; top: 100px; left: 20px; 
            background: rgba(0,0,0,0.85); padding: 15px; border-radius: 12px; 
            border: 1px solid #00d4ff; width: 220px; z-index: 50;
            backdrop-filter: blur(10px);
            max-height: 70vh; overflow-y: auto;
        }
        .setting-group { margin-bottom: 18px; }
        .label-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .setting-group label { font-size: 11px; text-transform: uppercase; color: #00d4ff; font-weight: bold; }
        
        .num-input, .text-input {
            width: 100%; background: #111; border: 1px solid #444; color: #00d4ff;
            font-size: 12px; border-radius: 4px; padding: 4px; text-align: left; margin-top: 4px;
        }
        .num-input:focus, .text-input:focus { border-color: #00d4ff; outline: none; }

        input[type="range"] { width: 100%; cursor: pointer; accent-color: #00d4ff; }
        input[type="color"] { width: 100%; height: 30px; border: none; background: transparent; cursor: pointer; }

        button { 
            width: 140px; height: 50px; font-size: 14px; font-weight: bold;
            background: rgba(0, 212, 255, 0.1); color: white;
            border: 2px solid #00d4ff; border-radius: 10px; cursor: pointer;
            backdrop-filter: blur(5px); margin-bottom: 5px;
            display: flex; align-items: center; justify-content: center; transition: 0.2s;
        }
        button:hover { background: rgba(0, 212, 255, 0.3); }
        
        #publishBtn { background: #00d4ff; color: #000; }
        #playTestBtn { background: #2ecc71; color: #000; border-color: #2ecc71; }
        #playTestBtn.playing { background: #e74c3c; color: white; border-color: #e74c3c; }

        .active-tool { background: #00d4ff !important; color: #000 !important; box-shadow: 0 0 15px #00d4ff; }
        #deleteModeBtn.active-tool { background: #ff3232 !important; border-color: #ff3232 !important; color: white !important; box-shadow: 0 0 15px #ff3232; }
        #scriptModeBtn.active-tool { background: #f39c12 !important; border-color: #f39c12 !important; color: white !important; box-shadow: 0 0 15px #f39c12; }

        #item-selector { 
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 15px; background: rgba(0,0,0,0.8); padding: 10px;
            border-radius: 15px; border: 2px solid #333; z-index: 20;
        }
        .item-card {
            width: 60px; height: 60px; border-radius: 10px; border: 2px solid #444;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; background: #111; transition: 0.2s;
        }
        .item-card:hover { border-color: #00d4ff; }
        .item-card.selected { border-color: #00d4ff; background: rgba(0, 212, 255, 0.2); }
        .item-icon { width: 30px; height: 30px; margin-bottom: 2px; border-radius: 4px; }
        .icon-block { background: #cccccc; border: 1px solid #999; }
        .icon-spawn { background: #00ffff; box-shadow: 0 0 10px #00ffff; }
        .item-label { font-size: 10px; color: white; text-transform: uppercase; }

        #info { position: absolute; top: 10px; left: 10px; color: white; pointer-events: none; z-index: 50; }
        #coords { font-family: monospace; color: #00d4ff; margin-top: 5px; background: rgba(0,0,0,0.5); padding: 5px; border-radius: 5px; }
        #crosshair { 
            position: absolute; top: 50%; left: 50%; width: 6px; height: 6px; 
            background: white; border-radius: 50%; transform: translate(-50%, -50%); 
            display: none; pointer-events: none; z-index: 99;
        }
        #loading-overlay { position: fixed; inset: 0; background: #050505; z-index: 100; display: flex; align-items: center; justify-content: center; color: #00d4ff; font-weight: bold; font-size: 24px;}

        /* MOBILE CONTROLS */
        #mobile-controls { display: none; position: absolute; bottom: 20px; left: 20px; right: 20px; z-index: 90; pointer-events: none; }
        #joystick-zone { width: 120px; height: 120px; background: rgba(255,255,255,0.1); border-radius: 50%; border: 2px solid rgba(0,212,255,0.5); position: relative; pointer-events: auto; }
        #joystick-knob { width: 40px; height: 40px; background: #00d4ff; border-radius: 50%; position: absolute; top: 40px; left: 40px; pointer-events: none; }
        #jump-btn { position: absolute; bottom: 0; right: 0; width: 80px; height: 80px; background: rgba(255,255,255,0.1); border: 2px solid rgba(0,212,255,0.5); border-radius: 50%; color: #00d4ff; font-weight: bold; pointer-events: auto; display: flex; align-items: center; justify-content: center; }
        #jump-btn:active { background: rgba(0,212,255,0.3); }

        /* SCRIPT EDITOR UI */
        #script-editor-panel {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(10, 10, 15, 0.95); padding: 20px; border-radius: 12px;
            border: 2px solid #f39c12; width: 90%; max-width: 600px; height: 60vh; z-index: 80;
            display: none; flex-direction: column; box-shadow: 0 0 30px rgba(243, 156, 18, 0.3);
        }
        #script-editor-panel h3 { margin: 0 0 10px 0; color: #f39c12; font-family: monospace; }
        .editor-wrapper { position: relative; flex-grow: 1; display: flex; }
        #script-textarea {
            flex-grow: 1; background: #111; color: #00d4ff; font-family: monospace;
            border: 1px solid #333; padding: 10px; resize: none; outline: none; border-radius: 5px;
            font-size: 14px; line-height: 1.5; white-space: pre; overflow-wrap: normal; overflow-x: auto;
        }
        .script-buttons { display: flex; gap: 10px; margin-top: 15px; justify-content: flex-end; }
        .script-buttons button { width: 120px; height: 35px; margin: 0; }
        #saveScriptBtn { background: #f39c12; color: #000; border-color: #f39c12; }
        
        #esc-hint {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.7); color: white; padding: 10px 20px; border-radius: 8px;
            font-weight: bold; border: 1px solid #fff; display: none; z-index: 100; pointer-events: none;
        }

        .toggle-container { display: flex; align-items: center; gap: 10px; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="loading-overlay">INITIALIZING BUBBLE GAMES...</div>
    <div id="esc-hint">Press ESC to unlock mouse</div>

    <div id="info">
        <h2 id="gameNameDisplay" style="margin:0; color:#00d4ff;">BUBBLE GAMES</h2>
        <p id="status">Status: LOADING...</p>
        <div id="coords">POS - X: 0 | Y: 0 | Z: 0</div>
    </div>

    <div id="script-editor-panel">
        <h3></> SCRIPT EDITOR (JavaScript)</h3>
        <p style="font-size: 11px; color:#aaa; margin-top: -5px;">Use JS to act like Luau: <code>part.position.y += 0.05 * delta;</code></p>
        <div class="editor-wrapper">
            <textarea id="script-textarea" spellcheck="false" placeholder="// Write code for this block here..."></textarea>
        </div>
        <div class="script-buttons">
            <button onclick="closeScriptEditor()">CANCEL</button>
            <button id="saveScriptBtn" onclick="saveScript()">SAVE</button>
        </div>
    </div>

    <div id="settings-panel" style="display:none;">
        <div class="setting-group">
            <div class="label-container"><label>Move Speed</label></div>
            <input type="range" id="speed-slider" min="1" max="50" step="1" value="15">
        </div>
        <div class="setting-group">
            <div class="label-container"><label>Gravity</label></div>
            <input type="range" id="gravity-slider" min="0" max="100" step="1" value="30">
        </div>
        <div class="setting-group">
            <label class="toggle-container">
                <input type="checkbox" id="grid-toggle" checked>
                <span style="font-size: 11px; color: #00d4ff;">GRID TEXTURES</span>
            </label>
        </div>

        <div id="part-settings" style="display:none; border-top: 1px solid #333; padding-top: 10px; margin-top: 10px;">
            <label style="font-size: 11px; color:#00d4ff; font-weight:bold;">PROPERTIES</label>
            <input type="text" id="part-name" class="text-input" placeholder="Part Name">
            
            <label style="font-size: 11px; display:block; margin-top:10px;">Color</label>
            <input type="color" id="part-color" value="#cccccc">

            <label style="font-size: 11px; display:block; margin-top:10px;">Size</label>
            <input type="range" id="size-slider" min="0.2" max="20" step="0.1" value="1">
            
            <label class="toggle-container" style="margin-top: 10px;">
                <input type="checkbox" id="collision-toggle" checked>
                <span style="font-size: 11px; color: #fff;">CanCollide</span>
            </label>
        </div>
    </div>

    <div id="item-selector" style="display:none;">
        <div class="item-card selected" onclick="selectItem('block')" id="card-block">
            <div class="item-icon icon-block"></div>
            <div class="item-label">Block</div>
        </div>
        <div class="item-card" onclick="selectItem('spawn')" id="card-spawn">
            <div class="item-icon icon-spawn"></div>
            <div class="item-label">Spawn</div>
        </div>
    </div>

    <div id="top-bar" class="controls">
        <button id="playTestBtn" onclick="togglePlayTest()">PLAY TEST ▶</button>
        <button id="publishBtn" onclick="publishGame()" style="display:none;">PUBLISH 🚀</button>
        <button id="dragModeBtn" onclick="toggleTool('drag')" style="display:none;">DRAG PART</button>
        <button id="scriptModeBtn" onclick="toggleTool('script')" style="display:none;">ADD SCRIPT</button>
        <button id="deleteModeBtn" onclick="toggleTool('delete')" style="display:none;">DELETE</button>
        <button onclick="exitGame()">EXIT</button>
    </div>
    
    <div id="crosshair"></div>

    <div id="mobile-controls">
        <div id="joystick-zone"><div id="joystick-knob"></div></div>
        <div id="jump-btn">JUMP</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="importmap">
    { 
        "imports": { 
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        } 
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { TransformControls } from 'three/addons/controls/TransformControls.js';

        // SUPABASE SETUP
        const SUPABASE_URL = 'https://sideqpofgknyfagrjnke.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_ULjlm97u7-dg8ekTPU84aA_rA1CtUnH';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = "Guest_" + Math.floor(Math.random() * 999);
        
        const clock = new THREE.Clock(); 
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0c);
        
        // WORKSPACE FOLDER
        const Workspace = new THREE.Group();
        Workspace.name = "Workspace";
        scene.add(Workspace);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1.2));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        const grid = new THREE.GridHelper(100, 100, 0x00d4ff, 0x222222);
        scene.add(grid);

        // GRID TEXTURE
        const createGridTexture = () => {
            const canvas = document.createElement('canvas');
            canvas.width = 256; canvas.height = 256;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#111111'; ctx.fillRect(0, 0, 256, 256);
            ctx.strokeStyle = '#00d4ff'; ctx.lineWidth = 4;
            ctx.strokeRect(0, 0, 256, 256);
            const tex = new THREE.CanvasTexture(canvas);
            tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
            return tex;
        };
        const gridTexture = createGridTexture();

        const floor = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.MeshBasicMaterial({ visible: false }));
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        const objects = [floor]; 
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        const gizmo = new TransformControls(camera, renderer.domElement);
        gizmo.setMode('translate');
        gizmo.setSize(0.6); 
        scene.add(gizmo);

        // GAME STATE
        let isPlayMode = false; 
        let currentTool = 'place'; 
        let selectedItemType = 'block'; 
        let moveSpeed = 15; 
        let worldGravity = 30; 
        let velocityY = 0;
        let isGrounded = false;
        let spawnPoint = null;
        let editorCamPos = new THREE.Vector3(0, 5, 10);
        let editorCamRot = new THREE.Euler(0,0,0);
        const playerHeight = 1.6; 
        const jumpStrength = 15; 
        const playerRadius = 0.4; 

        // INPUTS
        const keys = { w: false, a: false, s: false, d: false, space: false };
        let mobileMove = { x: 0, y: 0 };
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

        // MOBILE JOYSTICK LOGIC
        if (isMobile) {
            const joystickZone = document.getElementById('joystick-zone');
            const joystickKnob = document.getElementById('joystick-knob');
            let isDragging = false;

            joystickZone.addEventListener('touchstart', (e) => { isDragging = true; updateJoystick(e); });
            joystickZone.addEventListener('touchmove', (e) => { if(isDragging) updateJoystick(e); e.preventDefault(); });
            joystickZone.addEventListener('touchend', () => { 
                isDragging = false; joystickKnob.style.transform = `translate(0px, 0px)`; mobileMove = {x:0, y:0};
            });

            function updateJoystick(e) {
                const rect = joystickZone.getBoundingClientRect();
                const touch = e.targetTouches[0];
                let x = touch.clientX - rect.left - 60; 
                let y = touch.clientY - rect.top - 60;
                const distance = Math.min(Math.sqrt(x*x + y*y), 40);
                const angle = Math.atan2(y, x);
                x = Math.cos(angle) * distance;
                y = Math.sin(angle) * distance;
                joystickKnob.style.transform = `translate(${x}px, ${y}px)`;
                mobileMove.x = x / 40; mobileMove.y = -y / 40; 
            }

            document.getElementById('jump-btn').addEventListener('touchstart', (e) => { keys.space = true; e.preventDefault(); });
            document.getElementById('jump-btn').addEventListener('touchend', (e) => { keys.space = false; e.preventDefault(); });
        }

        // SCRIPTING ENGINE
        let activeScriptBlock = null;
        let activeRuntimeScripts = []; 

        function updateScriptIcon(part) {
            if (part.userData && part.userData.scriptCode) {
                if (!part.userData.scriptSprite) {
                    const canvas = document.createElement('canvas');
                    canvas.width = 128; canvas.height = 128;
                    const ctx = canvas.getContext('2d');
                    ctx.fillStyle = '#f39c12';
                    ctx.font = 'bold 60px monospace';
                    ctx.textAlign = 'center';
                    ctx.fillText('</>', 64, 80);
                    const tex = new THREE.CanvasTexture(canvas);
                    const spriteMat = new THREE.SpriteMaterial({ map: tex, depthTest: false });
                    const sprite = new THREE.Sprite(spriteMat);
                    sprite.scale.set(1.5, 1.5, 1);
                    part.add(sprite);
                    part.userData.scriptSprite = sprite;
                }
                part.userData.scriptSprite.position.set(0, (part.scale.y / 2) + 0.8, 0);
                part.userData.scriptSprite.visible = !isPlayMode;
            } else if (part.userData.scriptSprite) {
                part.remove(part.userData.scriptSprite);
                part.userData.scriptSprite = null;
            }
        }

        // UI ACTIONS
        window.closeScriptEditor = () => {
            document.getElementById('script-editor-panel').style.display = 'none';
            activeScriptBlock = null;
        };

        window.saveScript = () => {
            if (activeScriptBlock) {
                const code = document.getElementById('script-textarea').value;
                if (!activeScriptBlock.userData) activeScriptBlock.userData = {};
                activeScriptBlock.userData.scriptCode = code;
                updateScriptIcon(activeScriptBlock);
            }
            window.closeScriptEditor();
        };

        // PREVENT SPACEBAR FROM CLICKING BUTTONS
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                if(document.activeElement.tagName === 'BUTTON' || document.activeElement.tagName === 'INPUT') {
                    document.activeElement.blur(); 
                }
            }
        });

        // PROPERTIES PANEL LOGIC
        const partNameInput = document.getElementById('part-name');
        const partColorInput = document.getElementById('part-color');
        const sizeSlider = document.getElementById('size-slider');
        const collisionToggle = document.getElementById('collision-toggle');

        partNameInput.addEventListener('input', (e) => {
            if(gizmo.object) gizmo.object.name = e.target.value;
        });

        partColorInput.addEventListener('input', (e) => {
            if(gizmo.object && gizmo.object !== floor) {
                gizmo.object.material.color.set(e.target.value);
            }
        });

        sizeSlider.addEventListener('input', (e) => {
            if (gizmo.object && gizmo.object !== floor) {
                const s = parseFloat(e.target.value);
                gizmo.object.scale.set(s, s, s);
                updateScriptIcon(gizmo.object);
            }
        });

        collisionToggle.addEventListener('change', (e) => {
            if(gizmo.object) gizmo.object.userData.cancollide = e.target.checked;
        });

        gizmo.addEventListener('dragging-changed', (event) => {
            // Disable orbit/camera controls while dragging if we had them
        });

        // SELECTION LOGIC
        renderer.domElement.addEventListener('pointerdown', (e) => {
            if (isPlayMode || e.button !== 0) return;
            
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);

            const intersects = raycaster.intersectObjects(objects, false);
            
            if (currentTool === 'place') {
                if (intersects.length > 0) {
                    const intersect = intersects[0];
                    let mesh;
                    if (selectedItemType === 'block') {
                        const geo = new THREE.BoxGeometry(1, 1, 1);
                        const mat = new THREE.MeshStandardMaterial({ map: document.getElementById('grid-toggle').checked ? gridTexture : null, color: 0xcccccc });
                        mesh = new THREE.Mesh(geo, mat);
                        mesh.name = "Part";
                    } else if (selectedItemType === 'spawn') {
                        if (spawnPoint) Workspace.remove(spawnPoint);
                        const geo = new THREE.BoxGeometry(1, 0.1, 1);
                        const mat = new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x00aaff, emissiveIntensity: 1 });
                        mesh = new THREE.Mesh(geo, mat);
                        mesh.name = "SpawnLocation";
                        spawnPoint = mesh;
                    }
                    mesh.userData = { cancollide: true };
                    mesh.position.copy(intersect.point).add(intersect.face.normal.clone().multiplyScalar(0.5));
                    mesh.position.x = Math.round(mesh.position.x);
                    mesh.position.y = Math.round(mesh.position.y);
                    mesh.position.z = Math.round(mesh.position.z);
                    Workspace.add(mesh);
                    objects.push(mesh);
                }
            } else if (currentTool === 'drag') {
                if (intersects.length > 0 && intersects[0].object !== floor) {
                    const obj = intersects[0].object;
                    gizmo.attach(obj);
                    document.getElementById('part-settings').style.display = 'block';
                    partNameInput.value = obj.name || "Part";
                    partColorInput.value = '#' + obj.material.color.getHexString();
                    sizeSlider.value = obj.scale.x;
                    collisionToggle.checked = obj.userData.cancollide !== false;
                } else {
                    gizmo.detach();
                    document.getElementById('part-settings').style.display = 'none';
                }
            } else if (currentTool === 'delete') {
                if (intersects.length > 0 && intersects[0].object !== floor) {
                    const obj = intersects[0].object;
                    if (obj === spawnPoint) spawnPoint = null;
                    Workspace.remove(obj);
                    const index = objects.indexOf(obj);
                    if (index > -1) objects.splice(index, 1);
                    gizmo.detach();
                    document.getElementById('part-settings').style.display = 'none';
                }
            } else if (currentTool === 'script') {
                if (intersects.length > 0 && intersects[0].object !== floor && intersects[0].object !== spawnPoint) {
                    activeScriptBlock = intersects[0].object;
                    document.getElementById('script-textarea').value = activeScriptBlock.userData.scriptCode || "";
                    document.getElementById('script-editor-panel').style.display = 'flex';
                }
            }
        });

        // PLAY MODE TOGGLE
        window.togglePlayTest = () => {
            const btn = document.getElementById('playTestBtn');
            isPlayMode = !isPlayMode;
            
            if (isPlayMode) {
                if (!spawnPoint) { alert("❌ You need a Spawn Point to play!"); isPlayMode = false; return; }
                
                // Save Editor State
                editorCamPos.copy(camera.position);
                editorCamRot.copy(camera.rotation);
                
                // UI Changes
                btn.innerText = "STOP TEST ⏹"; btn.classList.add('playing');
                document.getElementById('status').innerText = "Status: PLAY TESTING";
                ['publishBtn', 'dragModeBtn', 'scriptModeBtn', 'deleteModeBtn', 'item-selector', 'settings-panel'].forEach(id => document.getElementById(id).style.display = 'none');
                
                if(!isMobile) {
                    document.getElementById('crosshair').style.display = 'block';
                    document.body.requestPointerLock();
                } else {
                    document.getElementById('mobile-controls').style.display = 'block';
                }
                
                gizmo.detach();
                document.getElementById('part-settings').style.display = 'none';

                // Move Player to Spawn
                camera.position.set(spawnPoint.position.x, spawnPoint.position.y + playerHeight, spawnPoint.position.z);
                camera.rotation.set(0,0,0);
                velocityY = 0;

                // COMPILE SCRIPTS SAFELY
                activeRuntimeScripts = [];
                objects.forEach(obj => {
                    if(obj !== floor && obj !== spawnPoint) {
                        obj.userData.initialPos = obj.position.clone();
                        obj.userData.initialRot = obj.rotation.clone();
                        if (obj.userData.scriptSprite) obj.userData.scriptSprite.visible = false;

                        if (obj.userData.scriptCode) {
                            try {
                                // Wrap in try-catch to prevent lag spikes on error
                                const safeCode = `try { ${obj.userData.scriptCode} } catch(e) { console.error("Script Error in "+part.name+": ", e.message); }`;
                                const func = new Function('part', 'scene', 'delta', safeCode);
                                activeRuntimeScripts.push({ part: obj, run: func });
                            } catch(e) { console.error("Compile Error:", e); }
                        }
                    }
                });

            } else {
                // STOP PLAY MODE
                if (document.pointerLockElement === document.body) document.exitPointerLock();
                btn.innerText = "PLAY TEST ▶"; btn.classList.remove('playing');
                document.getElementById('status').innerText = "Status: BUILDING MODE";
                document.getElementById('crosshair').style.display = 'none';
                document.getElementById('esc-hint').style.display = 'none';
                document.getElementById('mobile-controls').style.display = 'none';
                ['publishBtn', 'dragModeBtn', 'scriptModeBtn', 'deleteModeBtn', 'item-selector', 'settings-panel'].forEach(id => document.getElementById(id).style.display = 'flex');
                
                camera.position.copy(editorCamPos); camera.rotation.copy(editorCamRot);
                
                // REVERT OBJECTS
                objects.forEach(obj => {
                    if(obj !== floor && obj.userData.initialPos) {
                        obj.position.copy(obj.userData.initialPos);
                        obj.rotation.copy(obj.userData.initialRot);
                        if (obj.userData.scriptSprite) obj.userData.scriptSprite.visible = true;
                    }
                });
                activeRuntimeScripts = []; 
            }
        };

        // CONTROLS
        document.addEventListener('keydown', (e) => {
            const key = e.key.toLowerCase();
            if (keys.hasOwnProperty(key)) keys[key] = true;
            if (e.code === 'Space') keys.space = true;
        });
        document.addEventListener('keyup', (e) => {
            const key = e.key.toLowerCase();
            if (keys.hasOwnProperty(key)) keys[key] = false;
            if (e.code === 'Space') keys.space = false;
        });

        document.addEventListener('mousemove', (e) => {
            if (isPlayMode && document.pointerLockElement === document.body) {
                camera.rotation.y -= e.movementX * 0.002;
                camera.rotation.x -= e.movementY * 0.002;
                camera.rotation.x = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, camera.rotation.x));
            }
        });

        // SIMPLE AABB COLLISION CHECK
        function checkCollision(nextPos) {
            const playerBox = new THREE.Box3().setFromCenterAndSize(
                new THREE.Vector3(nextPos.x, nextPos.y - (playerHeight/2), nextPos.z), 
                new THREE.Vector3(playerRadius * 2, playerHeight, playerRadius * 2)
            );

            for (let obj of objects) {
                if (obj === floor || obj === spawnPoint || obj.userData.cancollide === false) continue;
                const objBox = new THREE.Box3().setFromObject(obj);
                if (playerBox.intersectsBox(objBox)) {
                    return true; 
                }
            }
            return false;
        }

        // MAIN LOOP
        function animate() {
            requestAnimationFrame(animate);
            const delta = Math.min(clock.getDelta(), 0.1); 

            if (isPlayMode) {
                // RUN SCRIPTS
                for(let i=0; i<activeRuntimeScripts.length; i++) {
                    const scriptData = activeRuntimeScripts[i];
                    if(scriptData && scriptData.run) {
                        scriptData.run(scriptData.part, Workspace, delta);
                    }
                }

                // MOVEMENT & PHYSICS
                const dir = new THREE.Vector3();
                const right = new THREE.Vector3();
                camera.getWorldDirection(dir);
                dir.y = 0; dir.normalize();
                right.crossVectors(camera.up, dir).normalize();

                let moveX = 0;
                let moveZ = 0;

                if (keys.w) { moveX += dir.x; moveZ += dir.z; }
                if (keys.s) { moveX -= dir.x; moveZ -= dir.z; }
                if (keys.a) { moveX += right.x; moveZ += right.z; }
                if (keys.d) { moveX -= right.x; moveZ -= right.z; }

                if (isMobile) {
                    moveX += (dir.x * mobileMove.y) + (-right.x * mobileMove.x);
                    moveZ += (dir.z * mobileMove.y) + (-right.z * mobileMove.x);
                }

                const velocity = new THREE.Vector3(moveX, 0, moveZ).normalize().multiplyScalar(moveSpeed * delta);
                
                // Apply Gravity
                velocityY -= worldGravity * delta;
                
                // Calculate next positions to check collisions
                let nextPos = camera.position.clone();
                
                // Y Collision (Floor & Jumping)
                nextPos.y += velocityY * delta;
                if (nextPos.y < playerHeight) {
                    nextPos.y = playerHeight;
                    velocityY = 0;
                    isGrounded = true;
                } else if (checkCollision(new THREE.Vector3(camera.position.x, nextPos.y, camera.position.z))) {
                    velocityY = 0;
                    if(velocityY < 0) isGrounded = true; 
                } else {
                    isGrounded = false;
                    camera.position.y = nextPos.y;
                }

                if (keys.space && isGrounded) {
                    velocityY = jumpStrength;
                    isGrounded = false;
                }

                // X & Z Collision (Walls)
                if (velocity.x !== 0) {
                    let testPos = camera.position.clone();
                    testPos.x += velocity.x;
                    if(!checkCollision(testPos)) camera.position.x += velocity.x;
                }
                if (velocity.z !== 0) {
                    let testPos = camera.position.clone();
                    testPos.z += velocity.z;
                    if(!checkCollision(testPos)) camera.position.z += velocity.z;
                }

                document.getElementById('coords').innerText = `POS - X: ${camera.position.x.toFixed(1)} | Y: ${camera.position.y.toFixed(1)} | Z: ${camera.position.z.toFixed(1)}`;
            }

            renderer.render(scene, camera);
        }

        window.toggleTool = (tool) => {
            currentTool = (currentTool === tool) ? 'place' : tool;
            if (currentTool !== 'drag') { gizmo.detach(); document.getElementById('part-settings').style.display = 'none'; }
            document.getElementById('deleteModeBtn').classList.toggle('active-tool', currentTool === 'delete');
            document.getElementById('dragModeBtn').classList.toggle('active-tool', currentTool === 'drag');
            document.getElementById('scriptModeBtn').classList.toggle('active-tool', currentTool === 'script');
        };

        window.selectItem = (type) => {
            selectedItemType = type; currentTool = 'place'; gizmo.detach();
            document.querySelectorAll('.item-card').forEach(c => c.classList.remove('selected'));
            document.getElementById(`card-${type}`).classList.add('selected');
        };

        window.exitGame = () => { localStorage.removeItem('currentGameId'); localStorage.removeItem('editMode'); window.location.href = 'index.html'; };

        window.publishGame = async () => {
            if (!spawnPoint) { alert("❌ Need a Spawn Point!"); return; }
            
            // Extract block data to save
            const blocksData = [];
            Workspace.children.forEach(obj => {
                if (obj.type === "Mesh" || obj.type === "Group") {
                    blocksData.push({ 
                        x: obj.position.x, y: obj.position.y, z: obj.position.z, 
                        rx: obj.rotation.x, ry: obj.rotation.y, rz: obj.rotation.z,
                        sx: obj.scale.x, sy: obj.scale.y, sz: obj.scale.z,
                        type: (obj === spawnPoint) ? 'spawn' : 'block',
                        color: obj.material ? '#' + obj.material.color.getHexString() : '#cccccc',
                        name: obj.name,
                        cancollide: obj.userData.cancollide !== false,
                        script: (obj.userData && obj.userData.scriptCode) ? obj.userData.scriptCode : null
                    });
                }
            });

            const config = { gravity: worldGravity, speed: moveSpeed };
            const editId = localStorage.getItem('currentGameId');
            
            try {
                if (localStorage.getItem('editMode') === 'true' && editId) {
                    await supabaseClient.from('games').update({ blocks: blocksData, config: config }).eq('id', editId);
                    alert("✅ Game Updated!");
                } else {
                    const name = prompt("Name your game:"); if (!name) return;
                    await supabaseClient.from('games').insert([{ name, blocks: blocksData, creator: currentUser, config: config }]);
                    alert("🚀 Game Published!");
                }
                exitGame();
            } catch (err) { alert("❌ Save Failed: " + err.message); }
        };

        // START ENGINE
        camera.position.set(0, 5, 10);
        camera.lookAt(0,0,0);
        document.getElementById('loading-overlay').style.display = 'none';
        animate();

    </script>
</body>
</html>
