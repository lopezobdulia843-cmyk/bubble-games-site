<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bubble Games</title>
    
    <script src="https://unpkg.com/blockly/blockly_compressed.js"></script>
    <script src="https://unpkg.com/blockly/blocks_compressed.js"></script>
    <script src="https://unpkg.com/blockly/javascript_compressed.js"></script>
    <script src="https://unpkg.com/blockly/msg/en.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: sans-serif; touch-action: none; color: white; }
        .controls { position: absolute; z-index: 10; display: flex; gap: 10px; }
        #top-bar { top: 20px; right: 20px; flex-direction: column; align-items: flex-end; }
        
        #settings-panel { 
            position: absolute; top: 100px; left: 20px; 
            background: rgba(0,0,0,0.85); padding: 15px; border-radius: 12px; 
            border: 1px solid #00d4ff; width: 200px; z-index: 50;
            backdrop-filter: blur(10px);
        }
        .setting-group { margin-bottom: 18px; }
        .label-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .setting-group label { font-size: 11px; text-transform: uppercase; color: #00d4ff; font-weight: bold; }
        
        .num-input {
            width: 50px; background: #111; border: 1px solid #444; color: #00d4ff;
            font-size: 12px; border-radius: 4px; padding: 2px 4px; text-align: center;
        }
        .num-input:focus { border-color: #00d4ff; outline: none; }

        input[type="range"] { width: 100%; cursor: pointer; accent-color: #00d4ff; }

        button { 
            width: 140px; height: 50px; font-size: 14px; font-weight: bold;
            background: rgba(0, 212, 255, 0.1); color: white;
            border: 2px solid #00d4ff; border-radius: 10px; cursor: pointer;
            backdrop-filter: blur(5px); margin-bottom: 5px;
            display: flex; align-items: center; justify-content: center; transition: 0.2s;
        }
        
        #publishBtn { background: #00d4ff; color: #000; }
        #playTestBtn { background: #2ecc71; color: #000; border-color: #2ecc71; }
        #playTestBtn.playing { background: #e74c3c; color: white; border-color: #e74c3c; }

        .active-tool { background: #00d4ff !important; color: #000 !important; box-shadow: 0 0 15px #00d4ff; }
        #deleteModeBtn.active-tool { background: #ff3232 !important; border-color: #ff3232 !important; color: white !important; box-shadow: 0 0 15px #ff3232; }

        #item-selector { 
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 15px; background: rgba(0,0,0,0.8); padding: 10px;
            border-radius: 15px; border: 2px solid #333; z-index: 20;
        }
        .item-card {
            width: 60px; height: 60px; border-radius: 10px; border: 2px solid #444;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; background: #111; transition: 0.2s;
        }
        .item-card:hover { border-color: #00d4ff; }
        .item-card.selected { border-color: #00d4ff; background: rgba(0, 212, 255, 0.2); }
        .item-icon { width: 30px; height: 30px; margin-bottom: 2px; border-radius: 4px; }
        .icon-block { background: #cccccc; border: 1px solid #999; }
        .icon-spawn { background: #00ffff; box-shadow: 0 0 10px #00ffff; }
        .item-label { font-size: 10px; color: white; text-transform: uppercase; }

        #info { position: absolute; top: 10px; left: 10px; color: white; pointer-events: none; }
        #coords { font-family: monospace; color: #00d4ff; margin-top: 5px; background: rgba(0,0,0,0.5); padding: 5px; border-radius: 5px; }
        #crosshair { 
            position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; 
            border: 2px solid white; border-radius: 50%; transform: translate(-50%, -50%); 
            display: none; pointer-events: none; 
        }
        #loading-overlay { position: fixed; inset: 0; background: #050505; z-index: 100; display: flex; align-items: center; justify-content: center; color: #00d4ff; font-weight: bold; }

        .player-label {
            position: absolute; background: rgba(0,0,0,0.8); color: #00d4ff;
            padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: bold;
            border: 1px solid #00d4ff; pointer-events: none; white-space: nowrap;
            transform: translate(-50%, -100%); z-index: 5;
        }

        #chat-container {
            position: absolute; bottom: 100px; left: 20px; width: 250px;
            height: 200px; display: none; flex-direction: column; /* HIDDEN BY DEFAULT */
            z-index: 60; pointer-events: none;
        }
        #chat-messages {
            flex-grow: 1; overflow-y: auto; background: rgba(0,0,0,0.4);
            border-radius: 8px; padding: 10px; font-size: 13px;
            display: flex; flex-direction: column; gap: 4px;
            scrollbar-width: thin; scrollbar-color: #00d4ff transparent;
        }
        #chat-input {
            margin-top: 5px; background: rgba(0,0,0,0.8); border: 1px solid #00d4ff;
            color: white; padding: 8px; border-radius: 4px; pointer-events: auto;
            outline: none;
        }
        .chat-msg { word-wrap: break-word; text-shadow: 1px 1px 2px black; }
        .chat-user { color: #00d4ff; font-weight: bold; }

        .toggle-container { display: flex; align-items: center; gap: 10px; margin-top: 10px; cursor: pointer; }
        .toggle-container input { cursor: pointer; }

        /* Mobile Controls */
        #mobile-controls { display: none; position: absolute; bottom: 0; left: 0; width: 100%; height: 200px; z-index: 90; pointer-events: none; }
        #joystick-zone { position: absolute; bottom: 30px; left: 30px; width: 120px; height: 120px; background: rgba(255,255,255,0.1); border-radius: 50%; pointer-events: auto; }
        #joystick-knob { position: absolute; top: 35px; left: 35px; width: 50px; height: 50px; background: rgba(0, 212, 255, 0.6); border-radius: 50%; }
        #mobile-jump { position: absolute; bottom: 40px; right: 40px; width: 80px; height: 80px; border-radius: 50%; background: rgba(0, 212, 255, 0.2); border: 2px solid #00d4ff; pointer-events: auto; color: white; font-weight: bold; }
        #mobile-jump:active { background: rgba(0, 212, 255, 0.5); }

        /* Blockly UI */
        #blockly-container {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80%; max-width: 800px; height: 60vh;
            display: none; z-index: 95; background: #fff;
            border: 3px solid #00d4ff; border-radius: 8px; overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }
        #blockly-header {
            background: #111; padding: 10px; display: flex; justify-content: space-between; align-items: center;
        }
        #blockly-header span { color: #00d4ff; font-weight: bold; font-size: 16px; }
        .blockly-btn {
            padding: 5px 15px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; margin-left: 10px;
        }
        #blocklyDiv { height: calc(100% - 40px); width: 100%; }
    </style>
</head>
<body>
    <div id="loading-overlay">INITIALIZING...</div>

    <div id="info">
        <h2 id="gameNameDisplay" style="margin:0; color:#00d4ff;">BUBBLE GAMES</h2>
        <p id="status">Status: LOADING...</p>
        <div id="coords">POS - X: 0 | Y: 0 | Z: 0</div>
    </div>

    <div id="blockly-container">
        <div id="blockly-header">
            <span>Visual Scripting Editor</span>
            <div>
                <button class="blockly-btn" style="background: #2ecc71; color: #000;" onclick="runBlocklyCode()">RUN SCRIPT</button>
                <button class="blockly-btn" style="background: #e74c3c; color: #fff;" onclick="toggleBlockly()">CLOSE</button>
            </div>
        </div>
        <div id="blocklyDiv"></div>
    </div>

    <div id="chat-container">
        <div id="chat-messages"></div>
        <input type="text" id="chat-input" placeholder="Press Enter to chat..." autocomplete="off">
    </div>

    <div id="settings-panel" style="display:none;">
        <div class="setting-group">
            <div class="label-container">
                <label>Move Speed</label>
                <input type="number" id="speed-num" class="num-input" step="0.01" value="0.12">
            </div>
            <input type="range" id="speed-slider" min="0.01" max="1.0" step="0.01" value="0.12">
        </div>

        <div class="setting-group">
            <div class="label-container">
                <label>Gravity</label>
                <input type="number" id="gravity-num" class="num-input" step="0.001" value="0.015">
            </div>
            <input type="range" id="gravity-slider" min="0" max="0.1" step="0.001" value="0.015">
        </div>

        <div class="setting-group">
            <label class="toggle-container">
                <input type="checkbox" id="grid-toggle" checked>
                <span style="font-size: 11px; color: #00d4ff;">GRID TEXTURES</span>
            </label>
        </div>

        <div id="part-settings" style="display:none; border-top: 1px solid #333; padding-top: 10px;">
            <label>Part Size</label>
            <input type="range" id="size-slider" min="0.2" max="10" step="0.1" value="1">
            <p style="font-size: 9px; color: #888; margin-top:5px;">Click part to select</p>
        </div>
    </div>

    <div id="item-selector" style="display:none;">
        <div class="item-card selected" onclick="selectItem('block')" id="card-block">
            <div class="item-icon icon-block"></div>
            <div class="item-label">Block</div>
        </div>
        <div class="item-card" onclick="selectItem('spawn')" id="card-spawn">
            <div class="item-icon icon-spawn"></div>
            <div class="item-label">Spawn</div>
        </div>
    </div>

    <div id="top-bar" class="controls">
        <button id="playTestBtn" onclick="togglePlayTest()">PLAY TEST ▶</button>
        <button id="publishBtn" onclick="publishGame()" style="display:none;">PUBLISH 🚀</button>
        <button id="scriptBtn" onclick="toggleBlockly()" style="display:none; background: #9b59b6; border-color: #8e44ad;">SCRIPTS 🧩</button>
        <button id="dragModeBtn" onclick="toggleTool('drag')" style="display:none;">DRAG PART</button>
        <button id="deleteModeBtn" onclick="toggleTool('delete')" style="display:none;">DELETE</button>
        <button onclick="exitGame()">EXIT</button>
    </div>
    
    <div id="crosshair"></div>

    <div id="mobile-controls">
        <div id="joystick-zone">
            <div id="joystick-knob"></div>
        </div>
        <button id="mobile-jump">JUMP</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="importmap">
    { 
        "imports": { 
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        } 
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { TransformControls } from 'three/addons/controls/TransformControls.js';

        const SUPABASE_URL = 'https://sideqpofgknyfagrjnke.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_ULjlm97u7-dg8ekTPU84aA_rA1CtUnH';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

        let currentUser = "Guest_" + Math.floor(Math.random() * 999);
        async function getCreator() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (user) currentUser = user.email.split('@')[0];
        }
        getCreator();

        const clock = new THREE.Clock(); 
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0c);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1.2));
        const grid = new THREE.GridHelper(100, 100, 0x00d4ff, 0x222222);
        scene.add(grid);

        const createGridTexture = () => {
            const canvas = document.createElement('canvas');
            canvas.width = 256; canvas.height = 256;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#111111'; ctx.fillRect(0, 0, 256, 256);
            ctx.strokeStyle = '#00d4ff'; ctx.lineWidth = 4;
            ctx.strokeRect(0, 0, 256, 256);
            const tex = new THREE.CanvasTexture(canvas);
            tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
            return tex;
        };
        const gridTexture = createGridTexture();

        const floor = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.MeshBasicMaterial({ visible: false }));
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        const objects = [floor]; 
        const blockGeo = new THREE.BoxGeometry(1, 1, 1);
        const spawnGeo = new THREE.BoxGeometry(0.8, 0.2, 0.8);
        const spawnMat = new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x00ffff, emissiveIntensity: 2 });
        
        const raycaster = new THREE.Raycaster();
        const downRay = new THREE.Raycaster(); 
        const upRay = new THREE.Raycaster();
        const sideRay = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        const gizmo = new TransformControls(camera, renderer.domElement);
        gizmo.setMode('translate');
        gizmo.setSize(0.6); 
        scene.add(gizmo);

        let remotePlayers = {};
        const gameId = localStorage.getItem('currentGameId') || 'lobby';
        const channel = supabaseClient.channel(`room_${gameId}`);

        const chatInput = document.getElementById('chat-input');
        const chatMessages = document.getElementById('chat-messages');

        function addChatMessage(user, text) {
            const div = document.createElement('div');
            div.className = 'chat-msg';
            div.innerHTML = `<span class="chat-user">${user}:</span> ${text}`;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        chatInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && chatInput.value.trim() !== '') {
                const msg = chatInput.value.trim();
                channel.send({ type: 'broadcast', event: 'chat', payload: { user: currentUser, text: msg } });
                addChatMessage("You", msg);
                chatInput.value = '';
                chatInput.blur();
            }
        });

        channel.on('broadcast', { event: 'chat' }, ({ payload }) => {
            addChatMessage(payload.user, payload.text);
        });

        channel.on('presence', { event: 'leave' }, ({ leftPresences }) => {
            leftPresences.forEach(p => {
                const id = p.key;
                if (remotePlayers[id]) {
                    scene.remove(remotePlayers[id].mesh);
                    remotePlayers[id].label.remove();
                    delete remotePlayers[id];
                }
            });
        });

        channel.on('broadcast', { event: 'move' }, ({ payload }) => {
            if (payload.id === currentUser) return;
            if (payload.y < -10) {
                if (remotePlayers[payload.id]) {
                    scene.remove(remotePlayers[payload.id].mesh);
                    remotePlayers[payload.id].label.style.display = 'none';
                }
                return;
            }

            if (!remotePlayers[payload.id]) {
                const bodyGeo = new THREE.BoxGeometry(0.8, 1.6, 0.8);
                const bodyMat = new THREE.MeshStandardMaterial({ color: 0x00d4ff });
                const mesh = new THREE.Mesh(bodyGeo, bodyMat);
                scene.add(mesh);
                const label = document.createElement('div');
                label.className = 'player-label';
                label.innerText = payload.id;
                document.body.appendChild(label);
                remotePlayers[payload.id] = { mesh, label };
            }
            remotePlayers[payload.id].mesh.position.set(payload.x, payload.y - 0.8, payload.z);
        }).subscribe();

        let isDraggingGizmo = false;
        gizmo.addEventListener('dragging-changed', (event) => { isDraggingGizmo = event.value; });

        let isPlayMode = false; 
        let currentTool = 'place'; 
        let selectedItemType = 'block'; 
        let baseSpeed = 0.12 * 60; 
        let baseGravity = 0.015 * 60; 
        let velocityY = 0;
        let isGrounded = false;
        let spawnPoint = null;
        let editorCamPos = new THREE.Vector3();
        let editorCamRot = new THREE.Euler();
        const playerHeight = 1.4; 
        const jumpStrength = 0.35 * 60; 
        const fallMultiplier = 1.5; 
        const playerRadius = 0.45; 

        // Blockly Variables
        let workspace = null;

        window.toggleBlockly = () => {
            const container = document.getElementById('blockly-container');
            if (container.style.display === 'none' || container.style.display === '') {
                container.style.display = 'block';
                if (!workspace) {
                    workspace = Blockly.inject('blocklyDiv', {
                        toolbox: `
                            <xml>
                                <category name="Logic" colour="%{BKY_LOGIC_HUE}">
                                    <block type="controls_if"></block>
                                    <block type="logic_compare"></block>
                                </category>
                                <category name="Math" colour="%{BKY_MATH_HUE}">
                                    <block type="math_number"></block>
                                    <block type="math_arithmetic"></block>
                                </category>
                                <category name="Text" colour="%{BKY_TEXTS_HUE}">
                                    <block type="text"></block>
                                    <block type="text_print"></block>
                                </category>
                            </xml>
                        `,
                        grid: { spacing: 20, length: 3, colour: '#ccc', snap: true }
                    });
                }
            } else {
                container.style.display = 'none';
            }
        };

        window.runBlocklyCode = () => {
            if (!workspace) return;
            try {
                const code = Blockly.JavaScript.workspaceToCode(workspace);
                eval(code); 
                alert("Script Executed Successfully!");
            } catch (e) {
                alert("Script Error: " + e.message);
            }
        };

        const speedSlider = document.getElementById('speed-slider');
        const speedNum = document.getElementById('speed-num');
        const gravSlider = document.getElementById('gravity-slider');
        const gravNum = document.getElementById('gravity-num');
        const gridToggle = document.getElementById('grid-toggle');

        speedSlider.oninput = (e) => { baseSpeed = parseFloat(e.target.value) * 60; speedNum.value = e.target.value; };
        speedNum.oninput = (e) => { baseSpeed = (parseFloat(e.target.value) || 0) * 60; speedSlider.value = e.target.value; };
        gravSlider.oninput = (e) => { baseGravity = parseFloat(e.target.value) * 60; gravNum.value = e.target.value; };
        gravNum.oninput = (e) => { baseGravity = (parseFloat(e.target.value) || 0) * 60; gravSlider.value = e.target.value; };

        gridToggle.onchange = () => {
            objects.forEach(obj => {
                if (obj !== floor && obj !== spawnPoint) {
                    obj.material.map = gridToggle.checked ? gridTexture : null;
                    obj.material.needsUpdate = true;
                }
            });
        };

        document.getElementById('size-slider').oninput = (e) => {
            if (gizmo.object) {
                const s = parseFloat(e.target.value);
                gizmo.object.scale.set(s, s, s);
            }
        };

        window.togglePlayTest = () => {
            const btn = document.getElementById('playTestBtn');
            isPlayMode = !isPlayMode;
            if (isPlayMode) {
                if (!spawnPoint) { alert("❌ Need a Spawn Point!"); isPlayMode = false; return; }
                editorCamPos.copy(camera.position);
                editorCamRot.copy(camera.rotation);
                btn.innerText = "STOP TEST ⏹"; btn.classList.add('playing');
                document.getElementById('status').innerText = "Status: PLAY TESTING";
                document.getElementById('crosshair').style.display = 'block';
                document.getElementById('chat-container').style.display = 'flex'; // SHOW CHAT
                ['publishBtn', 'scriptBtn', 'dragModeBtn', 'deleteModeBtn', 'item-selector', 'settings-panel'].forEach(id => document.getElementById(id).style.display = 'none');
                
                if (isTouchDevice) {
                    document.getElementById('mobile-controls').style.display = 'block';
                } else {
                    document.body.requestPointerLock();
                }

                gizmo.detach();
                camera.position.set(spawnPoint.position.x, spawnPoint.position.y + playerHeight, spawnPoint.position.z);
                velocityY = 0;
            } else {
                if (document.pointerLockElement) document.exitPointerLock();
                btn.innerText = "PLAY TEST ▶"; btn.classList.remove('playing');
                document.getElementById('status').innerText = "Status: BUILDING MODE";
                document.getElementById('crosshair').style.display = 'none';
                document.getElementById('chat-container').style.display = 'none'; // HIDE CHAT
                document.getElementById('mobile-controls').style.display = 'none';
                ['publishBtn', 'scriptBtn', 'dragModeBtn', 'deleteModeBtn', 'item-selector', 'settings-panel'].forEach(id => document.getElementById(id).style.display = 'flex');
                camera.position.copy(editorCamPos); camera.rotation.copy(editorCamRot);
            }
        };

        window.exitGame = () => { 
            if (confirm("Exit with unsaved changes?")) {
                localStorage.removeItem('currentGameId'); 
                localStorage.removeItem('editMode'); 
                window.location.href = 'index.html'; 
            }
        };
        
        window.toggleTool = (tool) => {
            currentTool = (currentTool === tool) ? 'place' : tool;
            if (currentTool !== 'drag') { gizmo.detach(); document.getElementById('part-settings').style.display = 'none'; }
            document.getElementById('deleteModeBtn').classList.toggle('active-tool', currentTool === 'delete');
            document.getElementById('dragModeBtn').classList.toggle('active-tool', currentTool === 'drag');
        };

        window.selectItem = (type) => {
            selectedItemType = type; currentTool = 'place'; gizmo.detach();
            document.querySelectorAll('.item-card').forEach(c => c.classList.remove('selected'));
            document.getElementById(`card-${type}`).classList.add('selected');
        };

        window.publishGame = async () => {
            if (!spawnPoint) { alert("❌ Need a Spawn Point!"); return; }
            const blocksData = objects.filter(obj => obj !== floor).map(obj => ({ 
                x: obj.position.x, y: obj.position.y, z: obj.position.z, s: obj.scale.x, type: (obj === spawnPoint) ? 'spawn' : 'block' 
            }));
            const config = { gravity: baseGravity/60, speed: baseSpeed/60 };
            const editId = localStorage.getItem('currentGameId');
            try {
                if (localStorage.getItem('editMode') === 'true' && editId) {
                    await supabaseClient.from('games').update({ blocks: blocksData, config: config }).eq('id', editId);
                    alert("✅ Game Updated!");
                } else {
                    const name = prompt("Name your game:"); if (!name) return;
                    await supabaseClient.from('games').insert([{ name, blocks: blocksData, creator: currentUser, config: config }]);
                    alert("🚀 Game Published!");
                }
                localStorage.removeItem('currentGameId'); localStorage.removeItem('editMode'); window.location.href = 'index.html';
            } catch (err) { alert("❌ Save Failed: " + err.message); }
        };

        async function init() {
            const id = localStorage.getItem('currentGameId');
            const isEditMode = localStorage.getItem('editMode') === 'true';
            
            if (isEditMode) {
                isPlayMode = false;
                ['publishBtn', 'scriptBtn', 'dragModeBtn', 'deleteModeBtn', 'item-selector', 'settings-panel'].forEach(id => document.getElementById(id).style.display = 'flex');
                document.getElementById('chat-container').style.display = 'none';
            } else {
                isPlayMode = true;
                document.getElementById('crosshair').style.display = 'block'; 
                document.getElementById('playTestBtn').style.display = 'none';
                document.getElementById('chat-container').style.display = 'flex';
                if (isTouchDevice) document.getElementById('mobile-controls').style.display = 'block';
            }

            if (id) {
                const { data: game } = await supabaseClient.from('games').select('*').eq('id', id).single();
                if (game) {
                    document.getElementById('gameNameDisplay').innerText = game.name.toUpperCase();
                    
                    if (game.config) {
                        baseSpeed = (game.config.speed || 0.12) * 60;
                        baseGravity = (game.config.gravity || 0.015) * 60;
                        speedSlider.value = game.config.speed || 0.12;
                        speedNum.value = game.config.speed || 0.12;
                        gravSlider.value = game.config.gravity || 0.015;
                        gravNum.value = game.config.gravity || 0.015;
                    }

                    if (game.blocks) {
                        game.blocks.forEach(d => {
                            const isSpawn = d.type === 'spawn';
                            const mat = isSpawn ? spawnMat : new THREE.MeshStandardMaterial({ color: 0xcccccc, map: gridToggle.checked ? gridTexture : null });
                            const mesh = new THREE.Mesh(isSpawn ? spawnGeo : blockGeo, mat);
                            mesh.position.set(d.x, d.y, d.z); if (d.s) mesh.scale.set(d.s, d.s, d.s);
                            scene.add(mesh); objects.push(mesh); if (isSpawn) spawnPoint = mesh;
                        });
                    }
                }
            }
            
            if(spawnPoint) camera.position.set(spawnPoint.position.x, spawnPoint.position.y + playerHeight, spawnPoint.position.z);
            else camera.position.set(0, playerHeight, 5);
            setTimeout(() => document.getElementById('loading-overlay').style.display = 'none', 500);

            if (isPlayMode && !isTouchDevice) {
                document.addEventListener('click', () => {
                    if(isPlayMode && !document.pointerLockElement) document.body.requestPointerLock();
                }, {once: true});
            }
        }
        init();

        camera.rotation.order = "YXZ";
        let isDraggingCam = false; let dragDistance = 0; let prevMouse = { x: 0, y: 0 };
        const keys = {};

        // ADDED: KEYBOARD LISTENERS THAT WERE MISSING
        window.addEventListener('keydown', (e) => { keys[e.code] = true; });
        window.addEventListener('keyup', (e) => { keys[e.code] = false; });

        let joyX = 0; let joyY = 0;
        const joyZone = document.getElementById('joystick-zone');
        const joyKnob = document.getElementById('joystick-knob');
        const jumpBtn = document.getElementById('mobile-jump');
        
        joyZone.addEventListener('touchstart', handleJoystick, {passive: false});
        joyZone.addEventListener('touchmove', handleJoystick, {passive: false});
        joyZone.addEventListener('touchend', () => { joyX = 0; joyY = 0; joyKnob.style.transform = `translate(0px, 0px)`; });
        
        function handleJoystick(e) {
            e.preventDefault();
            const rect = joyZone.getBoundingClientRect();
            const touch = e.touches[0];
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            let dx = touch.clientX - centerX;
            let dy = touch.clientY - centerY;
            const distance = Math.min(Math.sqrt(dx*dx + dy*dy), 40); 
            const angle = Math.atan2(dy, dx);
            
            const knobX = Math.cos(angle) * distance;
            const knobY = Math.sin(angle) * distance;
            joyKnob.style.transform = `translate(${knobX}px, ${knobY}px)`;
            
            joyX = knobX / 40; 
            joyY = knobY / 40;
        }

        jumpBtn.addEventListener('touchstart', (e) => { e.preventDefault(); if (isGrounded) { velocityY = jumpStrength; isGrounded = false; }});

        window.addEventListener('pointerdown', (e) => { 
            if (e.target.closest('button') || e.target.closest('.item-card') || e.target.closest('#settings-panel') || e.target.closest('#chat-container') || e.target.closest('#mobile-controls') || e.target.closest('#blockly-container') || isDraggingGizmo) return;
            
            if (isPlayMode && !isTouchDevice && !document.pointerLockElement) {
                document.body.requestPointerLock();
                return;
            }

            mouse.x = (e.clientX / window.innerWidth) * 2 - 1; mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(objects);
            if (!isPlayMode && currentTool === 'drag' && intersects.length > 0 && intersects[0].object !== floor) {
                gizmo.attach(intersects[0].object); document.getElementById('part-settings').style.display = 'block';
            } else { isDraggingCam = true; prevMouse = { x: e.clientX, y: e.clientY }; dragDistance = 0; }
        });
        
        window.addEventListener('pointermove', (e) => {
            if (isPlayMode && document.pointerLockElement === document.body) {
                camera.rotation.y -= e.movementX * 0.002;
                camera.rotation.x -= e.movementY * 0.002;
                camera.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, camera.rotation.x));
                return;
            }
            if (isDraggingGizmo || !isDraggingCam) return;
            const dx = e.clientX - prevMouse.x; const dy = e.clientY - prevMouse.y;
            dragDistance += Math.abs(dx) + Math.abs(dy);
            camera.rotation.y -= dx * 0.003; camera.rotation.x -= dy * 0.003;
            camera.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, camera.rotation.x));
            prevMouse = { x: e.clientX, y: e.clientY };
        });

        // ADDED: FINISHED POINTERUP LISTENER
        window.addEventListener('pointerup', (e) => {
            isDraggingCam = false;
            if (dragDistance > 5 || isDraggingGizmo || isPlayMode || e.target.closest('button') || e.target.closest('.item-card') || e.target.closest('#settings-panel') || e.target.closest('#chat-container') || e.target.closest('#mobile-controls') || e.target.closest('#blockly-container')) return;

            mouse.x = (e.clientX / window.innerWidth) * 2 - 1; mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(objects);

            if (intersects.length > 0) {
                if (currentTool === 'place') {
                    const mat = selectedItemType === 'spawn' ? spawnMat : new THREE.MeshStandardMaterial({ color: 0xcccccc, map: gridToggle.checked ? gridTexture : null });
                    const mesh = new THREE.Mesh(selectedItemType === 'spawn' ? spawnGeo : blockGeo, mat);
                    mesh.position.copy(intersects[0].point).add(intersects[0].face.normal.multiplyScalar(0.5));
                    mesh.position.round(); 
                    scene.add(mesh);
                    objects.push(mesh);
                    if (selectedItemType === 'spawn') {
                        if (spawnPoint) scene.remove(spawnPoint);
                        spawnPoint = mesh;
                    }
                } else if (currentTool === 'delete' && intersects[0].object !== floor) {
                    scene.remove(intersects[0].object);
                    objects.splice(objects.indexOf(intersects[0].object), 1);
                    if (intersects[0].object === spawnPoint) spawnPoint = null;
                }
            }
        });

        // ADDED: MISSING ANIMATION LOOP
        function animate() {
            requestAnimationFrame(animate);
            const dt = clock.getDelta();

            if (!isPlayMode) {
                // Editor Movement (Flying)
                const flySpeed = 10 * dt;
                const dir = new THREE.Vector3();
                camera.getWorldDirection(dir);
                const side = new THREE.Vector3().crossVectors(camera.up, dir).normalize();
                
                if (keys['KeyW']) camera.position.addScaledVector(dir, flySpeed);
                if (keys['KeyS']) camera.position.addScaledVector(dir, -flySpeed);
                if (keys['KeyA']) camera.position.addScaledVector(side, -flySpeed);
                if (keys['KeyD']) camera.position.addScaledVector(side, flySpeed);
                if (keys['Space']) camera.position.y += flySpeed;
                if (keys['ShiftLeft']) camera.position.y -= flySpeed;
            } else {
                // Playtest Movement (Walking + Gravity)
                const moveSpeed = (baseSpeed / 60) * 10;
                const grav = (baseGravity / 60) * 10;
                
                const dir = new THREE.Vector3();
                camera.getWorldDirection(dir);
                dir.y = 0; dir.normalize();
                const side = new THREE.Vector3().crossVectors(camera.up, dir).normalize();

                if (keys['KeyW']) camera.position.addScaledVector(dir, moveSpeed);
                if (keys['KeyS']) camera.position.addScaledVector(dir, -moveSpeed);
                if (keys['KeyA']) camera.position.addScaledVector(side, -moveSpeed);
                if (keys['KeyD']) camera.position.addScaledVector(side, moveSpeed);

                velocityY -= grav;
                camera.position.y += velocityY;
                if (camera.position.y <= playerHeight) {
                    camera.position.y = playerHeight;
                    velocityY = 0;
                    isGrounded = true;
                }
                if (keys['Space'] && isGrounded) {
                    velocityY = jumpStrength / 60 * 10;
                    isGrounded = false;
                }
            }

            document.getElementById('coords').innerText = `POS - X: ${Math.round(camera.position.x)} | Y: ${Math.round(camera.position.y)} | Z: ${Math.round(camera.position.z)}`;
            
            if (isPlayMode && Math.random() < 0.1) {
                channel.send({ type: 'broadcast', event: 'move', payload: { id: currentUser, x: camera.position.x, y: camera.position.y, z: camera.position.z } });
            }

            renderer.render(scene, camera);
        }
        animate();

    </script>
</body>
</html>
