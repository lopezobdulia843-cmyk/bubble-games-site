<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bubble Games - Editor & Play</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: 'Segoe UI', sans-serif; touch-action: none; color: white; }
        .controls { position: absolute; z-index: 10; display: flex; gap: 10px; }
        #top-bar { top: 20px; right: 20px; flex-direction: column; align-items: flex-end; }
        
        #settings-panel { 
            position: absolute; top: 100px; left: 20px; 
            background: rgba(0,0,0,0.85); padding: 15px; border-radius: 12px; 
            border: 1px solid #00d4ff; width: 180px; z-index: 50;
            backdrop-filter: blur(10px);
        }
        .setting-group { margin-bottom: 15px; }
        .setting-group label { display: block; font-size: 11px; text-transform: uppercase; color: #00d4ff; margin-bottom: 5px; letter-spacing: 1px; }
        input[type="range"] { width: 100%; cursor: pointer; accent-color: #00d4ff; }

        button { 
            width: 140px; height: 45px; font-size: 13px; font-weight: bold;
            background: rgba(0, 212, 255, 0.1); color: white;
            border: 1px solid #00d4ff; border-radius: 8px; cursor: pointer;
            backdrop-filter: blur(5px); transition: 0.2s;
            display: flex; align-items: center; justify-content: center;
        }
        button:hover { background: rgba(0, 212, 255, 0.2); transform: scale(1.02); }
        
        #publishBtn { background: #00d4ff; color: #000; }
        #playTestBtn { background: #2ecc71; color: #000; border-color: #2ecc71; }
        #playTestBtn.playing { background: #e74c3c; color: white; border-color: #e74c3c; }

        .active-tool { background: #00d4ff !important; color: #000 !important; box-shadow: 0 0 15px rgba(0, 212, 255, 0.5); }
        #deleteModeBtn.active-tool { background: #ff3232 !important; border-color: #ff3232 !important; color: white !important; }

        #item-selector { 
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 15px; background: rgba(0,0,0,0.8); padding: 12px;
            border-radius: 18px; border: 1px solid #333; z-index: 20;
        }
        .item-card {
            width: 65px; height: 65px; border-radius: 10px; border: 2px solid #444;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; background: #111; transition: 0.2s;
        }
        .item-card:hover { border-color: #00d4ff; background: #1a1a1a; }
        .item-card.selected { border-color: #00d4ff; background: rgba(0, 212, 255, 0.15); }
        .item-icon { width: 28px; height: 28px; margin-bottom: 5px; border-radius: 4px; }
        .icon-block { background: #888; border: 1px solid #aaa; }
        .icon-spawn { background: #00ffff; box-shadow: 0 0 8px #00ffff; }
        .item-label { font-size: 9px; color: #ccc; text-transform: uppercase; font-weight: bold; }

        #info { position: absolute; top: 15px; left: 15px; pointer-events: none; }
        #coords { font-family: 'Courier New', monospace; color: #00d4ff; font-size: 12px; margin-top: 5px; background: rgba(0,0,0,0.4); padding: 4px 8px; border-radius: 4px; }
        #crosshair { 
            position: absolute; top: 50%; left: 50%; width: 6px; height: 6px; 
            border: 2px solid rgba(255,255,255,0.8); border-radius: 50%; transform: translate(-50%, -50%); 
            display: none; pointer-events: none; 
        }
        #loading-overlay { position: fixed; inset: 0; background: #050505; z-index: 100; display: flex; align-items: center; justify-content: center; color: #00d4ff; font-weight: bold; letter-spacing: 2px; }

        .player-label {
            position: absolute; background: rgba(0,0,0,0.7); color: #00d4ff;
            padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: bold;
            border: 1px solid rgba(0,212,255,0.3); pointer-events: none; white-space: nowrap;
            transform: translate(-50%, -100%); z-index: 5;
        }
    </style>
</head>
<body>
    <div id="loading-overlay">BUBBLE ENGINE INITIALIZING...</div>

    <div id="info">
        <h2 id="gameNameDisplay" style="margin:0; color:#00d4ff; letter-spacing: 1px;">BUBBLE GAMES</h2>
        <p id="status" style="margin: 2px 0; font-size: 12px; color: #888;">Status: LOADING...</p>
        <div id="coords">POS - X: 0 | Y: 0 | Z: 0</div>
    </div>

    <div id="settings-panel" style="display:none;">
        <div class="setting-group">
            <label>Move Speed</label>
            <input type="range" id="speed-slider" min="0.05" max="0.3" step="0.01" value="0.12">
        </div>
        <div class="setting-group">
            <label>Gravity</label>
            <input type="range" id="gravity-slider" min="0.005" max="0.02" step="0.001" value="0.012">
        </div>
        <div id="part-settings" style="display:none; border-top: 1px solid #333; padding-top: 10px;">
            <label>Part Scale</label>
            <input type="range" id="size-slider" min="0.5" max="10" step="0.1" value="1">
        </div>
    </div>

    <div id="item-selector" style="display:none;">
        <div class="item-card selected" onclick="selectItem('block')" id="card-block">
            <div class="item-icon icon-block"></div>
            <div class="item-label">Block</div>
        </div>
        <div class="item-card" onclick="selectItem('spawn')" id="card-spawn">
            <div class="item-icon icon-spawn"></div>
            <div class="item-label">Spawn</div>
        </div>
    </div>

    <div id="top-bar" class="controls">
        <button id="playTestBtn" onclick="togglePlayTest()">PLAY TEST ▶</button>
        <button id="publishBtn" onclick="publishGame()" style="display:none;">PUBLISH 🚀</button>
        <button id="dragModeBtn" onclick="toggleTool('drag')" style="display:none;">DRAG PART</button>
        <button id="deleteModeBtn" onclick="toggleTool('delete')" style="display:none;">DELETE</button>
        <button onclick="exitGame()">EXIT</button>
    </div>
    <div id="crosshair"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="importmap">
    { 
        "imports": { 
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        } 
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { TransformControls } from 'three/addons/controls/TransformControls.js';

        const SUPABASE_URL = 'https://sideqpofgknyfagrjnke.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_ULjlm97u7-dg8ekTPU84aA_rA1CtUnH';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = "Guest_" + Math.floor(Math.random() * 9999);
        async function getCreator() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (user) currentUser = user.email.split('@')[0];
        }
        getCreator();

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050507);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1.0));
        const sun = new THREE.DirectionalLight(0x00d4ff, 0.5);
        sun.position.set(5, 10, 7);
        scene.add(sun);

        const grid = new THREE.GridHelper(200, 100, 0x111111, 0x111111);
        scene.add(grid);

        const floor = new THREE.Mesh(new THREE.PlaneGeometry(500, 500), new THREE.MeshBasicMaterial({ visible: false }));
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        const objects = [floor]; 
        const blockGeo = new THREE.BoxGeometry(1, 1, 1);
        const spawnGeo = new THREE.BoxGeometry(1.2, 0.2, 1.2);
        const spawnMat = new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x00ffff, emissiveIntensity: 1.5, transparent: true, opacity: 0.8 });
        
        const raycaster = new THREE.Raycaster();
        const downRay = new THREE.Raycaster(); 
        const wallRay = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        const gizmo = new TransformControls(camera, renderer.domElement);
        gizmo.setMode('translate');
        gizmo.setSize(0.8); 
        scene.add(gizmo);

        let remotePlayers = {};
        const gameId = localStorage.getItem('currentGameId') || 'lobby';
        const channel = supabaseClient.channel(`room_${gameId}`, { config: { presence: { key: currentUser } } });

        channel.on('presence', { event: 'leave' }, ({ leftPresences }) => {
            leftPresences.forEach(p => {
                if (remotePlayers[p.key]) {
                    scene.remove(remotePlayers[p.key].mesh);
                    remotePlayers[p.key].label.remove();
                    delete remotePlayers[p.key];
                }
            });
        });

        channel.on('broadcast', { event: 'move' }, ({ payload }) => {
            if (payload.id === currentUser) return;
            if (!remotePlayers[payload.id]) {
                const mesh = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.6, 0.8), new THREE.MeshStandardMaterial({ color: 0x00d4ff }));
                scene.add(mesh);
                const label = document.createElement('div');
                label.className = 'player-label';
                label.innerText = payload.id;
                document.body.appendChild(label);
                remotePlayers[payload.id] = { mesh, label };
            }
            remotePlayers[payload.id].mesh.position.set(payload.x, payload.y - 0.8, payload.z);
        }).subscribe();

        let isDraggingGizmo = false;
        gizmo.addEventListener('dragging-changed', (e) => { isDraggingGizmo = e.value; });

        let isPlayMode = false; 
        let currentTool = 'place'; 
        let selectedItemType = 'block'; 
        let moveSpeed = 0.12;
        let worldGravity = 0.012;
        let velocityY = 0;
        let isGrounded = false;
        let spawnPoint = null;
        let editorCamPos = new THREE.Vector3();
        let editorCamRot = new THREE.Euler();
        const playerHeight = 1.7; 
        const jumpStrength = 0.22;

        document.getElementById('speed-slider').oninput = (e) => moveSpeed = parseFloat(e.target.value);
        document.getElementById('gravity-slider').oninput = (e) => worldGravity = parseFloat(e.target.value);
        document.getElementById('size-slider').oninput = (e) => {
            if (gizmo.object) {
                const s = parseFloat(e.target.value);
                gizmo.object.scale.set(s, s, s);
            }
        };

        window.togglePlayTest = () => {
            isPlayMode = !isPlayMode;
            const btn = document.getElementById('playTestBtn');
            if (isPlayMode) {
                if (!spawnPoint) { alert("Place a Spawn Point first!"); isPlayMode = false; return; }
                editorCamPos.copy(camera.position);
                editorCamRot.copy(camera.rotation);
                btn.innerText = "STOP TEST ⏹"; btn.classList.add('playing');
                document.getElementById('status').innerText = "Status: PLAY TESTING";
                document.getElementById('crosshair').style.display = 'block';
                ['publishBtn', 'dragModeBtn', 'deleteModeBtn', 'item-selector', 'settings-panel'].forEach(id => document.getElementById(id).style.display = 'none');
                gizmo.detach();
                camera.position.set(spawnPoint.position.x, spawnPoint.position.y + 2, spawnPoint.position.z);
                velocityY = 0;
            } else {
                btn.innerText = "PLAY TEST ▶"; btn.classList.remove('playing');
                document.getElementById('status').innerText = "Status: BUILDING MODE";
                document.getElementById('crosshair').style.display = 'none';
                ['publishBtn', 'dragModeBtn', 'deleteModeBtn', 'item-selector', 'settings-panel'].forEach(id => document.getElementById(id).style.display = 'flex');
                camera.position.copy(editorCamPos); camera.rotation.copy(editorCamRot);
            }
        };

        window.selectItem = (type) => {
            selectedItemType = type; currentTool = 'place'; gizmo.detach();
            document.querySelectorAll('.item-card').forEach(c => c.classList.remove('selected'));
            document.getElementById(`card-${type}`).classList.add('selected');
        };

        window.toggleTool = (tool) => {
            currentTool = (currentTool === tool) ? 'place' : tool;
            if (currentTool !== 'drag') gizmo.detach();
            document.getElementById('deleteModeBtn').classList.toggle('active-tool', currentTool === 'delete');
            document.getElementById('dragModeBtn').classList.toggle('active-tool', currentTool === 'drag');
        };

        window.publishGame = async () => {
            if (!spawnPoint) { alert("Missing Spawn Point!"); return; }
            const blocksData = objects.filter(o => o !== floor).map(o => ({ 
                x: o.position.x, y: o.position.y, z: o.position.z, 
                sx: o.scale.x, sy: o.scale.y, sz: o.scale.z,
                type: (o === spawnPoint) ? 'spawn' : 'block' 
            }));
            const config = { gravity: worldGravity, speed: moveSpeed };
            const editId = localStorage.getItem('currentGameId');
            try {
                if (localStorage.getItem('editMode') === 'true' && editId) {
                    await supabaseClient.from('games').update({ blocks: blocksData, config }).eq('id', editId);
                    alert("Game Updated!");
                } else {
                    const name = prompt("Game Name:"); if (!name) return;
                    await supabaseClient.from('games').insert([{ name, blocks: blocksData, creator: currentUser, config }]);
                    alert("Published!");
                }
                window.location.href = 'index.html';
            } catch (err) { alert("Save Error: " + err.message); }
        };

        window.exitGame = () => { window.location.href = 'index.html'; };

        async function init() {
            const id = localStorage.getItem('currentGameId');
            const isEdit = localStorage.getItem('editMode') === 'true';
            
            if (isEdit) {
                isPlayMode = false;
                document.getElementById('status').innerText = "Status: BUILDING MODE";
                ['publishBtn', 'dragModeBtn', 'deleteModeBtn', 'item-selector', 'settings-panel'].forEach(id => document.getElementById(id).style.display = 'flex');
            } else {
                isPlayMode = true;
                document.getElementById('status').innerText = "Status: PLAYING";
                document.getElementById('crosshair').style.display = 'block';
                document.getElementById('playTestBtn').style.display = 'none';
            }

            if (id) {
                const { data: game } = await supabaseClient.from('games').select('*').eq('id', id).single();
                if (game && game.blocks) {
                    document.getElementById('gameNameDisplay').innerText = game.name.toUpperCase();
                    game.blocks.forEach(d => {
                        const isSpawn = d.type === 'spawn';
                        const mesh = new THREE.Mesh(isSpawn ? spawnGeo : blockGeo, isSpawn ? spawnMat : new THREE.MeshStandardMaterial({ color: 0x888888 }));
                        mesh.position.set(d.x, d.y, d.z);
                        if (d.sx) mesh.scale.set(d.sx, d.sy || d.sx, d.sz || d.sx);
                        scene.add(mesh); objects.push(mesh);
                        if (isSpawn) spawnPoint = mesh;
                    });
                }
            }
            if (spawnPoint) camera.position.set(spawnPoint.position.x, spawnPoint.position.y + 2, spawnPoint.position.z);
            else camera.position.set(0, 5, 10);
            
            setTimeout(() => document.getElementById('loading-overlay').style.display = 'none', 800);
        }
        init();

        camera.rotation.order = "YXZ";
        let isDraggingCam = false; let prevMouse = { x: 0, y: 0 };
        const keys = {};

        window.addEventListener('pointerdown', (e) => { 
            if (e.target.closest('button') || e.target.closest('.item-card') || e.target.closest('input') || isDraggingGizmo) return;
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1; mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const hits = raycaster.intersectObjects(objects);

            if (!isPlayMode && currentTool === 'drag' && hits.length > 0 && hits[0].object !== floor) {
                gizmo.attach(hits[0].object);
                document.getElementById('part-settings').style.display = 'block';
                document.getElementById('size-slider').value = hits[0].object.scale.x;
            } else {
                isDraggingCam = true; prevMouse = { x: e.clientX, y: e.clientY };
            }
        });

        window.addEventListener('pointermove', (e) => {
            if (!isDraggingCam || isDraggingGizmo) return;
            const dx = e.clientX - prevMouse.x; const dy = e.clientY - prevMouse.y;
            camera.rotation.y -= dx * 0.003; camera.rotation.x -= dy * 0.003;
            camera.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, camera.rotation.x));
            prevMouse = { x: e.clientX, y: e.clientY };
        });

        window.addEventListener('pointerup', (e) => {
            if (isDraggingGizmo) return;
            if (isDraggingCam) { isDraggingCam = false; return; }
            if (isPlayMode || e.target.closest('button') || e.target.closest('input')) return;

            raycaster.setFromCamera(mouse, camera);
            const hits = raycaster.intersectObjects(objects);

            if (hits.length > 0) {
                const hit = hits[0];
                if (currentTool === 'delete' && hit.object !== floor) {
                    if (hit.object === spawnPoint) spawnPoint = null;
                    scene.remove(hit.object); objects.splice(objects.indexOf(hit.object), 1);
                    gizmo.detach();
                } else if (currentTool === 'place') {
                    const isSpawn = selectedItemType === 'spawn';
                    const m = new THREE.Mesh(isSpawn ? spawnGeo : blockGeo, isSpawn ? spawnMat : new THREE.MeshStandardMaterial({ color: 0x888888 }));
                    const pos = hit.object === floor ? new THREE.Vector3(Math.round(hit.point.x), isSpawn ? 0.1 : 0.5, Math.round(hit.point.z)) : hit.object.position.clone().add(hit.face.normal);
                    m.position.copy(pos);
                    scene.add(m); objects.push(m);
                    if (isSpawn) { if(spawnPoint) { scene.remove(spawnPoint); objects.splice(objects.indexOf(spawnPoint), 1); } spawnPoint = m; }
                }
            }
        });

        window.addEventListener('keydown', (e) => keys[e.code] = true);
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        function animate() {
            requestAnimationFrame(animate);
            document.getElementById('coords').innerText = `X: ${camera.position.x.toFixed(1)} | Y: ${camera.position.y.toFixed(1)} | Z: ${camera.position.z.toFixed(1)}`;

            if (isPlayMode) {
                // Gravity & Floor Collision
                downRay.set(camera.position, new THREE.Vector3(0, -1, 0));
                const floorHits = downRay.intersectObjects(objects);
                if (floorHits.length > 0 && floorHits[0].distance <= playerHeight) {
                    if (velocityY < 0) { velocityY = 0; isGrounded = true; camera.position.y = floorHits[0].point.y + playerHeight; }
                } else { isGrounded = false; velocityY -= worldGravity; }
                
                if (keys['Space'] && isGrounded) { velocityY = jumpStrength; isGrounded = false; }
                camera.position.y += velocityY;

                // Move logic
                let dir = new THREE.Vector3();
                if (keys['KeyW']) dir.z -= 1; if (keys['KeyS']) dir.z += 1;
                if (keys['KeyA']) dir.x -= 1; if (keys['KeyD']) dir.x += 1;
                
                if (dir.length() > 0) {
                    dir.applyQuaternion(camera.quaternion); dir.y = 0; dir.normalize();
                    camera.position.addScaledVector(dir, moveSpeed);
                }

                // Respawn
                if (camera.position.y < -20) {
                    camera.position.set(spawnPoint.position.x, spawnPoint.position.y + 2, spawnPoint.position.z);
                    velocityY = 0;
                }

                // Sync Position
                channel.send({ type: 'broadcast', event: 'move', payload: { id: currentUser, x: camera.position.x, y: camera.position.y, z: camera.position.z } });
            } else {
                // Flying Editor Camera
                const fly = moveSpeed * 2;
                if (keys['KeyW']) camera.translateZ(-fly); if (keys['KeyS']) camera.translateZ(fly);
                if (keys['KeyA']) camera.translateX(-fly); if (keys['KeyD']) camera.translateX(fly);
                if (keys['Space']) camera.position.y += fly; if (keys['ShiftLeft']) camera.position.y -= fly;
            }

            // Sync Player Labels
            for (let id in remotePlayers) {
                const p = remotePlayers[id];
                const vector = p.mesh.position.clone().project(camera);
                p.label.style.left = (vector.x * 0.5 + 0.5) * window.innerWidth + 'px';
                p.label.style.top = -(vector.y * 0.5 - 0.5) * window.innerHeight + 'px';
                p.label.style.display = vector.z < 1 ? 'block' : 'none';
            }

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
