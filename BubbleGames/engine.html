<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bubble Games - Pro Editor</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: sans-serif; touch-action: none; color: white; }
        .controls { position: absolute; z-index: 10; display: flex; gap: 10px; }
        #top-bar { top: 20px; right: 20px; flex-direction: column; align-items: flex-end; }
        
        #settings-panel { 
            position: absolute; top: 100px; left: 20px; 
            background: rgba(0,0,0,0.9); padding: 15px; border-radius: 12px; 
            border: 1px solid #00d4ff; width: 220px; z-index: 50;
            backdrop-filter: blur(10px);
        }
        .setting-group { margin-bottom: 15px; }
        .label-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .setting-group label { font-size: 10px; text-transform: uppercase; color: #00d4ff; font-weight: bold; }
        
        .num-input, .text-input {
            background: #111; border: 1px solid #444; color: #00d4ff;
            font-size: 12px; border-radius: 4px; padding: 4px;
        }
        .num-input { width: 50px; text-align: center; }
        .text-input { width: 100%; box-sizing: border-box; }

        input[type="range"] { width: 100%; cursor: pointer; accent-color: #00d4ff; }
        
        #property-editor {
            margin-top: 15px; padding-top: 15px; border-top: 2px solid #333;
            display: none; /* Shown when a part is selected */
        }

        button { 
            width: 140px; height: 50px; font-size: 14px; font-weight: bold;
            background: rgba(0, 212, 255, 0.1); color: white;
            border: 2px solid #00d4ff; border-radius: 10px; cursor: pointer;
            backdrop-filter: blur(5px); margin-bottom: 5px;
            display: flex; align-items: center; justify-content: center; transition: 0.2s;
        }
        
        #publishBtn { background: #00d4ff; color: #000; }
        #playTestBtn { background: #2ecc71; color: #000; border-color: #2ecc71; }
        #playTestBtn.playing { background: #e74c3c; color: white; border-color: #e74c3c; }

        .active-tool { background: #00d4ff !important; color: #000 !important; box-shadow: 0 0 15px #00d4ff; }
        #deleteModeBtn.active-tool { background: #ff3232 !important; border-color: #ff3232 !important; color: white !important; }

        #item-selector { 
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 15px; background: rgba(0,0,0,0.8); padding: 10px;
            border-radius: 15px; border: 2px solid #333; z-index: 20;
        }
        .item-card {
            width: 60px; height: 60px; border-radius: 10px; border: 2px solid #444;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; background: #111; transition: 0.2s;
        }
        .item-card.selected { border-color: #00d4ff; background: rgba(0, 212, 255, 0.2); }

        #info { position: absolute; top: 10px; left: 10px; color: white; pointer-events: none; }
        #coords { font-family: monospace; color: #00d4ff; margin-top: 5px; background: rgba(0,0,0,0.5); padding: 5px; border-radius: 5px; }
        #loading-overlay { position: fixed; inset: 0; background: #050505; z-index: 100; display: flex; align-items: center; justify-content: center; color: #00d4ff; }
    </style>
</head>
<body>
    <div id="loading-overlay">INITIALIZING ENGINE...</div>

    <div id="info">
        <h2 id="gameNameDisplay" style="margin:0; color:#00d4ff;">BUBBLE GAMES</h2>
        <p id="status">Status: LOADING...</p>
        <div id="coords">POS - X: 0 | Y: 0 | Z: 0</div>
    </div>

    <div id="settings-panel" style="display:none;">
        <div class="setting-group">
            <label>World Gravity</label>
            <input type="range" id="gravity-slider" min="0" max="0.1" step="0.001" value="0.015">
        </div>

        <div id="property-editor">
            <h3 style="color:#00d4ff; font-size: 12px; margin-top:0;">PART PROPERTIES</h3>
            
            <div class="setting-group">
                <label>Part Name</label>
                <input type="text" id="part-name" class="text-input" placeholder="Block Name">
            </div>

            <div class="setting-group">
                <label>Color & Grid</label>
                <div style="display:flex; gap:10px; align-items:center;">
                    <input type="color" id="part-color" value="#cccccc">
                    <label style="font-size: 9px;"><input type="checkbox" id="part-grid-toggle" checked> GRID</label>
                </div>
            </div>

            <div class="setting-group">
                <label>Scale</label>
                <input type="range" id="size-slider" min="0.2" max="10" step="0.1" value="1">
            </div>
        </div>
    </div>

    <div id="item-selector" style="display:none;">
        <div class="item-card selected" onclick="selectItem('block')" id="card-block">
            <div style="width:20px; height:20px; background:#ccc;"></div>
            <div style="font-size:10px;">Block</div>
        </div>
        <div class="item-card" onclick="selectItem('spawn')" id="card-spawn">
            <div style="width:20px; height:20px; background:#0ff;"></div>
            <div style="font-size:10px;">Spawn</div>
        </div>
    </div>

    <div id="top-bar" class="controls">
        <button id="playTestBtn" onclick="togglePlayTest()">PLAY TEST ▶</button>
        <button id="publishBtn" onclick="publishGame()" style="display:none;">PUBLISH 🚀</button>
        <button id="dragModeBtn" onclick="toggleTool('drag')" style="display:none;">PROPERTIES / DRAG</button>
        <button id="deleteModeBtn" onclick="toggleTool('delete')" style="display:none;">DELETE</button>
        <button onclick="exitGame()">EXIT</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="importmap">
    { 
        "imports": { 
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        } 
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { TransformControls } from 'three/addons/controls/TransformControls.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0c);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1.2));
        const gridHelper = new THREE.GridHelper(100, 100, 0x00d4ff, 0x222222);
        scene.add(gridHelper);

        // --- GRID TEXTURE GENERATOR ---
        const createGridTexture = (color) => {
            const canvas = document.createElement('canvas');
            canvas.width = 128; canvas.height = 128;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#111'; ctx.fillRect(0,0,128,128);
            ctx.strokeStyle = color; ctx.lineWidth = 8;
            ctx.strokeRect(0,0,128,128);
            const tex = new THREE.CanvasTexture(canvas);
            tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
            return tex;
        };

        const floor = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.MeshBasicMaterial({ visible: false }));
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        const objects = [floor]; 
        const blockGeo = new THREE.BoxGeometry(1, 1, 1);
        const spawnGeo = new THREE.BoxGeometry(0.8, 0.2, 0.8);
        const spawnMat = new THREE.MeshStandardMaterial({ color: 0x00ffff, emissive: 0x00ffff, emissiveIntensity: 2 });
        
        const gizmo = new TransformControls(camera, renderer.domElement);
        scene.add(gizmo);

        let isPlayMode = false; 
        let currentTool = 'place';
        let selectedItemType = 'block';
        let spawnPoint = null;
        let selectedObject = null;

        // --- PROPERTY UI ELEMENTS ---
        const propEditor = document.getElementById('property-editor');
        const partNameInp = document.getElementById('part-name');
        const partColorInp = document.getElementById('part-color');
        const partGridInp = document.getElementById('part-grid-toggle');
        const sizeSlider = document.getElementById('size-slider');

        // Apply changes in real-time
        const updateSelectedPart = () => {
            if (!selectedObject) return;
            selectedObject.userData.name = partNameInp.value;
            selectedObject.userData.color = partColorInp.value;
            selectedObject.userData.useGrid = partGridInp.checked;
            
            if (selectedObject !== spawnPoint) {
                selectedObject.material.color.set(partColorInp.value);
                selectedObject.material.map = partGridInp.checked ? createGridTexture(partColorInp.value) : null;
                selectedObject.material.needsUpdate = true;
            }
            const s = parseFloat(sizeSlider.value);
            selectedObject.scale.set(s,s,s);
        };

        [partNameInp, partColorInp, partGridInp, sizeSlider].forEach(el => {
            el.addEventListener('input', updateSelectedPart);
        });

        window.toggleTool = (tool) => {
            currentTool = (currentTool === tool) ? 'place' : tool;
            if (currentTool !== 'drag') { 
                gizmo.detach(); 
                propEditor.style.display = 'none'; 
                selectedObject = null;
            }
            document.getElementById('deleteModeBtn').classList.toggle('active-tool', currentTool === 'delete');
            document.getElementById('dragModeBtn').classList.toggle('active-tool', currentTool === 'drag');
        };

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('pointerdown', (e) => {
            if (e.target.closest('button') || e.target.closest('#settings-panel') || gizmo.dragging) return;
            
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            
            const intersects = raycaster.intersectObjects(objects);
            if (intersects.length > 0) {
                const hit = intersects[0];
                
                if (!isPlayMode && currentTool === 'drag' && hit.object !== floor) {
                    selectedObject = hit.object;
                    gizmo.attach(selectedObject);
                    propEditor.style.display = 'block';
                    
                    // Load properties into UI
                    partNameInp.value = selectedObject.userData.name || "Block";
                    partColorInp.value = selectedObject.userData.color || "#cccccc";
                    partGridInp.checked = selectedObject.userData.useGrid !== false;
                    sizeSlider.value = selectedObject.scale.x;
                } else if (!isPlayMode && currentTool === 'place') {
                    placeBlock(hit);
                } else if (!isPlayMode && currentTool === 'delete' && hit.object !== floor) {
                    if (hit.object === spawnPoint) spawnPoint = null;
                    scene.remove(hit.object);
                    objects.splice(objects.indexOf(hit.object), 1);
                    gizmo.detach();
                    propEditor.style.display = 'none';
                }
            }
        });

        function placeBlock(hit) {
            const isSpawn = selectedItemType === 'spawn';
            const color = isSpawn ? "#00ffff" : "#cccccc";
            const mat = isSpawn ? spawnMat : new THREE.MeshStandardMaterial({ 
                color: color, 
                map: createGridTexture(color) 
            });
            
            const m = new THREE.Mesh(isSpawn ? spawnGeo : blockGeo, mat);
            const pos = hit.object === floor ? 
                new THREE.Vector3(Math.round(hit.point.x), isSpawn ? 0.1 : 0.5, Math.round(hit.point.z)) : 
                hit.object.position.clone().add(hit.face.normal.multiplyScalar(isSpawn ? 0.6 : 1));
            
            m.position.copy(pos);
            m.userData = { name: isSpawn ? "Spawn" : "Block", color: color, useGrid: true, type: selectedItemType };
            
            scene.add(m);
            objects.push(m);
            if (isSpawn) { 
                if(spawnPoint) { scene.remove(spawnPoint); objects.splice(objects.indexOf(spawnPoint), 1); }
                spawnPoint = m; 
            }
        }

        window.publishGame = async () => {
            const blocksData = objects.filter(obj => obj !== floor).map(obj => ({
                x: obj.position.x, y: obj.position.y, z: obj.position.z,
                s: obj.scale.x,
                name: obj.userData.name,
                color: obj.userData.color,
                useGrid: obj.userData.useGrid,
                type: obj.userData.type
            }));
            // Save logic here...
            console.log("Saving full data:", blocksData);
            alert("Game Data Structure Updated & Saved!");
        };

        // --- CAMERA & RENDER LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();

        // Basic camera movement for editor
        window.addEventListener('keydown', (e) => {
            const speed = 0.5;
            if(e.code === 'KeyW') camera.translateZ(-speed);
            if(e.code === 'KeyS') camera.translateZ(speed);
            if(e.code === 'KeyA') camera.translateX(-speed);
            if(e.code === 'KeyD') camera.translateX(speed);
        });

        setTimeout(() => {
            document.getElementById('loading-overlay').style.display = 'none';
            document.getElementById('settings-panel').style.display = 'block';
            document.getElementById('item-selector').style.display = 'flex';
            ['publishBtn', 'dragModeBtn', 'deleteModeBtn'].forEach(id => document.getElementById(id).style.display = 'flex');
        }, 1000);

        window.selectItem = (t) => { selectedItemType = t; };
    </script>
</body>
</html>
