<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Precision Studio | Neural Interface</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030303;
            --surface: #0a0a0a;
            --accent: #00f2ff;
            --accent-dim: rgba(0, 242, 255, 0.1);
            --border: #1a1a1a;
            --text: #ffffff;
            --text-muted: #666666;
            --error: #ff3333;
        }

        body {
            margin: 0; background: var(--bg); color: var(--text);
            font-family: 'Inter', sans-serif; overflow-x: hidden;
        }

        /* --- AUTHENTICATION UI --- */
        #auth-gate {
            display: flex; height: 100vh; align-items: center; justify-content: center;
            background: radial-gradient(circle at center, #0a0a0a 0%, #000 100%);
        }

        .terminal-card {
            background: var(--surface); border: 1px solid var(--border);
            padding: 2.5rem; width: 100%; max-width: 400px;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }

        input {
            width: 100%; padding: 12px; margin: 8px 0; background: #000;
            border: 1px solid var(--border); color: #fff; border-radius: 2px;
            font-family: 'JetBrains Mono', monospace; box-sizing: border-box;
        }

        input:focus { border-color: var(--accent); outline: none; }

        .btn {
            cursor: pointer; border: 1px solid var(--accent); background: var(--accent-dim);
            color: var(--accent); padding: 12px 20px; font-weight: 900;
            text-transform: uppercase; letter-spacing: 1px; transition: 0.2s;
            width: 100%; margin-top: 10px; font-family: 'JetBrains Mono';
        }

        .btn:hover { background: var(--accent); color: #000; }

        /* --- DASHBOARD UI --- */
        nav {
            padding: 1rem 5%; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(3,3,3,0.8); backdrop-filter: blur(10px);
            position: sticky; top: 0; z-index: 10;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }

        .header-flex { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 40px; }

        .grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--surface); border: 1px solid var(--border);
            padding: 20px; position: relative; transition: 0.3s;
        }

        .card:hover { border-color: var(--accent); transform: translateY(-2px); }

        .badge {
            font-size: 10px; font-weight: 900; padding: 4px 8px;
            background: #111; color: var(--accent); border: 1px solid var(--accent);
            text-transform: uppercase;
        }

        .meta { font-family: 'JetBrains Mono'; font-size: 11px; color: var(--text-muted); margin-top: 15px; }

        #engine-view {
            position: fixed; inset: 0; background: #000; z-index: 100;
            display: none; flex-direction: column;
        }

        .status-dot { height: 8px; width: 8px; background: var(--accent); border-radius: 50%; display: inline-block; margin-right: 5px; }
    </style>
</head>
<body>

<!-- AUTH SECTION -->
<div id="auth-gate">
    <div class="terminal-card">
        <h2 style="margin: 0 0 5px 0; font-weight: 900;">SYSTEM_ACCESS</h2>
        <p style="color: var(--text-muted); font-size: 13px; margin-bottom: 25px;">Provide credentials for protocol initialization.</p>
        <input type="email" id="email" placeholder="REGISTRY_EMAIL">
        <input type="password" id="pass" placeholder="SECURITY_TOKEN">
        <button class="btn" onclick="handleAuth('login')">Initialize Session</button>
        <button class="btn" onclick="handleAuth('signup')" style="border-color: #333; color: #666; background: transparent; font-size: 11px;">Create New Identity</button>
        <div id="auth-err" style="color: var(--error); font-size: 11px; margin-top: 15px; text-align: center; font-family: 'JetBrains Mono';"></div>
    </div>
</div>

<!-- APP SECTION -->
<div id="app-gate" style="display: none;">
    <nav>
        <div style="font-weight: 900; letter-spacing: 2px;">PRECISION_<span style="color: var(--accent);">STUDIO</span></div>
        <div style="display: flex; gap: 20px; align-items: center; font-size: 12px; font-family: 'JetBrains Mono';">
            <span id="user-display" style="color: var(--accent);"></span>
            <button onclick="signOut()" style="background: none; border: none; color: var(--error); cursor: pointer; font-weight: 900;">DISCONNECT</button>
        </div>
    </nav>

    <div class="container">
        <div class="header-flex">
            <div>
                <h1 style="margin: 0; font-size: 48px; font-weight: 900; letter-spacing: -2px;">Repository</h1>
                <p style="color: var(--text-muted); margin: 5px 0 0 0;">Managing active computational deployments.</p>
            </div>
            <button class="btn" onclick="createProject()" style="width: auto; padding: 12px 30px;">+ New Deployment</button>
        </div>

        <div id="project-grid" class="grid">
            <!-- Dynamic Injection -->
        </div>
    </div>
</div>

<!-- ENGINE VIEW (FULLSCREEN) -->
<div id="engine-view">
    <div style="padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between;">
        <div id="engine-title" style="font-weight: 900; font-family: 'JetBrains Mono';"></div>
        <button class="btn" onclick="closeEngine()" style="width: auto; margin: 0; padding: 5px 15px; border-color: var(--error); color: var(--error); background: transparent;">CLOSE_STREAM</button>
    </div>
    <div style="flex: 1; display: flex; align-items: center; justify-content: center; font-family: 'JetBrains Mono'; color: #111;">
        <div style="text-align: center;">
            <h1 style="font-size: 8vw; margin: 0;">LIVE_FEED</h1>
            <p>STREAMING DATA FROM PROJECT_CORE...</p>
        </div>
    </div>
</div>

<script>
    // --- CONFIGURATION ---
    const CONFIG = {
        SB_URL: "YOUR_SUPABASE_URL",
        SB_KEY: "YOUR_SUPABASE_ANON_KEY"
    };

    const supabase = window.supabase.createClient(CONFIG.SB_URL, CONFIG.SB_KEY);
    let sessionUser = null;

    // --- AUTH LOGIC ---
    async function handleAuth(type) {
        const email = document.getElementById('email').value;
        const password = document.getElementById('pass').value;
        const errDisplay = document.getElementById('auth-err');
        
        const { data, error } = type === 'login' 
            ? await supabase.auth.signInWithPassword({ email, password })
            : await supabase.auth.signUp({ email, password, options: { data: { handle: email.split('@')[0] } } });

        if (error) errDisplay.innerText = error.message.toUpperCase();
    }

    async function signOut() {
        await supabase.auth.signOut();
        location.reload();
    }

    // --- INITIALIZATION ---
    supabase.auth.onAuthStateChange((event, session) => {
        sessionUser = session?.user || null;
        document.getElementById('auth-gate').style.display = sessionUser ? 'none' : 'flex';
        document.getElementById('app-gate').style.display = sessionUser ? 'block' : 'none';
        
        if (sessionUser) {
            document.getElementById('user-display').innerText = `ID: ${sessionUser.user_metadata.handle || 'ANON'}`;
            fetchProjects();
            
            // Realtime Subscription
            supabase.channel('schema-db-changes')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'projects' }, () => fetchProjects())
                .subscribe();
        }
    });

    // --- CORE DATA FUNCTIONS ---
    async function fetchProjects() {
        const { data, error } = await supabase
            .from('projects')
            .select('*')
            .order('created_at', { ascending: false });

        if (error) return console.error(error);
        
        const grid = document.getElementById('project-grid');
        grid.innerHTML = data.length === 0 ? '<p style="color: #333; font-family: JetBrains Mono;">No active projects in sector.</p>' : '';
        
        data.forEach(p => {
            const isOwner = p.creator_id === sessionUser.id;
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `
                <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                    <span class="badge">${p.is_public ? 'Global' : 'Internal'}</span>
                    <div class="status-dot"></div>
                </div>
                <h3 style="margin: 15px 0 5px 0; font-size: 22px;">${p.title}</h3>
                <p style="color: var(--text-muted); font-size: 13px; margin: 0;">Unit: ${p.creator_handle}</p>
                <div class="meta">REF_ID: ${p.id.substring(0,8)}</div>
                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button class="btn" style="margin:0;" onclick="launchEngine('${p.title}')">Launch</button>
                    ${isOwner ? `<button class="btn" style="margin:0; border-color: #333; color: #333; background: transparent;" onclick="deleteProject('${p.id}')">Delete</button>` : ''}
                </div>
            `;
            grid.appendChild(div);
        });
    }

    async function createProject() {
        const title = prompt("ENTER PROJECT DESIGNATION:");
        if (!title) return;
        const isPublic = confirm("BROADCAST TO GLOBAL REGISTRY?");

        const { error } = await supabase.from('projects').insert([{
            title,
            is_public: isPublic,
            creator_id: sessionUser.id,
            creator_handle: sessionUser.user_metadata.handle || 'ANON'
        }]);

        if (error) alert(error.message);
    }

    async function deleteProject(id) {
        if (confirm("EXECUTE DELETION PROTOCOL?")) {
            await supabase.from('projects').delete().eq('id', id);
        }
    }

    function launchEngine(title) {
        document.getElementById('engine-title').innerText = `CORE_SESSION: ${title.toUpperCase()}`;
        document.getElementById('engine-view').style.display = 'flex';
    }

    function closeEngine() {
        document.getElementById('engine-view').style.display = 'none';
    }
</script>
</body>
</html>
