<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bubble Games - Arcade</title>
    <style>
        :root {
            --neon-blue: #00d4ff;
            --neon-pink: #ff007f;
            --bg-dark: #050505;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            background-image: 
                linear-gradient(rgba(0, 212, 255, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 212, 255, 0.1) 1px, transparent 1px);
            background-size: 30px 30px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            overflow-x: hidden;
        }

        /* High-Energy Title Animation */
        header {
            text-align: center;
            padding: 50px 20px 20px;
        }

        h1 {
            font-size: 4rem;
            margin: 0;
            text-transform: uppercase;
            color: white;
            text-shadow: 
                0 0 5px #fff,
                0 0 10px #fff,
                0 0 20px var(--neon-blue),
                0 0 40px var(--neon-blue),
                0 0 80px var(--neon-blue);
            animation: pulsate 1.5s infinite alternate;
        }

        @keyframes pulsate {
            100% {
                text-shadow: 
                    0 0 4px #fff,
                    0 0 11px #fff,
                    0 0 19px var(--neon-blue),
                    0 0 40px var(--neon-pink),
                    0 0 80px var(--neon-pink);
            }
        }

        p.subtitle {
            color: var(--neon-blue);
            font-weight: bold;
            letter-spacing: 2px;
            margin-top: 10px;
        }

        /* Controls / Actions */
        .action-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 30px 0;
        }

        button {
            background: rgba(0, 0, 0, 0.6);
            color: var(--neon-blue);
            border: 2px solid var(--neon-blue);
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            text-transform: uppercase;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.2);
        }

        button:hover {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 25px var(--neon-blue);
            transform: translateY(-2px);
        }

        button.primary {
            border-color: var(--neon-pink);
            color: var(--neon-pink);
            box-shadow: 0 0 10px rgba(255, 0, 127, 0.2);
        }

        button.primary:hover {
            background: var(--neon-pink);
            color: white;
            box-shadow: 0 0 25px var(--neon-pink);
        }

        /* Game Grid */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        #games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .game-card {
            background: rgba(20, 20, 20, 0.8);
            border: 1px solid #333;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            transition: 0.3s;
            backdrop-filter: blur(5px);
        }

        .game-card:hover {
            border-color: var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.4);
            transform: scale(1.02);
        }

        .game-title {
            font-size: 1.5rem;
            color: var(--neon-blue);
            margin: 0 0 10px 0;
            text-transform: uppercase;
        }

        .game-creator {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 15px;
        }

        .card-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .card-buttons button {
            padding: 8px 15px;
            font-size: 0.9rem;
            flex: 1;
        }

        #loading {
            text-align: center;
            color: var(--neon-blue);
            font-size: 1.5rem;
            animation: pulse 1s infinite;
        }
    </style>
</head>
<body>

    <header>
        <h1>Bubble Games</h1>
        <p class="subtitle">SELECT YOUR LEVEL</p>
    </header>

    <div class="action-bar">
        <button class="primary" onclick="createNewGame()">+ Create New Game</button>
        <button onclick="refreshGames()">Refresh List</button>
    </div>

    <div class="container">
        <div id="loading">CONNECTING TO SERVER...</div>
        <div id="games-grid"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Use the exact same Supabase credentials from your engine script
        const SUPABASE_URL = window.location.origin + '/supabase'; // Or your actual URL if testing locally
        const SUPABASE_KEY = 'sb_publishable_ULjlm97u7-dg8ekTPU84aA_rA1CtUnH';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const gamesGrid = document.getElementById('games-grid');
        const loadingText = document.getElementById('loading');

        // Engine File Name - IMPORTANT: Make sure this matches your actual 3D engine HTML file!
        const ENGINE_FILE = 'engine.html'; 

        // Fetch games from Supabase
        async function fetchGames() {
            gamesGrid.innerHTML = '';
            loadingText.style.display = 'block';

            try {
                const { data: games, error } = await supabaseClient
                    .from('games')
                    .select('id, name, creator')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                loadingText.style.display = 'none';

                if (games.length === 0) {
                    gamesGrid.innerHTML = '<p style="text-align:center; width:100%; color:#888;">No games found. Be the first to create one!</p>';
                    return;
                }

                games.forEach(game => {
                    const card = document.createElement('div');
                    card.className = 'game-card';
                    card.innerHTML = `
                        <h3 class="game-title">${game.name}</h3>
                        <p class="game-creator">By: ${game.creator || 'Unknown'}</p>
                        <div class="card-buttons">
                            <button onclick="playGame('${game.id}')">PLAY ▶</button>
                            <button onclick="editGame('${game.id}')">EDIT 🛠</button>
                        </div>
                    `;
                    gamesGrid.appendChild(card);
                });

            } catch (err) {
                console.error("Error fetching games:", err);
                loadingText.innerText = "❌ DATABASE ERROR. Check console.";
            }
        }

        // Logic to transition to the engine
        window.createNewGame = () => {
            localStorage.removeItem('currentGameId');
            localStorage.setItem('editMode', 'true');
            window.location.href = ENGINE_FILE;
        };

        window.playGame = (id) => {
            localStorage.setItem('currentGameId', id);
            localStorage.setItem('editMode', 'false');
            window.location.href = ENGINE_FILE;
        };

        window.editGame = (id) => {
            localStorage.setItem('currentGameId', id);
            localStorage.setItem('editMode', 'true');
            window.location.href = ENGINE_FILE;
        };

        window.refreshGames = () => {
            fetchGames();
        };

        // Initialize
        fetchGames();
    </script>
</body>
</html>
