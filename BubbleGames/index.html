<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bubble Games | Pop Into Play!</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');

        :root { 
            --primary: #00d4ff; 
            --secondary: #ff00c8;
            --bg: #050508; 
            --card: #121218; 
            --danger: #ff4444; 
            --edit: #ffcc00; 
            --success: #00ff88; 
            --owner: #ffcf40;
            --glass: rgba(255, 255, 255, 0.05);
            --bubble-gradient: linear-gradient(135deg, #00d4ff 0%, #ff00c8 100%);
        }

        body { 
            margin: 0; background: var(--bg); color: white; font-family: 'Outfit', sans-serif; 
            text-align: center; overflow-x: hidden;
            background-image: radial-gradient(circle at 10% 20%, rgba(0, 212, 255, 0.05) 0%, transparent 40%),
                              radial-gradient(circle at 90% 80%, rgba(255, 0, 200, 0.05) 0%, transparent 40%);
        }

        #loadingState { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--bg); display: flex; flex-direction: column; align-items: center; 
            justify-content: center; z-index: 1000; font-weight: 900; color: var(--primary);
        }

        nav { 
            padding: 15px 40px; display: flex; justify-content: space-between; align-items: center; 
            background: rgba(10, 10, 12, 0.8); backdrop-filter: blur(15px); 
            position: sticky; top: 0; z-index: 100; border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo { 
            font-size: 28px; font-weight: 900; background: var(--bubble-gradient);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-transform: uppercase; letter-spacing: -1px;
        }

        .container { padding: 40px 20px; max-width: 1200px; margin: auto; }

        /* Auth/Login Box */
        #authContainer { 
            background: var(--card); padding: 50px; border-radius: 35px; 
            border: 2px solid rgba(255, 255, 255, 0.05); display: inline-block; 
            margin-top: 80px; box-shadow: 0 30px 60px rgba(0,0,0,0.8);
        }

        input { 
            display: block; margin: 15px auto; padding: 16px; width: 300px; 
            border-radius: 15px; border: 2px solid #222; background: #000; 
            color: white; outline: none; transition: 0.3s; font-size: 1rem;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 20px rgba(0, 212, 255, 0.2); }

        .btn-launch { 
            background: var(--bubble-gradient); color: white; padding: 20px 60px; 
            border-radius: 50px; font-weight: 900; font-size: 1.5rem; cursor: pointer; 
            border: none; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            box-shadow: 0 15px 30px rgba(255, 0, 200, 0.3); margin-bottom: 40px;
        }
        .btn-launch:hover { transform: scale(1.05) translateY(-5px); box-shadow: 0 20px 40px rgba(255, 0, 200, 0.5); }

        .section-title { 
            text-align: left; margin: 60px 0 30px; font-size: 1.8rem; font-weight: 900;
            display: flex; align-items: center; gap: 15px; 
        }
        .section-title span { background: var(--glass); padding: 10px; border-radius: 12px; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 30px; }

        /* Game Cards */
        .game-card { 
            background: var(--card); border-radius: 28px; text-align: left; 
            transition: 0.4s; overflow: hidden; border: 1px solid rgba(255,255,255,0.03);
        }
        .game-card:hover { transform: translateY(-8px); border-color: var(--primary); box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
        .card-inner { padding: 25px; }
        
        /* Status Tags - UPDATED TO PUBLIC/PRIVATE */
        .status-tag { 
            float: right; font-size: 11px; padding: 5px 12px; border-radius: 50px; 
            font-weight: 900; text-transform: uppercase; letter-spacing: 1px;
        }
        .status-private { background: #333; color: #aaa; }
        .status-public { background: rgba(0, 255, 136, 0.15); color: var(--success); border: 1px solid var(--success); }

        .creator-label { font-size: 12px; color: var(--primary); font-weight: 900; }
        .game-name { margin: 15px 0 10px; font-size: 1.6rem; font-weight: 900; color: #fff; }

        .action-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 20px; }
        .btn-base { border: none; padding: 14px; border-radius: 16px; cursor: pointer; font-weight: 900; transition: 0.2s; font-size: 12px; }
        
        .btn-play { background: #fff; color: #000; grid-column: span 2; font-size: 18px; margin-bottom: 5px; }
        .btn-play:hover { background: var(--primary); transform: scale(1.02); }
        
        .btn-edit { background: var(--glass); color: var(--edit); border: 1px solid rgba(255,204,0,0.3); }
        .btn-rename { background: var(--glass); color: #00ffcc; border: 1px solid rgba(0,255,204,0.3); }
        .btn-toggle { background: var(--glass); color: #fff; border: 1px solid rgba(255,255,255,0.2); }
        .btn-delete { background: rgba(255,68,68,0.1); color: var(--danger); border: 1px solid rgba(255,68,68,0.3); }
        
        .btn-logout { background: var(--glass); color: #fff; padding: 10px 20px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; }
        .owner-tag { background: var(--owner); color: #000; padding: 2px 8px; border-radius: 6px; font-size: 12px; }
    </style>
</head>

<body>

    <div id="loadingState">SYNCHRONIZING...</div>

    <div id="authContainer" style="display:none;">
        <h1 class="logo" style="font-size: 40px;">Bubble Games</h1>
        <p style="color: #888; margin-bottom: 25px;">Ready to create something epic?</p>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <div id="loginSection">
            <button id="loginBtn" class="btn-base btn-play">LOG IN</button>
            <p style="margin-top: 20px;">New around here? <span id="toSignup" style="color:var(--primary);cursor:pointer;font-weight:900;">Sign Up</span></p>
        </div>
        <div id="signupSection" style="display:none;">
            <button id="signupBtn" class="btn-base btn-play" style="background:var(--success); color:black;">CREATE ACCOUNT</button>
            <p style="margin-top: 20px;">Already have one? <span id="toLogin" style="color:var(--primary);cursor:pointer;font-weight:900;">Login</span></p>
        </div>
        <p id="msg" style="font-size: 14px; color: var(--danger); font-weight: bold;"></p>
    </div>

    <div id="mainApp" style="display:none;">
        <nav>
            <div class="logo">Bubble Games</div>
            <div style="display: flex; align-items: center; gap: 15px;">
                <span id="userDisplay"></span>
                <button id="logoutBtn" class="btn-logout">LOGOUT</button>
            </div>
        </nav>
        <div class="container">
            <header style="margin: 40px 0;">
                <h1 style="font-size: 4rem; font-weight: 900; line-height: 1; margin-bottom: 10px;">Build. Play. <span style="color: var(--primary)">Publish.</span></h1>
                <p style="font-size: 1.2rem; color: #888; margin-bottom: 30px;">Turn your ideas into playable worlds.</p>
                <button id="newGameBtn" class="btn-launch">Create New World 🛠️</button>
            </header>
            
            <h2 class="section-title"><span>📂</span> YOUR STUDIO</h2>
            <div class="grid" id="myGamesGrid"></div>

            <h2 class="section-title"><span>🌎</span> GLOBAL LIBRARY</h2>
            <div class="grid" id="globalGamesGrid"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module">
        const SUPABASE_URL = window.location.origin + '/supabase';
        const SUPABASE_KEY = 'sb_publishable_ULjlm97u7-dg8ekTPU84aA_rA1CtUnH';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const OWNER_EMAIL = "goomba@bubble.com"; 
        let currentUser = "";
        let userRole = "Player";

        async function init() {
            try {
                const { data: { user }, error } = await supabaseClient.auth.getUser();
                if (user && !error) {
                    const { data: profile } = await supabaseClient.from('profiles').select('username, role').eq('id', user.id).single();
                    currentUser = profile ? profile.username : user.email.split('@')[0];
                    userRole = (user.email.toLowerCase() === OWNER_EMAIL.toLowerCase()) ? "Owner" : (profile ? profile.role : "Player");
                    document.getElementById('loadingState').style.display = 'none';
                    showApp();
                } else {
                    document.getElementById('loadingState').style.display = 'none';
                    document.getElementById('authContainer').style.display = 'inline-block';
                }
            } catch (e) { document.getElementById('loadingState').innerText = "Database Error."; }
        }

        async function showApp() {
            document.getElementById('authContainer').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            const isOwner = (userRole === "Owner");
            document.getElementById('userDisplay').innerHTML = isOwner 
                ? `<span class="owner-tag">OWNER</span> ${currentUser.toUpperCase()}` 
                : `<span style="color:var(--primary); font-weight:900;">${currentUser.toUpperCase()}</span>`;
            loadGames(isOwner);
        }

        async function loadGames(isOwner) {
            const myGrid = document.getElementById('myGamesGrid');
            const globalGrid = document.getElementById('globalGamesGrid');
            const { data: games } = await supabaseClient.from('games').select('*');
            if (!games) return;

            myGrid.innerHTML = ''; globalGrid.innerHTML = '';
            games.forEach(game => {
                const isCreator = (game.creator === currentUser);
                const card = createCard(game, isCreator, isOwner);
                if (isCreator) myGrid.appendChild(card);
                else if (game.is_public) globalGrid.appendChild(card);
            });
        }

        function createCard(game, isCreator, isOwner) {
            const card = document.createElement('div');
            card.className = 'game-card';
            const statusClass = game.is_public ? 'status-public' : 'status-private';
            const statusText = game.is_public ? '🌐 Public' : '🔒 Private';
            const hasPower = isCreator || isOwner;

            card.innerHTML = `
                <div class="card-inner">
                    <span class="status-tag ${statusClass}">${statusText}</span>
                    <span class="creator-label">@${game.creator}</span>
                    <h3 class="game-name">${game.name || 'Untitled World'}</h3>
                    <div class="action-row">
                        <button class="btn-base btn-play" onclick="playGame('${game.id}')">▶ PLAY</button>
                        ${hasPower ? `
                            <button class="btn-base btn-edit" onclick="editGame('${game.id}')">✎ Edit</button>
                            <button class="btn-base btn-rename" onclick="renameGame('${game.id}', '${game.name}')">📝 Rename</button>
                            <button class="btn-base btn-toggle" onclick="toggleVisibility('${game.id}', ${game.is_public})">
                                ${game.is_public ? '🔒 Make Private' : '🌐 Make Public'}
                            </button>
                            <button class="btn-base btn-delete" onclick="deleteGame('${game.id}')">✖ Delete</button>
                        ` : ''}
                    </div>
                </div>
            `;
            return card;
        }

        window.renameGame = async (id, oldName) => {
            const newName = prompt("New world name:", oldName);
            if (newName && newName.trim() !== "") {
                await supabaseClient.from('games').update({ name: newName.trim() }).eq('id', id);
                location.reload();
            }
        };

        window.toggleVisibility = async (id, currentStatus) => {
            await supabaseClient.from('games').update({ is_public: !currentStatus }).eq('id', id);
            location.reload();
        };

        window.deleteGame = async (id) => { if(confirm("Delete this world?")) { await supabaseClient.from('games').delete().eq('id', id); location.reload(); }};
        window.playGame = (id) => { localStorage.setItem('currentGameId', id); localStorage.setItem('editMode', 'false'); window.location.href = 'engine.html'; };
        window.editGame = (id) => { localStorage.setItem('currentGameId', id); localStorage.setItem('editMode', 'true'); window.location.href = 'engine.html'; };

        async function handleAuth(mode) {
            const userInput = document.getElementById('username').value.trim();
            const passInput = document.getElementById('password').value;
            if (!userInput || !passInput) return;
            const fakeEmail = `${userInput.toLowerCase()}@bubble.com`;
            const { error } = mode === 'signup' 
                ? await supabaseClient.auth.signUp({email: fakeEmail, password: passInput, options: { data: { username: userInput, role: 'Player' } }}) 
                : await supabaseClient.auth.signInWithPassword({email: fakeEmail, password: passInput});
            if (error) alert(error.message); else location.reload();
        }

        document.getElementById('loginBtn').onclick = () => handleAuth('login');
        document.getElementById('signupBtn').onclick = () => handleAuth('signup');
        document.getElementById('toSignup').onclick = () => { document.getElementById('loginSection').style.display='none'; document.getElementById('signupSection').style.display='block'; };
        document.getElementById('toLogin').onclick = () => { document.getElementById('loginSection').style.display='block'; document.getElementById('signupSection').style.display='none'; };
        document.getElementById('logoutBtn').onclick = async () => { await supabaseClient.auth.signOut(); location.reload(); };
        document.getElementById('newGameBtn').onclick = () => { localStorage.removeItem('currentGameId'); localStorage.setItem('editMode', 'true'); localStorage.setItem('isNewGame', 'true'); window.location.href = 'engine.html'; };

        init();
    </script>
</body>
</html>
