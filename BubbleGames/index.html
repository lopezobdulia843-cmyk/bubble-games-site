<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Portal | Restoration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand: #3ecf8e;
            --brand-glow: rgba(62, 207, 142, 0.2);
        }
        body { 
            font-family: 'Inter', sans-serif; 
            background: #020617; 
            color: #f8fafc;
            background-image: radial-gradient(circle at 0% 0%, #0f172a 0%, #020617 100%);
            min-height: 100vh;
        }
        .glass { 
            background: rgba(15, 23, 42, 0.7); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
        }
        .input-focus:focus {
            border-color: var(--brand);
            box-shadow: 0 0 0 2px var(--brand-glow);
            outline: none;
        }
        .mono { font-family: 'JetBrains Mono', monospace; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="antialiased selection:bg-emerald-500/30">

    <!-- Auth View -->
    <div id="authSection" class="fixed inset-0 z-50 flex items-center justify-center p-6 bg-slate-950">
        <div class="glass w-full max-w-md p-8 rounded-2xl shadow-2xl">
            <div class="text-center mb-10">
                <div class="h-12 w-12 bg-emerald-500/10 rounded-xl flex items-center justify-center mx-auto mb-4 border border-emerald-500/20">
                    <svg class="w-6 h-6 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
                </div>
                <h1 class="text-2xl font-bold tracking-tight">Secure Access</h1>
                <p class="text-slate-400 text-sm mt-1">Identify yourself to access the data stream.</p>
            </div>
            <div class="space-y-4">
                <input type="email" id="email" placeholder="Email Reference" class="glass w-full px-4 py-3 rounded-lg input-focus transition-all text-white">
                <input type="password" id="password" placeholder="Secret Key" class="glass w-full px-4 py-3 rounded-lg input-focus transition-all text-white">
                <button onclick="handleAuth('login')" class="w-full bg-emerald-500 hover:bg-emerald-400 text-slate-950 font-bold py-3 rounded-lg transition-all active:scale-[0.98]">INITIALIZE SESSION</button>
                <button onclick="handleAuth('signup')" class="w-full text-slate-500 hover:text-slate-300 text-xs font-semibold tracking-widest uppercase transition-colors">Register New Node</button>
            </div>
            <p id="authMsg" class="mt-4 text-center text-xs font-mono text-emerald-500 min-h-[1rem]"></p>
        </div>
    </div>

    <!-- Main Workspace -->
    <div id="mainSection" class="hidden opacity-0 transition-opacity duration-500">
        <header class="border-b border-white/5 sticky top-0 bg-slate-950/50 backdrop-blur-xl z-40">
            <div class="max-w-6xl mx-auto px-6 h-20 flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="h-3 w-3 rounded-full bg-emerald-500 animate-pulse shadow-[0_0_10px_#3ecf8e]"></div>
                    <span class="text-lg font-bold tracking-tighter uppercase">Data<span class="text-emerald-500">Entries</span></span>
                </div>
                <div class="flex items-center gap-4">
                    <span id="status" class="text-xs mono text-slate-500 hidden sm:block"></span>
                    <button id="logoutBtn" onclick="supabase.auth.signOut()" class="text-xs bg-slate-800 hover:bg-red-500/20 hover:text-red-400 px-3 py-1.5 rounded-md transition-all border border-white/5">DISCONNECT</button>
                </div>
            </div>
        </header>

        <main class="max-w-6xl mx-auto px-6 py-12">
            <div class="grid lg:grid-cols-12 gap-10">
                <!-- Entry Creation -->
                <aside class="lg:col-span-4">
                    <div class="glass p-6 rounded-2xl sticky top-32">
                        <h2 class="text-xl font-bold mb-6">New Entry</h2>
                        <div class="space-y-4">
                            <input type="text" id="title" placeholder="Entry Title" class="glass w-full px-4 py-3 rounded-lg input-focus transition-all text-white">
                            <textarea id="content" rows="6" placeholder="Content details..." class="glass w-full px-4 py-3 rounded-lg input-focus transition-all resize-none text-white"></textarea>
                            <button onclick="submitEntry()" class="w-full bg-emerald-500 hover:bg-emerald-400 text-slate-950 font-bold py-3 rounded-lg transition-all flex items-center justify-center gap-2 group">
                                SAVE TO CLOUD
                                <svg class="w-4 h-4 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"/></svg>
                            </button>
                        </div>
                    </div>
                </aside>

                <!-- Data Stream -->
                <section class="lg:col-span-8">
                    <div class="flex justify-between items-end mb-8">
                        <div>
                            <h2 class="text-3xl font-black italic tracking-tight uppercase">Data Stream</h2>
                            <p class="text-slate-500 mono text-xs uppercase mt-1">Real-time PostgreSQL Synchronization</p>
                        </div>
                    </div>

                    <div id="listContainer" class="space-y-4">
                        <!-- Dynamic content -->
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script>
        const SB_URL = "https://sideqpofgknyfagrjnke.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNpZGVxcG9mZ2tueWZhZ3JqbmtlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxMTE1MzAsImV4cCI6MjA4ODY4NzUzMH0.A9lCoL2Zyfz_b0yasGsyC4mirSir_lxQt3McnLLOhK4";
        const supabase = window.supabase.createClient(SB_URL, SB_KEY);

        let localEntries = [];

        // Auth Logic
        async function handleAuth(type) {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const msg = document.getElementById('authMsg');
            
            if (!email || !password) return (msg.innerText = "Credentials Required");

            msg.innerText = "Processing...";
            const { error } = type === 'login' 
                ? await supabase.auth.signInWithPassword({ email, password })
                : await supabase.auth.signUp({ email, password });

            if (error) msg.innerText = error.message.toUpperCase();
        }

        // Session Observer
        supabase.auth.onAuthStateChange((event, session) => {
            const authSection = document.getElementById('authSection');
            const mainSection = document.getElementById('mainSection');
            const status = document.getElementById('status');

            if (session) {
                authSection.classList.add('hidden');
                mainSection.classList.remove('hidden');
                setTimeout(() => mainSection.classList.add('opacity-100'), 50);
                status.innerText = "ACTIVE: " + session.user.email;
                loadEntries();
                initRealtime();
            } else {
                authSection.classList.remove('hidden');
                mainSection.classList.add('hidden');
                mainSection.classList.remove('opacity-100');
            }
        });

        // Data Management
        async function loadEntries() {
            const { data, error } = await supabase
                .from('entries')
                .select('*')
                .order('created_at', { ascending: false });
            
            if (!error) {
                localEntries = data;
                renderUI();
            }
        }

        function renderUI() {
            const container = document.getElementById('listContainer');
            if (localEntries.length === 0) {
                container.innerHTML = `<div class="glass p-12 text-center rounded-2xl text-slate-500 mono text-sm uppercase">No Records Found</div>`;
                return;
            }

            container.innerHTML = localEntries.map(item => `
                <div class="glass p-6 rounded-2xl group transition-all hover:border-emerald-500/30 relative">
                    <div class="flex justify-between items-start mb-4">
                        <div class="space-y-1">
                            <span class="text-[10px] mono text-emerald-500 uppercase tracking-widest">Ref: ${item.id.split('-')[0]}</span>
                            <h3 class="text-xl font-bold text-white tracking-tight">${item.title}</h3>
                        </div>
                        <button onclick="removeEntry('${item.id}')" class="text-slate-600 hover:text-red-400 transition-colors">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                        </button>
                    </div>
                    <p class="text-slate-400 leading-relaxed text-sm">${item.content || '<span class="italic text-slate-600">No content provided</span>'}</p>
                    <div class="mt-6 flex items-center justify-between border-t border-white/5 pt-4">
                        <span class="text-[10px] mono text-slate-600">${new Date(item.created_at).toLocaleString()}</span>
                        <code class="text-[10px] text-slate-700">ID: ${item.id}</code>
                    </div>
                </div>
            `).join('');
        }

        async function submitEntry() {
            const title = document.getElementById('title').value;
            const content = document.getElementById('content').value;
            const { data: { user } } = await supabase.auth.getUser();

            if (!title) return alert("Title required.");

            const { error } = await supabase.from('entries').insert([{ 
                title, content, user_id: user.id 
            }]);

            if (error) alert(error.message);
            else {
                document.getElementById('title').value = '';
                document.getElementById('content').value = '';
            }
        }

        async function removeEntry(id) {
            if (confirm("Permanently delete this record?")) {
                const { error } = await supabase.from('entries').delete().eq('id', id);
                if (error) alert("Permission Denied: You may only delete your own records.");
            }
        }

        function initRealtime() {
            supabase.channel('db-sync')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'entries' }, () => {
                    loadEntries();
                })
                .subscribe();
        }
    </script>
</body>
</html>
