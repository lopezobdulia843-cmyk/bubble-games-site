<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bubble Games | Home</title>
    <style>
        :root { --primary: #00d4ff; --bg: #0a0a0c; --card: #16161a; --danger: #ff4444; --edit: #ffcc00; --success: #00ff88; --owner: #ffcf40; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; text-align: center; }
        nav { padding: 10px 50px; border-bottom: 2px solid var(--primary); display: flex; justify-content: space-between; align-items: center; background: #000; }
        .logo { font-size: 24px; font-weight: bold; color: var(--primary); text-transform: uppercase; }
        .container { padding: 50px 20px; max-width: 1000px; margin: auto; }
        
        #authContainer { background: var(--card); padding: 40px; border-radius: 20px; border: 1px solid var(--primary); display: inline-block; margin-top: 100px; }
        input { display: block; margin: 10px auto; padding: 12px; width: 250px; border-radius: 8px; border: 1px solid #333; background: #000; color: white; }
        
        .btn-launch { 
            background: var(--primary); color: #000; padding: 15px 40px; 
            border-radius: 50px; text-decoration: none; font-weight: bold; 
            font-size: 1.5rem; display: inline-block; transition: 0.3s;
            cursor: pointer; border: none;
        }

        .section-title { text-align: left; margin-top: 50px; color: var(--primary); border-left: 4px solid var(--primary); padding-left: 15px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .game-card { background: var(--card); border: 1px solid #333; padding: 20px; border-radius: 15px; text-align: left; transition: 0.3s; }
        .game-card:hover { border-color: var(--primary); }
        
        button { border: none; padding: 12px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-play { background: var(--primary); color: black; width: 100%; margin-top: 10px; }
        .btn-edit { background: var(--edit); color: black; width: 48%; margin-top: 5px; }
        .btn-rename { background: #444; color: white; width: 48%; margin-top: 5px; }
        .btn-delete { background: var(--danger); color: white; width: 100%; margin-top: 5px; }
        .btn-logout { background: #333; color: white; font-size: 12px; }
        
        .owner-tag { color: var(--owner); text-shadow: 0 0 10px var(--owner); font-weight: bold; }
        .creator-label { font-size: 12px; color: #00d4ff; font-weight: bold; }

        /* MINI WARNING STYLE */
        #capsStatus { 
            font-size: 10px; font-weight: bold; padding: 2px 6px; 
            border-radius: 4px; text-transform: uppercase;
        }
        .caps-on { color: var(--success); border: 1px solid var(--success); }
        .caps-off { color: var(--danger); border: 1px solid var(--danger); }
    </style>
</head>
<body>

    <div id="authContainer">
        <h1 id="authTitle">Bubble Games</h1>
        <input type="text" id="username" placeholder="Username" maxlength="15">
        <input type="password" id="password" placeholder="Password" maxlength="20">
        
        <div id="loginSection">
            <button onclick="handleAuth('login')" id="loginBtn" class="btn-play">LOGIN</button>
            <p style="font-size: 13px; margin-top:15px;">New creator? <span style="color:var(--primary);cursor:pointer;" onclick="toggleAuth(true)">Create Account</span></p>
        </div>

        <div id="signupSection" style="display:none;">
            <button onclick="handleAuth('signup')" style="background:var(--success); color:black; width:100%;" class="btn-play">CREATE ACCOUNT</button>
            <p style="font-size: 13px; margin-top:15px;">Have an account? <span style="color:var(--primary);cursor:pointer;" onclick="toggleAuth(false)">Back to Login</span></p>
        </div>
        <p id="msg" style="font-size: 13px; color: var(--danger); margin-top: 10px;"></p>
    </div>

    <div id="mainApp" style="display:none;">
        <nav>
            <div class="logo">Bubble Games</div>
            <div style="display: flex; align-items: center; gap: 10px;">
                <div id="capsStatus"></div>
                <span id="userDisplay"></span>
                <button class="btn-logout" onclick="handleLogout()">LOGOUT</button>
            </div>
        </nav>

        <div class="container">
            <h1>Build. Play. Publish.</h1>
            <button onclick="createNewGame()" id="editorBtn" class="btn-launch">Open Editor 🛠️</button>
            
            <h2 class="section-title">Your Studio 📂</h2>
            <div class="grid" id="myGamesGrid"></div>

            <h2 class="section-title">Global Library 🌎</h2>
            <div class="grid" id="globalGamesGrid"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://sideqpofgknyfagrjnke.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_ULjlm97u7-dg8ekTPU84aA_rA1CtUnH';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let currentUser = "";
        let isUserLoggedIn = false;

        // UPDATED: MINI WARNING ONLY
        function updateCapsStatus(e) {
            if (!isUserLoggedIn) return;
            const isCaps = e && e.getModifierState ? e.getModifierState('CapsLock') : false;
            const statusBox = document.getElementById('capsStatus');
            
            if (isCaps) {
                statusBox.innerText = "CAPS ON";
                statusBox.className = "caps-on";
            } else {
                statusBox.innerText = "CAPS OFF";
                statusBox.className = "caps-off";
            }
        }

        window.addEventListener('keydown', updateCapsStatus);
        window.addEventListener('keyup', updateCapsStatus);
        window.addEventListener('mousedown', updateCapsStatus);

        async function checkUser() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (user) {
                currentUser = user.email.split('@')[0];
                showApp(currentUser);
            }
        }
        checkUser();

        function toggleAuth(isSignUp) {
            document.getElementById('signupSection').style.display = isSignUp ? "block" : "none";
            document.getElementById('loginSection').style.display = isSignUp ? "none" : "block";
        }

        async function handleAuth(mode) {
            const userInput = document.getElementById('username').value.trim();
            const passInput = document.getElementById('password').value;
            const msg = document.getElementById('msg');
            const fakeEmail = `${userInput.toLowerCase()}@bubble.com`;

            if (mode === 'signup') {
                const { error } = await supabaseClient.auth.signUp({ email: fakeEmail, password: passInput });
                if (error) msg.innerText = error.message;
                else { msg.style.color = "var(--success)"; msg.innerText = "Account Created! Login now."; toggleAuth(false); }
            } else {
                const { error } = await supabaseClient.auth.signInWithPassword({ email: fakeEmail, password: passInput });
                if (error) msg.innerText = "Invalid login!";
                else { currentUser = userInput.toLowerCase(); showApp(currentUser); }
            }
        }

        function showApp(username) {
            isUserLoggedIn = true;
            document.getElementById('authContainer').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            
            const isOwner = username === "abraham" || username === "worthy";
            document.getElementById('userDisplay').innerHTML = isOwner ? 
                `<span class="owner-tag">[OWNER] ${username.toUpperCase()}</span>` : 
                `<span>${username.toUpperCase()}</span>`;
                
            loadGames();
        }

        async function loadGames() {
            const myGrid = document.getElementById('myGamesGrid');
            const globalGrid = document.getElementById('globalGamesGrid');
            const { data: savedGames } = await supabaseClient.from('games').select('*');
            
            myGrid.innerHTML = ''; globalGrid.innerHTML = '';
            
            if (savedGames) {
                savedGames.forEach((game) => {
                    const isCreator = game.creator.toLowerCase() === currentUser.toLowerCase();
                    const isOwner = currentUser === "abraham" || currentUser === "worthy";
                    const card = document.createElement('div');
                    card.className = 'game-card';
                    
                    let buttons = `<button class="btn-play" onclick="playId('${game.id}')">PLAY</button>`;
                    
                    if (isCreator || isOwner) {
                        buttons += `
                            <div style="display:flex; justify-content:space-between;">
                                <button class="btn-edit" onclick="editId('${game.id}')">EDIT</button>
                                <button class="btn-rename" onclick="renameGame('${game.id}')">RENAME</button>
                            </div>
                            <button class="btn-delete" onclick="deleteGame('${game.id}')">DELETE 🗑️</button>
                        `;
                    }

                    card.innerHTML = `<span class="creator-label">@${game.creator}</span><h3>${game.name}</h3>${buttons}`;
                    
                    if (isCreator) myGrid.appendChild(card);
                    else globalGrid.appendChild(card);
                });
            }
        }

        async function deleteGame(id) {
            if (confirm("REALLY DELETE THIS GAME?")) {
                const { error } = await supabaseClient.from('games').delete().eq('id', id);
                if (error) alert("Error deleting: " + error.message);
                else loadGames();
            }
        }

        function createNewGame() { localStorage.removeItem('currentGameId'); window.location.href = 'engine.html'; }
        function playId(id) { localStorage.setItem('currentGameId', id); localStorage.setItem('editMode', 'false'); window.location.href = 'engine.html'; }
        function editId(id) { localStorage.setItem('currentGameId', id); localStorage.setItem('editMode', 'true'); window.location.href = 'engine.html'; }

        async function handleLogout() { isUserLoggedIn = false; await supabaseClient.auth.signOut(); location.reload(); }
    </script>
</body>
</html>
