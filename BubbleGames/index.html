<div class="portal-container">
    <div class="auth-box">
        <h1 class="logo">🫧 Bubble Games</h1>
        
        <div class="tabs">
            <button class="tab-btn active">Log In</button>
            <button class="tab-btn">Sign Up</button>
        </div>

        <form class="auth-form">
            <input type="email" placeholder="Email" required>
            <input type="password" placeholder="Password" required>
            <button type="submit" class="btn-main">Enter Bubble World</button>
        </form>

        <p class="footer-text">Don't have an account? <a href="#">Create one!</a></p>
    </div>
</div>
