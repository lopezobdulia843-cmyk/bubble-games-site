<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bubble Games | Home</title>
    <style>
        :root { 
            --primary: #00d4ff; 
            --bg: #0a0a0c; 
            --card: #16161a; 
            --danger: #ff4444; 
            --edit: #ffcc00; 
            --success: #00ff88; 
            --owner: #ffcf40; 
            --glass: rgba(255, 255, 255, 0.05);
        }

        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; text-align: center; }
        
        nav { padding: 15px 50px; border-bottom: 1px solid rgba(0, 212, 255, 0.3); display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; }
        
        .logo { font-size: 24px; font-weight: 900; color: var(--primary); text-transform: uppercase; letter-spacing: 2px; }
        
        .container { padding: 40px 20px; max-width: 1100px; margin: auto; }

        /* Auth Styles */
        #authContainer { background: var(--card); padding: 40px; border-radius: 24px; border: 1px solid rgba(0, 212, 255, 0.2); display: inline-block; margin-top: 80px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        input { display: block; margin: 10px auto; padding: 14px; width: 280px; border-radius: 12px; border: 1px solid #333; background: #000; color: white; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(0, 212, 255, 0.3); }

        /* Big Launch Button */
        .btn-launch { 
            background: linear-gradient(45deg, var(--primary), #0044ff); color: white; padding: 18px 50px; 
            border-radius: 16px; text-decoration: none; font-weight: 800; 
            font-size: 1.2rem; display: inline-block; transition: 0.3s;
            cursor: pointer; border: none; box-shadow: 0 10px 20px rgba(0, 212, 255, 0.2);
        }
        .btn-launch:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(0, 212, 255, 0.4); }

        /* Grid & Section Styling */
        .section-title { text-align: left; margin: 60px 0 20px; font-size: 1.5rem; color: #fff; display: flex; align-items: center; gap: 10px; }
        .section-title::after { content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.1); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }

        /* NEW PRO GAME CARD */
        .game-card { 
            background: var(--card); 
            border: 1px solid rgba(255,255,255,0.05); 
            border-radius: 20px; 
            text-align: left; 
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            overflow: hidden;
            position: relative;
        }
        .game-card:hover { 
            transform: translateY(-10px); 
            border-color: var(--primary); 
            background: #1c1c21;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .card-inner { padding: 20px; }
        
        .creator-label { font-size: 12px; color: var(--primary); font-weight: bold; background: rgba(0, 212, 255, 0.1); padding: 4px 10px; border-radius: 20px; }
        .game-name { margin: 15px 0 5px; font-size: 1.4rem; font-weight: 800; }
        .game-stats { font-size: 13px; color: #777; margin-bottom: 20px; display: flex; gap: 10px; }

        /* PRO ACTION BUTTONS */
        .action-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 10px; }
        
        .btn-base { border: none; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: 800; font-size: 13px; transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 5px; }
        
        .btn-play { background: var(--primary); color: #000; grid-column: span 3; font-size: 16px; margin-bottom: 8px; }
        .btn-play:hover { background: #fff; transform: scale(1.02); }

        .btn-edit { background: var(--glass); color: var(--edit); border: 1px solid rgba(255,204,0,0.2); }
        .btn-edit:hover { background: var(--edit); color: #000; }

        .btn-rename { background: var(--glass); color: #fff; border: 1px solid rgba(255,255,255,0.1); }
        .btn-rename:hover { background: #fff; color: #000; }

        .btn-delete { background: rgba(255,68,68,0.1); color: var(--danger); border: 1px solid rgba(255,68,68,0.2); }
        .btn-delete:hover { background: var(--danger); color: #fff; }

        .btn-logout { background: #222; color: #fff; padding: 8px 15px; border-radius: 8px; font-size: 12px; }
        .owner-tag { color: var(--owner); text-shadow: 0 0 10px var(--owner); font-weight: 900; }

    </style>
</head>
<body>

    <div id="authContainer">
        <h1 id="authTitle" class="logo">Bubble Games</h1>
        <input type="text" id="username" placeholder="Username" maxlength="15">
        <input type="password" id="password" placeholder="Password" maxlength="20">
        
        <div id="loginSection">
            <button id="loginBtn" class="btn-base btn-play">LOGIN TO ENGINE</button>
            <p style="font-size: 13px; margin-top:15px; color:#777;">New creator? <span id="toSignup" style="color:var(--primary);cursor:pointer;font-weight:bold;">Create Account</span></p>
        </div>

        <div id="signupSection" style="display:none;">
            <button id="signupBtn" style="background:var(--success); color:black;" class="btn-base btn-play">CREATE CREATOR ID</button>
            <p style="font-size: 13px; margin-top:15px; color:#777;">Have an account? <span id="toLogin" style="color:var(--primary);cursor:pointer;font-weight:bold;">Back to Login</span></p>
        </div>
        <p id="msg" style="font-size: 13px; color: var(--danger); margin-top: 10px;"></p>
    </div>

    <div id="mainApp" style="display:none;">
        <nav>
            <div class="logo">Bubble Games</div>
            <div style="display: flex; align-items: center; gap: 15px;">
                <span id="userDisplay"></span>
                <button id="logoutBtn" class="btn-logout">LOGOUT</button>
            </div>
        </nav>

        <div class="container">
            <h1 style="font-size: 3rem; font-weight: 900; margin-bottom: 10px;">Build. Play. Publish.</h1>
            <p style="color:#777; margin-bottom: 40px;">The world's first bubble-based game engine.</p>
            <button id="newGameBtn" class="btn-launch">Create New World 🛠️</button>
            
            <h2 class="section-title"><span>📂</span> Your Studio</h2>
            <div class="grid" id="myGamesGrid"></div>

            <h2 class="section-title"><span>🌎</span> Global Library</h2>
            <div class="grid" id="globalGamesGrid"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script type="module">
        const SUPABASE_URL = 'https://sideqpofgknyfagrjnke.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_ULjlm97u7-dg8ekTPU84aA_rA1CtUnH';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = "";

        async function checkUser() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (user) {
                currentUser = user.email.split('@')[0];
                showApp();
            }
        }

        async function showApp() {
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (!user) return;

            const nameFromEmail = user.email.split('@')[0];
            const isOwner = (nameFromEmail === "abraham");

            document.getElementById('authContainer').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            
            document.getElementById('userDisplay').innerHTML = isOwner 
                ? `<span class="owner-tag">[OWNER] ABRAHAM</span>` 
                : `<span style="color:var(--primary); font-weight:bold;">${nameFromEmail.toUpperCase()}</span>`;
            
            loadGames(isOwner);
        }

        async function handleAuth(mode) {
            const userInput = document.getElementById('username').value.trim();
            const passInput = document.getElementById('password').value;
            const msg = document.getElementById('msg');

            if (userInput.length < 3) { msg.innerText = "Username too short!"; return; }
            const fakeEmail = `${userInput.toLowerCase()}@bubble.com`;

            if (mode === 'signup') {
                const { error } = await supabaseClient.auth.signUp({ email: fakeEmail, password: passInput });
                if (error) msg.innerText = error.message;
                else { msg.style.color = "var(--success)"; msg.innerText = "Account Created! Login now."; toggleAuth(false); }
            } else {
                const { error } = await supabaseClient.auth.signInWithPassword({ email: fakeEmail, password: passInput });
                if (error) { msg.style.color = "var(--danger)"; msg.innerText = "Invalid login!"; }
                else { showApp(); }
            }
        }

        async function loadGames(isOwner) {
            const myGrid = document.getElementById('myGamesGrid');
            const globalGrid = document.getElementById('globalGamesGrid');
            const { data: savedGames, error } = await supabaseClient.from('games').select('*');

            if (error) return;
            myGrid.innerHTML = ''; globalGrid.innerHTML = '';

            savedGames.forEach((game) => {
                const isCreator = game.creator === currentUser;
                const card = document.createElement('div');
                card.className = 'game-card';

                let actionButtons = '';
                if (isOwner || isCreator) {
                    actionButtons = `
                        <div class="action-row">
                            <button class="btn-base btn-edit edit-action" data-id="${game.id}">✎ Edit</button>
                            <button class="btn-base btn-rename rename-action" data-id="${game.id}" data-name="${game.name}">✍ Rename</button>
                            <button class="btn-base btn-delete delete-action" data-id="${game.id}">✖ Delete</button>
                        </div>
                    `;
                }

                card.innerHTML = `
                    <div class="card-inner">
                        <span class="creator-label">@${game.creator || 'guest'}</span>
                        <h3 class="game-name">${game.name}</h3>
                        <div class="game-stats">
                            <span>📦 ${game.blocks ? game.blocks.length : 0} Blocks</span>
                            <span>📅 ${new Date(game.created_at).toLocaleDateString()}</span>
                        </div>
                        <button class="btn-base btn-play play-action" data-id="${game.id}">▶ PLAY NOW</button>
                        ${actionButtons}
                    </div>
                `;

                if (isCreator) myGrid.appendChild(card);
                else globalGrid.appendChild(card);
            });

            document.querySelectorAll('.play-action').forEach(b => b.onclick = () => playId(b.dataset.id));
            document.querySelectorAll('.edit-action').forEach(b => b.onclick = () => editId(b.dataset.id));
            document.querySelectorAll('.delete-action').forEach(b => b.onclick = () => deleteGame(b.dataset.id));
            document.querySelectorAll('.rename-action').forEach(b => b.onclick = () => renameGame(b.dataset.id, b.dataset.name));
        }

        // --- HELPERS ---
        function toggleAuth(isSignUp) {
            document.getElementById('signupSection').style.display = isSignUp ? "block" : "none";
            document.getElementById('loginSection').style.display = isSignUp ? "none" : "block";
        }

        async function deleteGame(id) {
            if (confirm("Delete forever? This cannot be undone.")) {
                await supabaseClient.from('games').delete().eq('id', id);
                showApp();
            }
        }

        async function renameGame(id, oldName) {
            const n = prompt("New world name:", oldName);
            if (n) { await supabaseClient.from('games').update({ name: n }).eq('id', id); showApp(); }
        }

        function playId(id) { localStorage.setItem('currentGameId', id); localStorage.setItem('editMode', 'false'); window.location.href = 'engine.html'; }
        function editId(id) { localStorage.setItem('currentGameId', id); localStorage.setItem('editMode', 'true'); window.location.href = 'engine.html'; }

        document.getElementById('loginBtn').onclick = () => handleAuth('login');
        document.getElementById('signupBtn').onclick = () => handleAuth('signup');
        document.getElementById('toSignup').onclick = () => toggleAuth(true);
        document.getElementById('toLogin').onclick = () => toggleAuth(false);
        document.getElementById('logoutBtn').onclick = async () => { await supabaseClient.auth.signOut(); location.reload(); };
        document.getElementById('newGameBtn').onclick = () => {
            localStorage.removeItem('currentGameId');
            localStorage.setItem('editMode', 'true');
            localStorage.setItem('isNewGame', 'true');
            window.location.href = 'engine.html';
        };

        checkUser();
    </script>
</body>
</html>
