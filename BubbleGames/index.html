<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bubble Games | Welcome</title>
    <link rel="stylesheet" href="static/style.css">
</head>
<body>

    <div class="corner-brand">
        <span class="brand-bubble">🫧</span> 
        Bubble<span class="brand-pink">Games</span>
    </div>

    <div id="user-status" class="user-status" style="display: none;">
        <span>Welcome, <span id="display-username">Player</span>! 🫧</span>
        <button class="logout-btn" onclick="handleLogout()">Logout ⏻</button>
    </div>

    <div class="main-wrapper">
        <h2 class="page-welcome" id="page-title">Getting Started</h2>

        <div id="auth-card" class="bubble-card">
            <div class="brand">
                <span class="bubble-icon">🫧</span>
                <h1>Bubble<span>Games</span></h1>
            </div>

            <div class="input-area">
                <input type="text" id="username" placeholder="Username" class="bouncy-input">
                
                <div class="password-group">
                    <input type="password" id="password" placeholder="Password" class="bouncy-input">
                    <a href="#" class="forgot-link" id="forgot-pass">Forgot Password?</a>
                </div>
            </div>

            <div id="loader" class="loader"></div>

            <button class="go-btn" id="main-button" onclick="handleAuth()">Let's Play!</button>
            
            <div class="footer-links">
                <p id="toggle-container">New here? <a href="#" class="signup-link" onclick="switchMode()">Sign Up!</a></p>
            </div>
        </div>

        <div id="game-hub" class="hub-container" style="display: none;">
            <div class="search-area">
                <input type="text" id="game-search" placeholder="What would you like to play?" class="bouncy-input">
            </div>

            <div class="tab-menu">
                <button id="tab-your" class="tab-btn active" onclick="switchTab('your-games')">Your Games</button>
                <button id="tab-global" class="tab-btn" onclick="switchTab('global-games')">Global Games</button>
            </div>

            <div id="game-list" class="game-grid">
                </div>

            <button class="back-btn" id="hub-back" style="display: none;" onclick="resetHub()">← Go Back</button>
        </div>
    </div>

    <script>
        window.mode = "login"; 

        function switchMode() {
            const btn = document.getElementById('main-button');
            const forgot = document.getElementById('forgot-pass');
            const footer = document.getElementById('toggle-container');
            const pageTitle = document.getElementById('page-title');
            const loader = document.getElementById('loader');

            loader.style.display = "none";
            btn.disabled = false;
            btn.style.opacity = "1";

            if (window.mode === "login") {
                btn.innerText = "Create Account!";
                forgot.style.display = "none";
                footer.innerHTML = 'Already a member? <a href="#" class="signup-link" onclick="switchMode()">Log In!</a>';
                pageTitle.innerText = "Join the Community";
                window.mode = "signup";
            } else {
                btn.innerText = "Let's Play!";
                forgot.style.display = "inline";
                footer.innerHTML = 'New here? <a href="#" class="signup-link" onclick="switchMode()">Sign Up!</a>';
                pageTitle.innerText = "Getting Started";
                window.mode = "login";
            }
        }
    </script>

    <script type="module" src="static/gateway.js"></script>
    <script type="module" src="static/hub.js"></script>
    <script src="static/bubbles.js"></script>
</body>
</html>
