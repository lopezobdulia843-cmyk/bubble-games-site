<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bubble Games | Welcome</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <div class="main-wrapper">
        <div class="bubble-card">
            <div class="brand">
                <span class="bubble-icon">🫧</span>
                <h1>Bubble<span>Games</span></h1>
            </div>

            <div class="input-area">
                <input type="text" placeholder="Username" class="bouncy-input">
                
                <div class="password-group">
                    <input type="password" placeholder="Password" class="bouncy-input">
                    <a href="#" class="forgot-link" id="forgot-pass">Forgot Password?</a>
                </div>
            </div>

            <button class="go-btn" id="main-button">Let's Play!</button>
            
            <div class="footer-links">
                <p id="toggle-container">New here? <a href="#" class="signup-link" onclick="switchMode()">Sign Up!</a></p>
            </div>
        </div>
    </div>

    <script>
        let mode = "login";

        function switchMode() {
            const btn = document.getElementById('main-button');
            const forgot = document.getElementById('forgot-pass');
            const footer = document.getElementById('toggle-container');

            if (mode === "login") {
                // Change to Sign Up mode
                btn.innerText = "Create Account!";
                forgot.style.display = "none";
                footer.innerHTML = 'Already a member? <a href="#" class="signup-link" onclick="switchMode()">Log In!</a>';
                mode = "signup";
            } else {
                // Change back to Login mode
                btn.innerText = "Let's Play!";
                forgot.style.display = "inline";
                footer.innerHTML = 'New here? <a href="#" class="signup-link" onclick="switchMode()">Sign Up!</a>';
                mode = "login";
            }
        }
    </script>

</body>
</html>
