<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bubble Games | Home</title>
    <style>
        :root { --primary: #00d4ff; --bg: #0a0a0c; --card: #16161a; --danger: #ff4444; --edit: #ffcc00; --success: #00ff88; --owner: #ffcf40; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; text-align: center; transition: padding-top 0.3s; }
        
        /* THE CHILL REMINDER BAR */
        #capsReminder {
            position: fixed; top: 0; left: 0; width: 100%; height: 40px;
            background: var(--danger); color: white; font-weight: bold;
            display: flex; align-items: center; justify-content: center;
            z-index: 9999; text-transform: uppercase; font-size: 14px;
            transition: transform 0.3s; transform: translateY(-100%);
        }
        body.locked { padding-top: 40px; }
        body.locked #capsReminder { transform: translateY(0); }

        nav { padding: 10px 50px; border-bottom: 2px solid var(--primary); display: flex; justify-content: space-between; align-items: center; background: #000; }
        .logo { font-size: 24px; font-weight: bold; color: var(--primary); text-transform: uppercase; }
        .container { padding: 50px 20px; max-width: 1000px; margin: auto; }
        
        #authContainer { background: var(--card); padding: 40px; border-radius: 20px; border: 1px solid var(--primary); display: inline-block; margin-top: 100px; }
        input { display: block; margin: 10px auto; padding: 12px; width: 250px; border-radius: 8px; border: 1px solid #333; background: #000; color: white; }
        
        .btn-launch { 
            background: var(--primary); color: #000; padding: 15px 40px; 
            border-radius: 50px; text-decoration: none; font-weight: bold; 
            font-size: 1.5rem; display: inline-block; transition: 0.3s;
            cursor: pointer; border: none;
        }
        .btn-launch:hover:not(:disabled) { transform: scale(1.05); box-shadow: 0 0 20px var(--primary); }
        
        button:disabled {
            background: #222 !important; color: #555 !important;
            cursor: not-allowed !important; transform: none !important;
            box-shadow: none !important; border: 1px solid #333 !important;
        }

        .section-title { text-align: left; margin-top: 50px; color: var(--primary); border-left: 4px solid var(--primary); padding-left: 15px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .game-card { background: var(--card); border: 1px solid #333; padding: 20px; border-radius: 15px; text-align: left; transition: 0.3s; }
        
        button { border: none; padding: 12px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-play { background: var(--primary); color: black; width: 100%; margin-top: 10px; }
        .btn-logout { background: #333; color: white; font-size: 12px; }

        #capsWarning { 
            color: var(--success); font-size: 12px; font-weight: bold; 
            padding: 5px 10px; border: 1px solid var(--success); 
            border-radius: 5px; display: none;
        }
    </style>
</head>
<body class="locked">

    <div id="capsReminder">⚠️ CAPS LOCK OFF: BUTTONS DISABLED ⚠️</div>

    <div id="authContainer">
        <h1 id="authTitle">Bubble Games</h1>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button onclick="handleAuth('login')" id="loginBtn" class="btn-play caps-required" disabled>LOGIN</button>
    </div>

    <div id="mainApp" style="display:none;">
        <nav>
            <div class="logo">Bubble Games</div>
            <div style="display: flex; align-items: center; gap: 15px;">
                <div id="capsWarning">✅ CAPS ACTIVE</div>
                <span id="userDisplay" style="font-weight: bold;"></span>
                <button class="btn-logout" onclick="handleLogout()">LOGOUT</button>
            </div>
        </nav>

        <div class="container">
            <h1>Build. Play. Publish.</h1>
            <button onclick="createNewGame()" id="editorBtn" class="btn-launch caps-required" disabled>Open Editor 🛠️</button>
            <h2 class="section-title">Global Library 🌎</h2>
            <div class="grid" id="globalGamesGrid"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://sideqpofgknyfagrjnke.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_ULjlm97u7-dg8ekTPU84aA_rA1CtUnH';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let currentUser = "";

        // --- THE REMINDER LOGIC ---
        function checkCaps(e) {
            // If it's a mouse event without a key press, we check the state if possible
            const isCaps = e && e.getModifierState ? e.getModifierState('CapsLock') : false;
            const successBadge = document.getElementById('capsWarning');
            const requiredBtns = document.querySelectorAll('.caps-required');

            if (isCaps) {
                document.body.classList.remove('locked');
                if(successBadge) successBadge.style.display = 'block';
                requiredBtns.forEach(btn => btn.disabled = false);
            } else {
                document.body.classList.add('locked');
                if(successBadge) successBadge.style.display = 'none';
                requiredBtns.forEach(btn => btn.disabled = true);
            }
        }

        // Listen for everything to keep it updated
        window.addEventListener('keydown', checkCaps);
        window.addEventListener('keyup', checkCaps);
        window.addEventListener('mousedown', checkCaps);

        // --- AUTH & LOAD ---
        async function handleAuth(mode) {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('password').value;
            const { data, error } = await supabaseClient.auth.signInWithPassword({ 
                email: `${user.toLowerCase()}@bubble.com`, 
                password: pass 
            });
            if (!error) {
                currentUser = user.toLowerCase();
                document.getElementById('authContainer').style.display = 'none';
                document.getElementById('mainApp').style.display = 'block';
                document.getElementById('userDisplay').innerText = currentUser.toUpperCase();
                loadGames();
            }
        }

        async function loadGames() {
            const grid = document.getElementById('globalGamesGrid');
            const { data: games } = await supabaseClient.from('games').select('*');
            grid.innerHTML = '';
            games.forEach(g => {
                const card = document.createElement('div');
                card.className = 'game-card';
                card.innerHTML = `
                    <span style="font-size:12px; color:var(--primary)">@${g.creator}</span>
                    <h3>${g.name}</h3>
                    <button class="btn-play caps-required" onclick="window.location.href='engine.html'" disabled>PLAY</button>
                `;
                grid.appendChild(card);
            });
            // Final check to make sure new buttons are locked/unlocked
            checkCaps();
        }

        function createNewGame() { window.location.href = 'engine.html'; }
        async function handleLogout() { await supabaseClient.auth.signOut(); location.reload(); }
    </script>
</body>
</html>
