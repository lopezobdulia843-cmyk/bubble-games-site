<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Data Core</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; color: #f4f4f5; }
        .glass { background: rgba(23, 23, 23, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(63, 63, 70, 0.4); }
        .accent-gradient { background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%); }
    </style>
</head>
<body class="min-h-screen">

    <!-- Auth Overlay -->
    <div id="auth-overlay" class="fixed inset-0 z-50 flex items-center justify-center bg-black px-4">
        <div class="glass w-full max-w-md p-8 rounded-2xl">
            <h2 class="text-3xl font-extrabold mb-2 bg-clip-text text-transparent accent-gradient">System Access</h2>
            <p class="text-zinc-400 mb-6 text-sm">Initialize secure session to manage registry.</p>
            <div class="space-y-4">
                <input type="email" id="email" placeholder="Email Address" class="w-full bg-zinc-900 border border-zinc-800 p-3 rounded-lg outline-none focus:border-blue-500 transition text-white">
                <input type="password" id="pass" placeholder="Security Key" class="w-full bg-zinc-900 border border-zinc-800 p-3 rounded-lg outline-none focus:border-blue-500 transition text-white">
                <button onclick="handleAuth('login')" class="w-full accent-gradient text-white font-bold py-3 rounded-lg hover:opacity-90 transition">Sign In</button>
                <button onclick="handleAuth('signup')" class="w-full text-zinc-400 text-sm hover:text-white transition">Create New Node Account</button>
            </div>
            <p id="auth-error" class="text-red-400 text-xs mt-4 italic text-center"></p>
        </div>
    </div>

    <!-- Main Dashboard -->
    <div id="app" class="hidden">
        <nav class="border-b border-zinc-800 p-4 sticky top-0 bg-black/50 backdrop-blur-md z-40">
            <div class="max-w-6xl mx-auto flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <div class="h-3 w-3 rounded-full bg-green-500 animate-pulse"></div>
                    <span class="font-bold tracking-tight text-xl">CORE_LINK</span>
                </div>
                <button onclick="signOut()" class="text-xs text-zinc-500 hover:text-white border border-zinc-800 px-3 py-1 rounded">Disconnect</button>
            </div>
        </nav>

        <main class="max-w-6xl mx-auto p-6">
            <header class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-10">
                <div>
                    <h1 class="text-4xl font-extrabold tracking-tighter">Data Registry</h1>
                    <p class="text-zinc-500">Real-time synchronized PostgreSQL uplink</p>
                </div>
                <button onclick="toggleModal(true)" class="accent-gradient px-6 py-3 rounded-xl font-bold shadow-lg shadow-blue-500/20 hover:scale-105 transition">
                    + New Entry
                </button>
            </header>

            <div id="loader" class="text-center py-20 text-zinc-600">Syncing with cloud infrastructure...</div>
            <div id="registry-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Cards injected here -->
            </div>
        </main>
    </div>

    <!-- Modal -->
    <div id="modal" class="fixed inset-0 bg-black/80 hidden items-center justify-center z-50 p-4">
        <div class="glass w-full max-w-lg p-8 rounded-2xl">
            <h3 class="text-xl font-bold mb-4 text-white">Commit New Entry</h3>
            <input type="text" id="new-title" placeholder="Title" class="w-full bg-zinc-900 border border-zinc-800 p-3 rounded-lg mb-4 text-white outline-none">
            <textarea id="new-desc" placeholder="Description Metadata" class="w-full bg-zinc-900 border border-zinc-800 p-3 rounded-lg mb-6 h-32 text-white outline-none"></textarea>
            <div class="flex gap-3">
                <button onclick="createEntry()" class="flex-1 accent-gradient py-3 rounded-lg font-bold">Commit Data</button>
                <button onclick="toggleModal(false)" class="px-6 py-3 border border-zinc-800 rounded-lg text-zinc-400">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://sideqpofgknyfagrjnke.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNpZGVxcG9mZ2tueWZhZ3JqbmtlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxMTE1MzAsImV4cCI6MjA4ODY4NzUzMH0.A9lCoL2Zyfz_b0yasGsyC4mirSir_lxQt3McnLLOhK4";
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        let userNode = null;

        // Session Observer
        supabase.auth.onAuthStateChange((event, session) => {
            userNode = session?.user || null;
            document.getElementById('auth-overlay').classList.toggle('hidden', !!userNode);
            document.getElementById('app').classList.toggle('hidden', !userNode);
            if(userNode) {
                fetchRegistry();
                subscribeRealtime();
            }
        });

        async function handleAuth(mode) {
            const email = document.getElementById('email').value;
            const password = document.getElementById('pass').value;
            if(!email || !password) return;
            
            const { error } = mode === 'login' 
                ? await supabase.auth.signInWithPassword({ email, password })
                : await supabase.auth.signUp({ email, password });
            
            if(error) document.getElementById('auth-error').innerText = error.message;
        }

        async function signOut() { await supabase.auth.signOut(); }

        function toggleModal(show) { document.getElementById('modal').style.display = show ? 'flex' : 'none'; }

        async function fetchRegistry() {
            const { data, error } = await supabase.from('registry').select('*').order('inserted_at', { ascending: false });
            if (error) return console.error(error);
            renderGrid(data);
        }

        function renderGrid(items) {
            const grid = document.getElementById('registry-grid');
            document.getElementById('loader').classList.add('hidden');
            grid.innerHTML = items.map(item => `
                <div class="glass p-6 rounded-2xl hover:border-blue-500/50 transition-all group">
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-[10px] font-mono text-zinc-500 uppercase tracking-widest">Node_${item.id.slice(0,5)}</span>
                        ${item.user_id === userNode.id ? `<button onclick="deleteItem('${item.id}')" class="opacity-0 group-hover:opacity-100 text-zinc-600 hover:text-red-400 transition text-xs font-bold">[ PURGE ]</button>` : ''}
                    </div>
                    <h3 class="text-lg font-semibold text-white mb-2">${item.title}</h3>
                    <p class="text-zinc-400 text-sm leading-relaxed">${item.description || 'No data payload.'}</p>
                    <div class="mt-6 pt-4 border-t border-zinc-800/50 flex justify-between items-center">
                        <span class="text-[10px] text-zinc-600">${new Date(item.inserted_at).toLocaleString()}</span>
                        <div class="h-2 w-2 rounded-full ${item.user_id === userNode.id ? 'bg-blue-500' : 'bg-zinc-700'}"></div>
                    </div>
                </div>
            `).join('');
        }

        async function createEntry() {
            const title = document.getElementById('new-title').value;
            const description = document.getElementById('new-desc').value;
            if(!title) return;

            const { error } = await supabase.from('registry').insert([{ title, description, user_id: userNode.id }]);
            if(!error) {
                toggleModal(false);
                document.getElementById('new-title').value = '';
                document.getElementById('new-desc').value = '';
            }
        }

        async function deleteItem(id) {
            if(confirm("Confirm data purge?")) await supabase.from('registry').delete().eq('id', id);
        }

        function subscribeRealtime() {
            supabase.channel('schema-db-changes')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'registry' }, () => {
                    fetchRegistry();
                }).subscribe();
        }
    </script>
</body>
</html>
