<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bubble Games | Home</title>
    <style>
        :root { --primary: #00d4ff; --bg: #0a0a0c; --card: #16161a; --danger: #ff4444; --edit: #ffcc00; --success: #00ff88; --owner: #ffcf40; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; text-align: center; }
        
        /* THE LOCKOUT SCREEN - SHOWN BY DEFAULT */
        #capsLockGate {
            position: fixed; inset: 0; background: rgba(10, 10, 12, 0.95);
            z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center;
            border: 10px solid var(--danger);
        }
        #capsLockGate h1 { color: var(--danger); font-size: 3rem; margin-bottom: 10px; }
        #capsLockGate p { font-size: 1.2rem; margin-bottom: 20px; }
        .blink { animation: blinker 1s linear infinite; color: var(--danger); font-weight: bold; }
        @keyframes blinker { 50% { opacity: 0; } }

        nav { padding: 10px 50px; border-bottom: 2px solid var(--primary); display: flex; justify-content: space-between; align-items: center; background: #000; }
        .logo { font-size: 24px; font-weight: bold; color: var(--primary); text-transform: uppercase; }
        .container { padding: 50px 20px; max-width: 1000px; margin: auto; }
        
        #authContainer { background: var(--card); padding: 40px; border-radius: 20px; border: 1px solid var(--primary); display: inline-block; margin-top: 100px; }
        input { display: block; margin: 10px auto; padding: 12px; width: 250px; border-radius: 8px; border: 1px solid #333; background: #000; color: white; }
        
        button { border: none; padding: 12px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-launch { background: var(--primary); color: #000; padding: 15px 40px; border-radius: 50px; font-size: 1.5rem; cursor: pointer; }
        .btn-play { background: var(--primary); color: black; width: 100%; margin-top: 10px; }
        .btn-logout { background: #333; color: white; font-size: 12px; }
        
        /* PREVENT INTERACTION UNTIL VERIFIED */
        .locked-content { filter: blur(5px); pointer-events: none; }
    </style>
</head>
<body>

    <div id="capsLockGate">
        <h1>⚠️ ACCESS DENIED</h1>
        <p>YOU MUST TURN ON <strong>CAPS LOCK</strong> TO USE BUBBLE GAMES</p>
        <p class="blink">PRESS ANY KEY TO VERIFY CAPS LOCK</p>
    </div>

    <div id="mainContent" class="locked-content">
        <div id="authContainer">
            <h1 id="authTitle">Bubble Games</h1>
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">
            <button onclick="handleAuth('login')" class="btn-play">LOGIN</button>
        </div>

        <div id="mainApp" style="display:none;">
            <nav>
                <div class="logo">Bubble Games</div>
                <button class="btn-logout" onclick="handleLogout()">LOGOUT</button>
            </nav>
            <div class="container">
                <h1>Build. Play. Publish.</h1>
                <button onclick="createNewGame()" class="btn-launch">Open Editor 🛠️</button>
                <div class="grid" id="myGamesGrid"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const gate = document.getElementById('capsLockGate');
        const content = document.getElementById('mainContent');

        // THIS FUNCTION RUNS EVERY TIME A KEY IS PRESSED
        function verifyCaps(e) {
            const isCaps = e.getModifierState('CapsLock');
            
            if (isCaps) {
                // UNLOCK EVERYTHING
                gate.style.display = 'none';
                content.classList.remove('locked-content');
            } else {
                // LOCK EVERYTHING
                gate.style.display = 'flex';
                content.classList.add('locked-content');
            }
        }

        // LISTEN FOR ANY KEY STROKE
        window.addEventListener('keydown', verifyCaps);

        // EXTRA CHECK: If they click the screen, try to check caps state
        window.addEventListener('mousedown', (e) => {
            // Some browsers allow checking state on click
            if (e.getModifierState('CapsLock')) {
                gate.style.display = 'none';
                content.classList.remove('locked-content');
            }
        });

        // --- Your existing Supabase / Game logic below ---
        function createNewGame() { window.location.href = 'engine.html'; }
        // ... (rest of your existing login/load functions)
    </script>
</body>
</html>
